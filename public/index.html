<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日報チェッカー</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --sw: 228px;
  /* Green primary */
  --c-pri:    #16a34a;
  --c-pri-h:  #15803d;
  --c-pri-lt: #f0fdf4;
  --c-pri-s:  #dcfce7;
  --c-pri-m:  #bbf7d0;
  /* Sidebar */
  --c-sb:     #0b1a0e;
  --c-sb2:    #162b1a;
  --c-sb3:    #1e3d24;
  --c-sbT:    #86efac;
  --c-sbT2:   #4ade80;
  /* Layout */
  --c-bg:     #f0fdf4;
  --c-sur:    #ffffff;
  --c-bdr:    #e5e7eb;
  --c-bdr2:   #d1fae5;
  /* Text */
  --c-t1:     #111827;
  --c-t2:     #374151;
  --c-t3:     #6b7280;
  --c-t4:     #9ca3af;
  /* Status */
  --c-red:    #ef4444; --c-redB:  #fef2f2; --c-redBr: #fca5a5; --c-redS: #fee2e2;
  --c-amb:    #f59e0b; --c-ambB:  #fffbeb; --c-ambBr: #fcd34d; --c-ambS: #fef3c7;
  --c-grn:    #22c55e; --c-grnB:  #f0fdf4; --c-grnBr: #86efac;
  --c-blu:    #3b82f6; --c-bluB:  #eff6ff;
  /* Shadows */
  --sh0: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  --sh1: 0 4px 16px rgba(0,0,0,.08), 0 1px 4px rgba(0,0,0,.04);
  --sh-g: 0 4px 20px rgba(22,163,74,.18);
  --r: 12px; --r2: 8px; --r3: 6px;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
               "Hiragino Sans","Hiragino Kaku Gothic ProN","Yu Gothic UI",Meiryo,sans-serif;
  font-size: 14px; line-height: 1.5; color: var(--c-t1);
}

/* ── Layout ── */
.layout { display: flex; height: 100vh; overflow: hidden; }

/* ── Sidebar ── */
.sb {
  width: var(--sw);
  background: linear-gradient(180deg, var(--c-sb) 0%, #0d1f11 100%);
  display: flex; flex-direction: column; flex-shrink: 0;
  position: relative;
}
.sb::after {
  content: '';
  position: absolute; right: 0; top: 0; bottom: 0; width: 1px;
  background: linear-gradient(180deg, transparent, rgba(34,197,94,.15), transparent);
}

.sb-logo {
  display: flex; align-items: center; gap: 10px;
  padding: 22px 18px 18px;
  border-bottom: 1px solid rgba(255,255,255,.06);
}
.sb-logo-ico {
  font-size: 22px;
  width: 36px; height: 36px; border-radius: 10px;
  background: linear-gradient(135deg, #22c55e, #16a34a);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  box-shadow: 0 2px 8px rgba(34,197,94,.4);
}
.sb-logo-wrap {}
.sb-logo-txt { color: #fff; font-weight: 800; font-size: 14px; letter-spacing: -.02em; }
.sb-logo-sub { color: var(--c-sbT); font-size: 10px; opacity: .7; }

.sb-nav { padding: 12px 8px; flex: 1; }
.nv {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 12px; border-radius: 8px;
  margin-bottom: 2px; color: var(--c-sbT); font-size: 13px; font-weight: 500;
  cursor: pointer; user-select: none;
  transition: background .12s, color .12s;
}
.nv:hover  { background: var(--c-sb2); color: #d1fae5; }
.nv.active {
  background: linear-gradient(135deg, rgba(34,197,94,.2), rgba(22,163,74,.15));
  color: #fff;
  border: 1px solid rgba(34,197,94,.25);
}
.nv-ico { font-size: 15px; width: 20px; text-align: center; flex-shrink: 0; }
.nv-badge {
  margin-left: auto; display: inline-flex; align-items: center; justify-content: center;
  min-width: 20px; height: 20px; padding: 0 5px;
  background: var(--c-red); color: #fff; font-size: 11px; font-weight: 700; border-radius: 100px;
}

.sb-foot {
  padding: 14px 12px;
  border-top: 1px solid rgba(255,255,255,.06);
}
.sb-user-card {
  background: rgba(255,255,255,.05);
  border: 1px solid rgba(255,255,255,.08);
  border-radius: 10px; padding: 10px 12px;
  display: flex; align-items: center; gap: 10px;
}
.sb-avatar {
  width: 32px; height: 32px; border-radius: 50%;
  background: linear-gradient(135deg, #22c55e, #0d9488);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 800; color: #fff; flex-shrink: 0;
}
.sb-user-info { flex: 1; min-width: 0; }
.sb-user-name { color: #e2e8f0; font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sb-user-cron { color: var(--c-sbT); font-size: 10.5px; margin-top: 1px; opacity: .7; }
.sb-logout {
  color: var(--c-sbT); font-size: 13px; text-decoration: none; flex-shrink: 0;
  transition: color .12s; line-height: 1;
}
.sb-logout:hover { color: #fff; }

/* ── Main ── */
.main { flex: 1; overflow-y: auto; background: var(--c-bg); }
.page { padding: 28px; max-width: 1200px; }

/* ── Topbar ── */
.topbar {
  display: flex; align-items: flex-start; justify-content: space-between;
  margin-bottom: 24px; gap: 14px;
}
.tb-left { min-width: 0; }
.tb-title { font-size: 20px; font-weight: 800; display: flex; align-items: center; gap: 12px; letter-spacing: -.02em; color: var(--c-t1); }
.tb-sub   { font-size: 12.5px; color: var(--c-t3); margin-top: 4px; display: flex; align-items: center; gap: 6px; }
.tb-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--c-grn); display: inline-block; animation: pulse 2s infinite; }
@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(34,197,94,.4); }
  50% { box-shadow: 0 0 0 4px rgba(34,197,94,0); }
}

/* ── View tabs ── */
.view-tabs {
  display: inline-flex; gap: 2px;
  background: rgba(0,0,0,.04); border-radius: 10px; padding: 3px;
}
.vtab {
  padding: 5px 16px; font-size: 13px; font-weight: 600; border-radius: 7px;
  cursor: pointer; color: var(--c-t3); transition: background .12s, color .12s;
}
.vtab.active { background: #fff; color: var(--c-pri); box-shadow: var(--sh0); }

/* ── Buttons ── */
.btn {
  padding: 8px 16px; border-radius: var(--r2); font-size: 13px; font-weight: 600;
  border: none; cursor: pointer; transition: opacity .15s, transform .1s;
  white-space: nowrap; font-family: inherit;
}
.btn:hover:not(:disabled) { opacity: .88; transform: translateY(-1px); }
.btn:active { transform: translateY(0); }
.btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }
.btn-pri {
  background: linear-gradient(135deg, #22c55e, #16a34a);
  color: #fff; box-shadow: var(--sh-g);
}
.btn-sec {
  background: var(--c-sur); color: var(--c-t2);
  border: 1.5px solid var(--c-bdr);
  box-shadow: var(--sh0);
}
.btn-sm  { padding: 5px 11px; font-size: 12px; }

/* ── Inputs ── */
.inp {
  padding: 7px 12px; border: 1.5px solid var(--c-bdr2);
  border-radius: var(--r2); font-size: 13px; color: var(--c-t1);
  background: #fafffe; outline: none; transition: border-color .15s, box-shadow .15s;
  font-family: inherit;
}
.inp:focus { border-color: var(--c-grn); box-shadow: 0 0 0 3px rgba(34,197,94,.12); }
select.inp { cursor: pointer; }

/* ── Stats ── */
.stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 14px; margin-bottom: 24px; }
.sc {
  background: var(--c-sur); border: 1.5px solid var(--c-bdr);
  border-radius: var(--r); padding: 20px 22px; box-shadow: var(--sh0);
  position: relative; overflow: hidden; transition: box-shadow .15s;
}
.sc:hover { box-shadow: var(--sh1); }
.sc::before { content:''; position:absolute; top:0;left:0;right:0; height:3px; background: var(--c-bdr); border-radius: var(--r) var(--r) 0 0; }
.sc.s-g::before { background: linear-gradient(90deg, #22c55e, #10b981); }
.sc.s-a::before { background: linear-gradient(90deg, #f59e0b, #f97316); }
.sc.s-r::before { background: linear-gradient(90deg, #ef4444, #dc2626); }
.sc.s-p::before { background: linear-gradient(90deg, #8b5cf6, #6366f1); }
.sc-ico { font-size: 22px; margin-bottom: 12px; }
.sc-val { font-size: 36px; font-weight: 900; line-height: 1; letter-spacing: -.03em; }
.sc.s-g .sc-val { color: var(--c-pri); }
.sc.s-a .sc-val { color: var(--c-amb); }
.sc.s-r .sc-val { color: var(--c-red); }
.sc.s-p .sc-val { color: #8b5cf6; }
.sc-lbl { font-size: 11px; font-weight: 700; color: var(--c-t3); text-transform: uppercase; letter-spacing: .07em; margin-top: 6px; }

/* ── Section ── */
.sec { margin-bottom: 28px; }
.sec-ttl { font-size: 14px; font-weight: 800; display: flex; align-items: center; gap: 8px; margin-bottom: 12px; color: var(--c-t1); letter-spacing: -.01em; }
.cnt-badge { display: inline-flex; align-items: center; justify-content: center; background: var(--c-red); color: #fff; font-size: 11px; font-weight: 700; border-radius: 100px; padding: 2px 7px; min-width: 22px; }

/* ── Alert cards ── */
.ac {
  background: var(--c-sur); border: 1.5px solid var(--c-redBr);
  border-left: 4px solid var(--c-red);
  border-radius: var(--r); padding: 16px 20px; margin-bottom: 10px; box-shadow: var(--sh0);
}
.ac.warn { border-color: var(--c-ambBr); border-left-color: var(--c-amb); }
.ac-hd { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.ac-who { display: flex; align-items: center; gap: 10px; }
.ac-name { font-size: 15px; font-weight: 800; }
.ac-grp  { font-size: 12px; color: var(--c-t3); margin-top: 2px; }
.ac-chips { display: flex; gap: 6px; flex-wrap: wrap; }
.ac-dets { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
.det-box {
  background: var(--c-bg); border: 1.5px solid var(--c-bdr2);
  border-radius: var(--r2); padding: 10px 14px; flex: 1; min-width: 110px;
}
.det-lbl { font-size: 10.5px; color: var(--c-t4); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 4px; font-weight: 700; }
.det-val { font-size: 16px; font-weight: 800; }

/* ── Chips ── */
.chip { display: inline-flex; align-items: center; gap: 3px; padding: 3px 9px; border-radius: 100px; font-size: 11.5px; font-weight: 700; white-space: nowrap; }
.c-r { background: var(--c-redS);  color: var(--c-red); }
.c-a { background: var(--c-ambS);  color: #92400e; }
.c-g { background: var(--c-pri-s); color: var(--c-pri); }
.c-b { background: var(--c-bluB);  color: var(--c-blu); }
.c-x { background: #f1f5f9; color: var(--c-t3); border: 1px solid var(--c-bdr); }
.c-p { background: #f5f3ff; color: #7c3aed; }

/* ── Dot ── */
.dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.d-g { background: var(--c-grn); box-shadow: 0 0 0 3px rgba(34,197,94,.2); }
.d-a { background: var(--c-amb); box-shadow: 0 0 0 3px rgba(245,158,11,.2); }
.d-r { background: var(--c-red); box-shadow: 0 0 0 3px rgba(239,68,68,.2); }
.d-n { background: transparent; border: 2px solid var(--c-t4); }

/* ── Monitor toggle ── */
.mon-btn {
  padding: 3px 10px; border-radius: 100px; font-size: 11px; font-weight: 700;
  border: 1.5px solid; cursor: pointer; transition: all .12s; background: none;
  font-family: inherit; white-space: nowrap;
}
.mon-on  { background: var(--c-pri-s); color: var(--c-pri); border-color: var(--c-pri-m); }
.mon-off { background: #f1f5f9; color: var(--c-t3); border-color: var(--c-bdr); }

/* ── Dept block ── */
.db {
  background: var(--c-sur); border: 1.5px solid var(--c-bdr);
  border-radius: var(--r); margin-bottom: 14px; overflow: hidden; box-shadow: var(--sh0);
}
.db-hd {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 18px; background: #fafffe; border-bottom: 1.5px solid var(--c-bdr2);
}
.db-hd-name { font-weight: 800; font-size: 13.5px; color: var(--c-t1); }
.db-hd-stat { font-size: 12px; color: var(--c-t3); }
.tm-hd {
  display: flex; align-items: center; justify-content: space-between;
  padding: 7px 18px 7px 30px; background: #f7fef9; border-bottom: 1px solid var(--c-bdr2);
}
.tm-hd-name { font-weight: 700; font-size: 12.5px; color: var(--c-pri); }
.tm-hd-stat { font-size: 11.5px; color: var(--c-t4); }

/* ── Member rows ── */
.mr {
  display: grid; grid-template-columns: 20px 1fr 86px 118px 86px 78px 68px;
  align-items: center; gap: 10px; padding: 11px 18px;
  border-bottom: 1px solid #f3faf5; transition: background .1s;
}
.mr:last-child { border-bottom: none; }
.mr:hover { background: #fafff9; }
.mr.rf { background: #fffdf0; }
.mr.rf:hover { background: #fef9e0; }
.mr.rc { background: #fff5f5; }
.mr.rc:hover { background: #fef2f2; }
.mr.rm { background: #fafafa; opacity: .7; }
.th-row {
  display: grid; grid-template-columns: 20px 1fr 86px 118px 86px 78px 68px;
  align-items: center; gap: 10px; padding: 8px 18px;
  background: #f0fdf4; border-bottom: 1.5px solid var(--c-bdr2);
}
.th { font-size: 10.5px; font-weight: 800; color: var(--c-pri); text-transform: uppercase; letter-spacing: .07em; }
.th-r { text-align: right; }
.mr-name  { font-weight: 700; font-size: 13.5px; }
.mr-meta  { font-size: 11px; color: var(--c-t4); margin-top: 1px; }
.mr-time  { font-size: 13px; font-variant-numeric: tabular-nums; }
.mr-sent  { font-size: 13px; }
.mr-vol   { font-size: 13px; font-variant-numeric: tabular-nums; }
.mr-flags { display: flex; gap: 4px; justify-content: flex-end; flex-wrap: wrap; }

/* ── Weekly grid ── */
.wk-nav { display: flex; align-items: center; gap: 10px; }
.wk-range { font-weight: 800; font-size: 15px; min-width: 220px; text-align: center; color: var(--c-t1); }
.wk-arr {
  width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
  border-radius: 8px; background: var(--c-sur); border: 1.5px solid var(--c-bdr);
  cursor: pointer; font-size: 16px; line-height: 1; transition: background .12s, border-color .12s;
  user-select: none; box-shadow: var(--sh0);
}
.wk-arr:hover { background: var(--c-pri-lt); border-color: var(--c-pri-m); }
.wk-stats {
  display: flex; gap: 28px; background: var(--c-sur); border: 1.5px solid var(--c-bdr2);
  border-radius: var(--r); padding: 16px 24px; margin-bottom: 18px; box-shadow: var(--sh0);
}
.ws-item { display: flex; align-items: baseline; gap: 6px; }
.ws-val { font-size: 26px; font-weight: 900; color: var(--c-t1); letter-spacing: -.03em; }
.ws-lbl { font-size: 12px; color: var(--c-t3); }
.wk-wrap { overflow-x: auto; }
.wk-block {
  min-width: 760px; background: var(--c-sur); border: 1.5px solid var(--c-bdr);
  border-radius: var(--r); overflow: hidden; box-shadow: var(--sh0); margin-bottom: 14px;
}
.wk-dept-hd {
  display: flex; align-items: center; justify-content: space-between;
  padding: 11px 16px; background: #fafffe; border-bottom: 1.5px solid var(--c-bdr2);
}
.wk-dept-nm { font-weight: 800; font-size: 13.5px; color: var(--c-t1); }
.wk-tm-hd { padding: 7px 16px 7px 26px; background: #f7fef9; border-bottom: 1px solid var(--c-bdr2); font-weight: 700; font-size: 12.5px; color: var(--c-pri); }

/* Week grid row */
.wg-row { display: grid; grid-template-columns: 180px repeat(7, 1fr) 68px; border-bottom: 1px solid #f3faf5; align-items: stretch; }
.wg-row:last-child { border-bottom: none; }
.wg-row:hover .wg-name { background: #fafff9; }
.wg-hd-row { display: grid; grid-template-columns: 180px repeat(7, 1fr) 68px; border-bottom: 2px solid var(--c-bdr2); background: #f0fdf4; }
.wg-hd-cell { padding: 8px 4px; text-align: center; font-size: 11.5px; font-weight: 800; color: var(--c-pri); border-left: 1px solid var(--c-bdr2); }
.wg-hd-cell:first-child { border-left: none; }
.wg-hd-cell.today { color: #fff; background: var(--c-pri); }
.wg-hd-cell.wkend { color: var(--c-t4); background: #fafafa; }
.wg-name { display: flex; align-items: center; gap: 8px; padding: 9px 14px; font-size: 13px; font-weight: 700; min-width: 0; }
.wg-name-txt { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
.wg-cell { border-left: 1px solid var(--c-bdr2); padding: 5px 4px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
.wg-cell:hover .cell-pill { filter: brightness(.96); }
.wg-cell.wkend { background: #fafafa; cursor: default; }
.wg-cell.future { cursor: default; }
.cell-pill { display: flex; flex-direction: column; align-items: center; padding: 4px 6px; border-radius: 8px; min-width: 54px; max-width: 80px; font-size: 11.5px; font-weight: 700; line-height: 1.35; text-align: center; transition: filter .1s; }
.cp-g { background: var(--c-pri-s); color: var(--c-pri); }
.cp-a { background: var(--c-ambS); color: #92400e; }
.cp-r { background: var(--c-redS); color: var(--c-red); }
.cp-none { background: #f1f5f9; color: var(--c-t4); border: 1.5px dashed var(--c-bdr); }
.cp-fut { background: repeating-linear-gradient(45deg,#f8fafc 0,#f8fafc 3px,#f0f7f1 3px,#f0f7f1 6px); min-width: 54px; height: 34px; border-radius: 8px; }
.cp-wk  { opacity: .4; pointer-events: none; }
.cell-time { font-size: 12px; font-weight: 800; }
.cell-flag { font-size: 10px; opacity: .85; margin-top: 1px; }
.wg-toggle { border-left: 1px solid var(--c-bdr2); display: flex; align-items: center; justify-content: center; padding: 6px 4px; }

/* ── Card ── */
.card {
  background: var(--c-sur); border: 1.5px solid var(--c-bdr);
  border-radius: var(--r); overflow: hidden; box-shadow: var(--sh0); margin-bottom: 16px;
}
.cr {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 20px; border-bottom: 1px solid #f0fdf4; gap: 14px;
}
.cr:last-child { border-bottom: none; }
.cr:hover { background: #fafff9; }
.cr-lbl { font-weight: 700; font-size: 13.5px; margin-bottom: 3px; color: var(--c-t1); }
.cr-desc { font-size: 12px; color: var(--c-t3); }
.cr-ctrl { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

/* ── Colors ── */
.t-r { color: var(--c-red); }
.t-a { color: var(--c-amb); }
.t-g { color: var(--c-pri); }
.t-3 { color: var(--c-t3); }
.t-b { color: var(--c-blu); }

/* ── Toast ── */
.toast {
  position: fixed; bottom: 24px; right: 24px;
  background: var(--c-t1); color: #fff;
  padding: 12px 18px; border-radius: var(--r); font-size: 13px; font-weight: 600;
  box-shadow: 0 8px 24px rgba(0,0,0,.18); z-index: 9999; pointer-events: none;
  opacity: 0; transform: translateY(8px); transition: opacity .2s, transform .2s;
}
.toast.on { opacity: 1; transform: none; }
.to-ok  { background: var(--c-pri); }
.to-err { background: var(--c-red); }

/* ── Spinner ── */
.spin-wrap { display: flex; align-items: center; justify-content: center; padding: 80px; }
@keyframes sp { to { transform: rotate(360deg); } }
.spinner { width: 32px; height: 32px; border-radius: 50%; border: 3px solid var(--c-pri-m); border-top-color: var(--c-pri); animation: sp .7s linear infinite; }

/* ── Empty ── */
.empty { text-align: center; padding: 56px 20px; color: var(--c-t3); }
.empty-ico { font-size: 44px; margin-bottom: 14px; }
.empty-ttl { font-size: 16px; font-weight: 800; color: var(--c-t2); margin-bottom: 6px; }
</style>
</head>
<body>
<div class="layout">
  <aside class="sb">
    <div class="sb-logo">
      <div class="sb-logo-ico">🌱</div>
      <div class="sb-logo-wrap">
        <div class="sb-logo-txt">日報チェッカー</div>
        <div class="sb-logo-sub">Daily Report</div>
      </div>
    </div>
    <nav class="sb-nav">
      <div class="nv active" data-view="overview" onclick="nav('overview')">
        <span class="nv-ico">⊞</span><span>ダッシュボード</span>
        <span id="nb" class="nv-badge" style="display:none">0</span>
      </div>
      <div class="nv" data-view="members" onclick="nav('members')" id="nv-members">
        <span class="nv-ico">⊛</span><span>メンバー</span>
      </div>
      <div class="nv" data-view="groups" onclick="nav('groups')" id="nv-groups">
        <span class="nv-ico">⊡</span><span>グループ</span>
      </div>
      <div class="nv" data-view="settings" onclick="nav('settings')" id="nv-settings">
        <span class="nv-ico">⊕</span><span>設定</span>
      </div>
      <div class="nv" data-view="users" onclick="nav('users')" id="nv-users">
        <span class="nv-ico">⊙</span><span>ユーザー管理</span>
      </div>
    </nav>
    <div class="sb-foot">
      <div class="sb-user-card">
        <div class="sb-avatar" id="sb-avatar">–</div>
        <div class="sb-user-info">
          <div class="sb-user-name" id="sb-user">–</div>
          <div class="sb-user-cron" id="sb-cron"></div>
        </div>
        <a href="/auth/logout" class="sb-logout" title="ログアウト">⏻</a>
      </div>
    </div>
  </aside>

  <main class="main">
    <div id="page" class="page"></div>
  </main>
</div>
<div id="toast" class="toast"></div>

<script>
/* ════════════════════════════════════════
   State
════════════════════════════════════════ */
const S = {
  view:     'overview',
  sub:      'day',
  date:     today(),
  weekDate: today(),
  dash:      null,
  weekly:    null,
  members:   null,
  groups:    null,
  config:    null,
  dashUsers:   null,
  invitations: null,
  loading:   false,
  role:      'viewer',
  email:     '',
  displayName: '',
};

function today() {
  return new Date(Date.now() + 9 * 3600000).toISOString().slice(0, 10);
}
function addDays(d, n) {
  return new Date(new Date(d + 'T00:00:00Z').getTime() + n * 86400000).toISOString().slice(0, 10);
}
function weekStart(d) {
  const dt = new Date(d + 'T00:00:00Z');
  const off = dt.getUTCDay() === 0 ? 6 : dt.getUTCDay() - 1;
  return addDays(d, -off);
}
function fmtWeekLabel(d) {
  const dt = new Date(d + 'T00:00:00Z');
  return `${dt.getUTCMonth()+1}月${dt.getUTCDate()}日`;
}
function fmtDayHd(d) {
  const dt  = new Date(d + 'T00:00:00Z');
  const day = ['日','月','火','水','木','金','土'][dt.getUTCDay()];
  return `${day}\n${dt.getUTCMonth()+1}/${dt.getUTCDate()}`;
}
function isWkend(d) { const w = new Date(d + 'T00:00:00Z').getUTCDay(); return w===0||w===6; }

/* ════════════════════════════════════════
   Navigation
════════════════════════════════════════ */
function nav(view) {
  S.view = view;
  document.querySelectorAll('.nv').forEach(el => el.classList.toggle('active', el.dataset.view === view));
  render();
}

function switchSub(sub) {
  S.sub = sub;
  if (sub === 'week' && !S.weekly) fetchWeekly();
  else render();
}

function navWeek(dir) {
  S.weekDate = addDays(S.weekDate, dir * 7);
  S.weekly = null;
  fetchWeekly();
}

/* ════════════════════════════════════════
   API
════════════════════════════════════════ */
async function api(method, url, body) {
  const res = await fetch(url, {
    method,
    headers: body ? {'Content-Type':'application/json'} : {},
    body: body ? JSON.stringify(body) : undefined,
  });
  if (res.status === 401) { window.location.href = '/login.html'; return {}; }
  return res.json();
}

/* ════════════════════════════════════════
   Toast
════════════════════════════════════════ */
let _tt;
function toast(msg, type='') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast on ${type==='ok'?'to-ok':type==='err'?'to-err':''}`;
  clearTimeout(_tt);
  _tt = setTimeout(() => el.classList.remove('on'), 3000);
}

/* ════════════════════════════════════════
   Fetch
════════════════════════════════════════ */
async function fetchDash() {
  S.loading = true; render();
  try {
    S.dash = await api('GET', `/api/dashboard?date=${S.date}`);
    updateSB(S.dash);
  } catch(e) { console.error(e); }
  S.loading = false; render();
}
async function fetchWeekly() {
  S.loading = true; render();
  try { S.weekly = await api('GET', `/api/weekly?date=${S.weekDate}`); }
  catch(e) { console.error(e); }
  S.loading = false; render();
}
async function fetchMembers() { const [m,g] = await Promise.all([api('GET','/api/members'), api('GET','/api/groups')]); S.members=m; S.groups=g; }
async function fetchDashUsers() {
  const [users, invs] = await Promise.all([api('GET', '/api/users'), api('GET', '/api/invitations')]);
  S.dashUsers   = users;
  S.invitations = invs;
}
async function fetchGroups()  { S.groups  = await api('GET', '/api/groups'); }
async function fetchConfig()  { S.config  = await api('GET', '/api/config'); }

function updateSB(d) {
  const b = document.getElementById('nb');
  const n = d.stats?.flagged ?? 0;
  if (b) { b.textContent = n; b.style.display = n > 0 ? 'inline-flex' : 'none'; }
  const ce = document.getElementById('sb-cron');
  if (ce && d.config?.summary_cron) ce.textContent = `自動: ${d.config.summary_cron}`;
}

/* ════════════════════════════════════════
   Render
════════════════════════════════════════ */
function render() {
  const page = document.getElementById('page');
  if (S.loading) { page.innerHTML = `<div class="spin-wrap"><div class="spinner"></div></div>`; return; }
  switch (S.view) {
    case 'overview': page.innerHTML = renderOverview(); break;
    case 'members':  page.innerHTML = renderMembersV(); break;
    case 'groups':   page.innerHTML = renderGroupsV();  break;
    case 'settings': page.innerHTML = renderSettingsV(); break;
    case 'users':    page.innerHTML = renderUsersV(); break;
  }
  bindEvt();
}

/* ════════════════════════════════════════
   Overview
════════════════════════════════════════ */
function renderOverview() {
  const tabs = `<div class="view-tabs">
    <div class="vtab ${S.sub==='day'?'active':''}" onclick="switchSub('day')">日次</div>
    <div class="vtab ${S.sub==='week'?'active':''}" onclick="switchSub('week')">週次</div>
  </div>`;
  return S.sub === 'week' ? renderWeekly(tabs) : renderDaily(tabs);
}

/* ════════════════════════════════════════
   Daily view
════════════════════════════════════════ */
function renderDaily(tabs) {
  const bar = `<div class="topbar">
    <div class="tb-left">
      <div class="tb-title">${tabs} コンディション</div>
      <div class="tb-sub"><span class="live-dot"></span>${S.dash ? `最終更新 ${new Date().toLocaleTimeString('ja-JP')} — ${S.date}` : ''}</div>
    </div>
    <div class="tb-right">
      <input class="inp" type="date" id="d-inp" value="${S.date}" max="${today()}" style="width:148px">
      <button class="btn btn-sec" onclick="fetchDash()">↺ 更新</button>
      ${S.role === 'admin' ? `<button class="btn btn-pri" id="run-btn" onclick="runCheck()">▶ チェック実行</button>` : ''}
    </div>
  </div>`;

  if (!S.dash) return bar + `<div class="empty"><div class="empty-ico">📭</div><div class="empty-ttl">データなし</div><p>「チェック実行」を押してください。</p></div>`;

  const { stats, config: cfg, group_tree, ungrouped, members } = S.dash;
  const flagged = [...members].filter(m => (m.check?.flag_count??0) > 0)
                               .sort((a,b) => (b.check?.flag_count??0) - (a.check?.flag_count??0));

  return bar + renderStats(stats) +
    (flagged.length ? `<div class="sec">
      <div class="sec-ttl">⚠️ 要注意メンバー <span class="cnt-badge">${flagged.length}</span></div>
      ${flagged.map(m => renderAC(m, cfg)).join('')}
    </div>` : '') +
    renderDeptTree(group_tree, ungrouped, cfg);
}

function renderStats(s) {
  return `<div class="stats">
    <div class="sc"><div class="sc-ico">👥</div><div class="sc-val">${s.total}</div><div class="sc-lbl">監視対象</div></div>
    <div class="sc s-g"><div class="sc-ico">✅</div><div class="sc-val">${s.posted}</div><div class="sc-lbl">投稿済み</div></div>
    <div class="sc ${s.missing>0?'s-a':''}"><div class="sc-ico">⏳</div><div class="sc-val">${s.missing}</div><div class="sc-lbl">未投稿</div></div>
    <div class="sc ${s.critical>0?'s-r':s.flagged>0?'s-a':'s-g'}">
      <div class="sc-ico">${s.critical>0?'🔴':s.flagged>0?'🟡':'🟢'}</div>
      <div class="sc-val">${s.flagged}</div>
      <div class="sc-lbl">要注意 <span style="font-size:10px;font-weight:500">(重篤${s.critical})</span></div>
    </div>
  </div>`;
}

function renderAC(m, cfg) {
  const { user, check, report } = m;
  const name  = user.display_name || user.real_name || user.user_id;
  const grp   = user.group ? (user.group.parent ? `${user.group.parent.name} › ${user.group.name}` : user.group.name) : '未分類';
  const crit  = (check.flag_count??0) >= 3;
  const chips = [
    check.late_night_flag ? `<span class="chip c-b">🌙 深夜</span>` : '',
    check.sentiment_flag  ? `<span class="chip c-r">😟 ネガティブ</span>` : '',
    check.volume_flag     ? `<span class="chip c-a">${check.volume_ratio<1?'📉':'📈'} 文量変化</span>` : '',
  ].filter(Boolean).join('');
  const dets = [];
  if (check.late_night_flag) dets.push(`<div class="det-box"><div class="det-lbl">🌙 投稿時刻</div><div class="det-val t-b">${fmtT(check.posted_at)}</div></div>`);
  if (check.sentiment_flag)  dets.push(`<div class="det-box"><div class="det-lbl">😟 感情スコア</div><div class="det-val t-r">${(check.sentiment_score??0).toFixed(2)}<span style="font-size:11px;color:var(--c-t3)"> / 閾値${cfg.sentiment_threshold}</span></div></div>`);
  if (check.volume_flag)     dets.push(`<div class="det-box"><div class="det-lbl">${check.volume_ratio<1?'📉':'📈'} 文量</div><div class="det-val t-a">${fmtP(check.volume_ratio)}<span style="font-size:11px;color:var(--c-t3)"> (${report?.char_count??'?'}字)</span></div></div>`);
  return `<div class="ac ${crit?'':'warn'}">
    <div class="ac-hd">
      <div class="ac-who">
        <div class="dot ${crit?'d-r':'d-a'}" style="width:12px;height:12px"></div>
        <div><div class="ac-name">${name}</div><div class="ac-grp">${grp}</div></div>
      </div>
      <div class="ac-chips">${chips}</div>
    </div>
    ${dets.length ? `<div class="ac-dets">${dets.join('')}</div>` : ''}
  </div>`;
}

function renderDeptTree(groupTree, ungrouped, cfg) {
  const items = [
    ...groupTree.map(g => renderDeptBlock(g, cfg)),
    ...(ungrouped?.length ? [renderDeptBlock({name:'未分類',children:[],direct_members:ungrouped}, cfg)] : []),
  ];
  return `<div class="sec"><div class="sec-ttl">📋 全メンバー</div>${items.join('')}</div>`;
}

function renderDeptBlock(dept, cfg) {
  const all  = [...dept.children.flatMap(c=>c.members||[]), ...(dept.direct_members||[])];
  const post = all.filter(m=>m.check?.posted).length;
  let body = '';
  for (const child of (dept.children||[])) {
    if (!child.members?.length) continue;
    const cp = child.members.filter(m=>m.check?.posted).length;
    body += `<div>
      <div class="tm-hd"><span class="tm-hd-name">▸ ${child.name}</span><span class="tm-hd-stat">${cp}/${child.members.length}名</span></div>
      ${renderTblHd()}${child.members.map(m=>renderMR(m,cfg)).join('')}
    </div>`;
  }
  if ((dept.direct_members||[]).length) body += renderTblHd() + dept.direct_members.map(m=>renderMR(m,cfg)).join('');
  return `<div class="db">
    <div class="db-hd"><span class="db-hd-name">🏢 ${dept.name}</span><span class="db-hd-stat">${post}/${all.length}名投稿</span></div>
    ${body||'<div style="padding:14px 18px;color:var(--c-t4);font-size:13px">メンバーなし</div>'}
  </div>`;
}

function renderTblHd() {
  return `<div class="th-row">
    <div></div><div class="th">名前</div><div class="th">投稿時刻</div>
    <div class="th">感情スコア</div><div class="th">文量変化</div>
    <div class="th th-r">状態</div><div class="th th-r">監視</div>
  </div>`;
}

function renderMR(m, cfg) {
  const { user, check, report } = m;
  const name = user.display_name || user.real_name || user.user_id;
  const monBtn = S.role === 'admin' ? `<button class="mon-btn mon-on" onclick="toggleMon('${user.user_id}',0)" title="監視停止">監視中</button>` : '';

  if (!check || !check.posted) {
    return `<div class="mr rm">
      <div class="dot d-n"></div>
      <div><div class="mr-name t-3">${name}</div></div>
      <div><span class="chip c-x">未投稿</span></div>
      <div>—</div><div>—</div><div>—</div>
      <div style="display:flex;justify-content:flex-end">${monBtn}</div>
    </div>`;
  }

  const fl  = check.flag_count ?? 0;
  const row = fl >= 3 ? 'rc' : fl > 0 ? 'rf' : '';
  const dot = fl >= 3 ? 'd-r' : fl > 0 ? 'd-a' : 'd-g';
  const tHtml = check.late_night_flag
    ? `<span class="t-b" style="font-weight:700">${fmtT(check.posted_at)} <span style="font-size:11px">🌙</span></span>`
    : `<span class="mr-time">${fmtT(check.posted_at)}</span>`;
  let sHtml = '—';
  if (check.sentiment_score !== null && check.sentiment_score !== undefined) {
    const sc = check.sentiment_score, thr = cfg?.sentiment_threshold ?? 0.35;
    const cl = sc >= 0.65 ? 't-g' : sc < thr ? 't-r' : 't-3';
    const lb = sc >= 0.65 ? 'ポジ' : sc < thr ? 'ネガ' : '中立';
    sHtml = `<span class="${cl}">${sc.toFixed(2)} <span style="font-size:11px">${lb}</span></span>`;
  }
  let vHtml = '—';
  if (check.volume_ratio !== null && check.volume_ratio !== undefined) {
    const p = fmtP(check.volume_ratio);
    const cl = check.volume_flag ? 't-a' : 't-3';
    const ic = check.volume_ratio < 0.95 ? '📉 ' : check.volume_ratio > 1.05 ? '📈 ' : '';
    vHtml = `<span class="${cl}">${ic}${p}</span>`;
  }
  const fc = [];
  if (check.late_night_flag) fc.push(`<span class="chip c-b" style="font-size:10px;padding:2px 6px">🌙</span>`);
  if (check.sentiment_flag)  fc.push(`<span class="chip c-r" style="font-size:10px;padding:2px 6px">😟</span>`);
  if (check.volume_flag)     fc.push(`<span class="chip c-a" style="font-size:10px;padding:2px 6px">${check.volume_ratio<1?'📉':'📈'}</span>`);
  if (!fc.length)            fc.push(`<span class="chip c-g" style="font-size:10px;padding:2px 6px">✓</span>`);

  return `<div class="mr ${row}">
    <div class="dot ${dot}"></div>
    <div><div class="mr-name">${name}</div>${report?`<div class="mr-meta">${report.char_count}字</div>`:''}</div>
    <div>${tHtml}</div>
    <div class="mr-sent">${sHtml}</div>
    <div class="mr-vol">${vHtml}</div>
    <div class="mr-flags">${fc.join('')}</div>
    <div style="display:flex;justify-content:flex-end">${monBtn}</div>
  </div>`;
}

/* ════════════════════════════════════════
   Weekly view
════════════════════════════════════════ */
function renderWeekly(tabs) {
  if (!S.weekly) { fetchWeekly(); return `<div class="spin-wrap"><div class="spinner"></div></div>`; }
  const { week_start, week_end, days, today: td, group_tree, ungrouped, weekly_stats: ws } = S.weekly;

  const bar = `<div class="topbar">
    <div class="tb-left">
      <div class="tb-title">${tabs}
        <div class="wk-nav">
          <div class="wk-arr" onclick="navWeek(-1)">‹</div>
          <div class="wk-range">${fmtWeekLabel(week_start)} — ${fmtWeekLabel(week_end)}</div>
          <div class="wk-arr" onclick="navWeek(1)">›</div>
        </div>
      </div>
      <div class="tb-sub"><span class="live-dot"></span>週次コンディション</div>
    </div>
    <div class="tb-right">
      <button class="btn btn-sec" onclick="fetchWeekly()">↺ 更新</button>
    </div>
  </div>`;

  const pct = ws.total_expected > 0 ? Math.round(ws.total_posted / ws.total_expected * 100) : 0;
  const statsBar = `<div class="wk-stats">
    <div class="ws-item"><div class="ws-val">${ws.total_posted}<span style="font-size:14px;font-weight:500;color:var(--c-t3)">/${ws.total_expected}</span></div><div class="ws-lbl">投稿件数</div></div>
    <div class="ws-item"><div class="ws-val">${pct}<span style="font-size:16px;font-weight:500">%</span></div><div class="ws-lbl">投稿率</div></div>
    <div class="ws-item"><div class="ws-val ${ws.total_flagged>0?'t-a':''}">${ws.total_flagged}</div><div class="ws-lbl">フラグ件数</div></div>
    <div class="ws-item"><div class="ws-val t-3">${ws.total_expected - ws.total_posted}</div><div class="ws-lbl">未投稿件数</div></div>
  </div>`;

  const allItems = [
    ...group_tree.map(g => renderWkDeptBlock(g, days, td)),
    ...(ungrouped?.length ? [renderWkDeptBlock({name:'未分類',children:[],direct_members:ungrouped}, days, td)] : []),
  ];

  return bar + statsBar + `<div class="wk-wrap">${allItems.join('')}</div>`;
}

function renderWkDeptBlock(dept, days, td) {
  let body = `${renderWkHdRow(days, td)}`;
  for (const child of (dept.children||[])) {
    if (!child.members?.length) continue;
    body += `<div class="wk-tm-hd">▸ ${child.name}</div>`;
    body += child.members.map(m => renderWkMemberRow(m, days, td)).join('');
  }
  for (const m of (dept.direct_members||[])) {
    body += renderWkMemberRow(m, days, td);
  }
  const allM = [...(dept.children||[]).flatMap(c=>c.members||[]), ...(dept.direct_members||[])];

  return `<div class="wk-block">
    <div class="wk-dept-hd">
      <span class="wk-dept-nm">🏢 ${dept.name}</span>
      <span style="font-size:12px;color:var(--c-t3)">${allM.length}名</span>
    </div>
    ${body}
  </div>`;
}

function renderWkHdRow(days, td) {
  const cells = days.map(d => {
    const lines = fmtDayHd(d).split('\n');
    const cls   = d === td ? 'today' : isWkend(d) ? 'wkend' : '';
    return `<div class="wg-hd-cell ${cls}">${lines[0]}<br><span style="font-size:13px;font-weight:800">${lines[1]}</span></div>`;
  }).join('');
  return `<div class="wg-hd-row">
    <div class="wg-hd-cell" style="border-left:none;text-align:left;padding-left:14px">名前</div>
    ${cells}
    <div class="wg-hd-cell">監視</div>
  </div>`;
}

function renderWkMemberRow(m, days, td) {
  const { user, days: dayData } = m;
  const name = user.display_name || user.real_name || user.user_id;

  const cells = days.map(d => {
    const dd = dayData[d];
    if (!dd) return `<div class="wg-cell"><div class="cell-pill cp-fut"></div></div>`;
    if (isWkend(d)) return `<div class="wg-cell wkend"><div class="cell-pill cp-none cp-wk">休</div></div>`;
    if (dd.is_future)  return `<div class="wg-cell future"><div class="cell-pill cp-fut"></div></div>`;
    if (!dd.posted)    return `<div class="wg-cell" onclick="gotoDay('${d}')" title="${d} 未投稿"><div class="cell-pill cp-none" style="font-size:11px">未投稿</div></div>`;

    const fl    = dd.flag_count ?? 0;
    const pcls  = fl >= 3 ? 'cp-r' : fl > 0 ? 'cp-a' : 'cp-g';
    const time  = fmtT(dd.posted_at);
    const flags = [
      dd.late_night_flag  ? '🌙' : '',
      dd.sentiment_flag   ? '😟' : '',
      dd.volume_flag      ? (dd.volume_ratio < 1 ? '📉' : '📈') : '',
    ].filter(Boolean).join('');
    const fLine = fl > 0 ? `<div class="cell-flag">${flags}</div>` : '';
    const title = `${d} ${time}${fl>0?' ⚠'+fl+'フラグ':''}`;
    return `<div class="wg-cell" onclick="gotoDay('${d}')" title="${title}">
      <div class="cell-pill ${pcls}">
        <div class="cell-time">${time}</div>${fLine}
      </div>
    </div>`;
  }).join('');

  const monBtn = S.role === 'admin' ? `<button class="mon-btn mon-on" onclick="toggleMon('${user.user_id}',0)">監視中</button>` : '';

  return `<div class="wg-row">
    <div class="wg-name">
      <div class="dot d-g"></div>
      <div class="wg-name-txt">${name}</div>
    </div>
    ${cells}
    <div class="wg-toggle">${monBtn}</div>
  </div>`;
}

/* ════════════════════════════════════════
   Members view
════════════════════════════════════════ */
function renderMembersV() {
  if (!S.members) { fetchMembers().then(render); return `<div class="spin-wrap"><div class="spinner"></div></div>`; }

  const gOpts = `<option value="">（未分類）</option>` +
    S.groups.map(g => `<option value="${g.id}">${g.parent_id?'　└ ':''}${g.name}</option>`).join('');

  const rows = S.members.map(m => {
    const name = m.display_name || m.real_name || m.user_id;
    const sel  = gOpts.replace(`value="${m.group_id??''}"`, `value="${m.group_id??''}" selected`);
    return `<div class="cr">

function renderUsersV() {

    const isMe = u.email === S.email;

/* ════════════════════════════════════════
   Event handlers
════════════════════════════════════════ */
function bindEvt() {
  const di = document.getElementById('d-inp');
  if (di) di.onchange = e => { S.date = e.target.value; S.dash = null; fetchDash(); };
}

async function runCheck() {
  const btn = document.getElementById('run-btn');
  if (btn) { btn.disabled = true; btn.textContent = '実行中...'; }
  try {
    const r = await api('POST', '/api/check/run', { date: S.date });
    if (r.ok) { toast(`✅ チェック完了（${r.count}名）`, 'ok'); S.dash = null; await fetchDash(); }
    else toast(`❌ ${r.error}`, 'err');
  } catch(e) { toast(`❌ ${e.message}`, 'err'); }
  if (btn) { btn.disabled = false; btn.textContent = '▶ チェック実行'; }
}

function gotoDay(d) {
  S.sub = 'day'; S.date = d; S.dash = null; fetchDash();
}

async function toggleMon(uid, isActive) {
  try {
    const r = await api('PATCH', `/api/members/${uid}`, { is_active: isActive });
    if (r.ok) {
      toast(isActive ? '✅ 監視再開' : '✅ 監視停止', 'ok');
      S.dash = null; S.weekly = null; S.members = null;
      if (S.view === 'overview') {
        if (S.sub === 'week') fetchWeekly();
        else fetchDash();
      } else if (S.view === 'members') {
        fetchMembers().then(render);
      }
    } else toast(`❌ ${r.error}`, 'err');
  } catch(e) { toast(`❌ ${e.message}`, 'err'); }
}

async function syncM() {
  toast('同期中...');
  try {
    const r = await api('POST', '/api/members/sync');
    if (r.ok) { toast('✅ 同期完了', 'ok'); S.members = null; await fetchMembers(); render(); }
    else toast(`❌ ${r.error}`, 'err');
  } catch(e) { toast(`❌ ${e.message}`, 'err'); }
}

async function patchM(uid, field, val) {
  try {
    const r = await api('PATCH', `/api/members/${uid}`, { [field]: val });
    if (r.ok) { toast('✅ 更新', 'ok'); S.members = null; await fetchMembers(); render(); }
    else toast(`❌ ${r.error}`, 'err');
  } catch(e) { toast(`❌ ${e.message}`, 'err'); }
}

async function addDept() {
  const name = document.getElementById('g-d-nm')?.value.trim();
  if (!name) return;
  const r = await api('POST', '/api/groups', { name });
  if (r.ok) { toast(`✅ "${name}" を追加`, 'ok'); S.groups = null; await fetchGroups(); render(); }
  else toast(`❌ ${r.error}`, 'err');
}

async function addTeam() {
  const name = document.getElementById('g-t-nm')?.value.trim();
  const pid  = parseInt(document.getElementById('g-t-par')?.value);
  if (!name || !pid) { toast('チーム名と親グループを選択してください', 'err'); return; }
  const r = await api('POST', '/api/groups', { name, parent_id: pid });
  if (r.ok) { toast(`✅ "${name}" を追加`, 'ok'); S.groups = null; await fetchGroups(); render(); }
  else toast(`❌ ${r.error}`, 'err');
}

async function delG(id, name) {
  if (!confirm(`"${name}" を削除しますか？`)) return;
  const r = await api('DELETE', `/api/groups/${id}`);
  if (r.ok) { toast(`✅ "${name}" を削除`, 'ok'); S.groups = null; await fetchGroups(); render(); }
  else toast(`❌ ${r.error}`, 'err');
}

async function sendInv() {
  const email = document.getElementById('inv-email')?.value.trim();
  const role  = document.getElementById('inv-role')?.value;
  if (!email) { toast('メールアドレスを入力してください', 'err'); return; }
  const r = await api('POST', '/api/invitations', { email, role });
  if (r.ok) {
    if (r.warning) {
      toast(`招待URLを発行しました`, 'ok');
      if (r.inviteUrl) prompt('招待URL（コピーして共有してください）:', r.inviteUrl);
    } else {
      toast(`✅ "${email}" に招待を送信しました`, 'ok');
    }
    S.dashUsers = null; await fetchDashUsers(); render();
  } else toast(`❌ ${r.error}`, 'err');
}

async function cancelInv(id, email) {
  if (!confirm(`"${email}" への招待を取り消しますか？`)) return;
  const r = await api('DELETE', `/api/invitations/${id}`);
  if (r.ok) { toast('✅ 招待を取り消しました', 'ok'); S.dashUsers = null; await fetchDashUsers(); render(); }
  else toast(`❌ ${r.error}`, 'err');
}

async function changeRole(id, role) {
  const r = await api('PATCH', `/api/users/${id}`, { role });
  if (r.ok) { toast('✅ 権限を変更しました', 'ok'); S.dashUsers = null; await fetchDashUsers(); render(); }
  else toast(`❌ ${r.error}`, 'err');
}

async function resetPw(id, email) {
  const pw = prompt(`"${email}" の新しいパスワード（8文字以上）:`);
  if (!pw) return;
  if (pw.length < 8) { toast('パスワードは8文字以上で設定してください', 'err'); return; }
  const r = await api('PATCH', `/api/users/${id}`, { password: pw });
  if (r.ok) toast('✅ パスワードを変更しました', 'ok');
  else toast(`❌ ${r.error}`, 'err');
}

async function delUser(id, email) {
  if (!confirm(`"${email}" を削除しますか？`)) return;
  const r = await api('DELETE', `/api/users/${id}`);
  if (r.ok) { toast(`✅ "${email}" を削除しました`, 'ok'); S.dashUsers = null; await fetchDashUsers(); render(); }
  else toast(`❌ ${r.error}`, 'err');
}

const DEFAULT_PROMPT = `## ロール
あなたは日本の職場における感情分析の専門家です。
日報テキストを読み、メンバーのコンディションスコアを算出してください。

---

## スコアの定義

コンディションスコアは 0.00〜1.00 の連続値です。

  1.00 = 強いポジティブ（エネルギーに満ち、充実している）
  0.00 = 強いネガティブ（疲弊・消耗・危機的状態）

スコアは必ず以下の5段階のいずれかの帯域に収まるよう算出してください。

  0.80〜1.00  GREEN    良好
  0.60〜0.79  YELLOW   やや注意
  0.40〜0.59  ORANGE   要観察
  0.20〜0.39  RED      要対応
  0.00〜0.19  CRITICAL 緊急対応

---

## スコア帯域のアンカー定義（必ず参照すること）

以下は各帯域の「典型的な日報の特徴」です。
採点前にここを読み、日報がどの帯域に近いかを先に判断してから数値を決めてください。

【GREEN 0.80〜1.00】
- 成果・進捗が具体的な数値・固有名詞つきで記述されている
- 感謝・協力者への言及が自然に含まれている
- 明日の計画が具体的かつ能動的
- 文章にエネルギーと手応えが感じられる
- 課題があっても「こう解決する」という能動的記述がある
- 例）「田中さんと一緒に提案を詰められ、先方の反応も良かった。明日は資料を仕上げてFBをもらう予定。」

【YELLOW 0.60〜0.79】
- 成果はあるが記述がやや淡白・形式的
- 「一応」「ひとまず」等の薄い達成感が1〜2個混在
- 課題の記述はあるが、解決策が「調整します」程度
- 文章量は普通だが、感情の起伏が感じられない
- 例）「商談3件対応しました。資料も一通り完成しています。明日は続きをやります。」

【ORANGE 0.40〜0.59】
- 「なんとか」「ひとまず」「一応」が複数回登場
- 先送り・持ち越しの記述が含まれる
- 「問題ありません」「大丈夫です」の過剰使用（強がりサイン）
- 明日の予定が「引き続き対応」「検討中」等の曖昧表現
- 文章が短くなり始め、具体性が薄れている
- 例）「なんとか商談3件こなしました。資料も一応完成。少し悩んでいることがあります。引き続き頑張ります。」

【RED 0.20〜0.39】
- 失敗・遅延の報告がある
- 「問題ありません」「大丈夫です」の後に内容が続かない（空洞の強がり）
- 「…」「持ち越し」「来週以降」が複数登場
- 明日の予定が「頑張ります」のみ
- 体調・疲労への言及がある
- 人物名・感謝表現が消えている
- 例）「商談はうまくいきませんでした。資料は来週以降になります。問題ありません。頑張ります。」

【CRITICAL 0.00〜0.19】
- 文章が極端に短い（3〜5行以下）
- 謝罪・自己否定が含まれる
- 体調不良・疲弊の直接言及
- 将来への言及がほぼ「やっていきます」のみ
- 業務の具体的記述がほぼ消失
- 例）「商談しました。資料、間に合いませんでした。申し訳ありません。体が重いです。やっていきます。」

---

## 採点手順（必ずこの順番で実行すること）

### STEP 1: 帯域判定
上記アンカーを参照し、この日報はどの帯域（GREEN/YELLOW/ORANGE/RED/CRITICAL）に最も近いかを先に決める。

### STEP 2: 7軸サブスコア算出
各軸を 0.00〜1.00 で採点する（高い＝ポジティブ）。

  軸1 直接的ポジティブ表現    (重み 15%)
      - ポジティブ感情語・達成感の表現が豊富なら高い
      - ネガティブ感情語・失敗報告が多いなら低い

  軸2 自然な達成感・充実感    (重み 20%)  ★最重要★
      - 「なんとか」「一応」「ひとまず」「とりあえず」の使用回数が多いほど低くなる
      - 「問題ありません」「大丈夫です」の過剰使用は強がりサインで低くなる
      - 「できました！」「うまくいきました」等の素直な達成感は高くなる
      - 受動態多用（〜させられた、〜になってしまった）は低くなる

  軸3 文末・語尾の活力        (重み 15%)
      - 「…」「〜」の多用で低くなる
      - 文章量が普段より極端に少ない場合は低くなる
      - 具体的で能動的な文末表現は高くなる

  軸4 業務記述の具体性        (重み 20%)  ★最重要★
      - 固有名詞（人名・社名・サービス名）が豊富なら高い
      - 数値（件数・金額・時間）が含まれるなら高い
      - 「対応しました」「やりました」だけの抽象表現は低くなる
      - 「持ち越し」「来週以降」「調整中」の登場回数が多いほど低くなる

  軸5 対人関係の豊かさ        (重み 10%)
      - 感謝・協力者への言及があれば高い
      - 人物名が全く登場しない場合は低くなる
      - 「認識の齟齬」「調整が発生」等の摩擦表現で低くなる

  軸6 体調・エネルギー        (重み 10%)
      - 体調不良・疲弊への言及があれば大きく低くなる
      - 「集中できなかった」「頭が回らない」も低くなる
      - 言及がなければ中間（0.50）をベースに他要素で調整

  軸7 将来への意欲            (重み 10%)
      - 明日の予定が具体的で能動的なら高い
      - 「頑張ります」「やっていきます」のみなら低い
      - 「未定」「調整中」が多い場合は低くなる

### STEP 3: 重み付き平均でスコア算出
score = 軸1×0.15 + 軸2×0.20 + 軸3×0.15 + 軸4×0.20 + 軸5×0.10 + 軸6×0.10 + 軸7×0.10

### STEP 4: 帯域との整合チェック
STEP1で判定した帯域とSTEP3のスコアが一致しているか確認する。
ズレている場合は、どちらが正しいかを再判断してスコアを調整する。
※ LLMは中間値（0.45〜0.55）に寄りがちなので、GREENまたはCRITICALの特徴が明確なら
  迷わず端の帯域を選ぶこと。

## キャリブレーション注意事項

1. 「真ん中に逃げない」
   特徴が明確な日報に 0.45〜0.55 を付けるのは誤り。
   CRITICALの特徴があれば 0.10〜0.15、GREENの特徴があれば 0.85〜0.95 を付ける。

2. 「ポジティブ偽装を見抜く」
   「問題ありません！大丈夫です！頑張ります！」
   → これはGREENではなくREDまたはCRITICALのサイン。

3. 「不在も検出する」
   人物名・感謝・具体的数値が消えていること自体がネガティブシグナル。

4. 「矮小化表現に敏感になる」
   「少し」「ちょっと」は日本語では「かなり」の意味を持つことが多い。
   「少し悩んでいます」→ 実際は深刻に悩んでいる可能性が高い。

5. 「文章量の絶対値より変化を重視する」
   普段長い人が急に短くなった場合にスコアを下げる。
   （前回スコアが提供されている場合は必ず参照すること）

{

async function resetPrompt() {
  const el = document.getElementById('c-sentiment_prompt');
  if (el) el.value = DEFAULT_PROMPT;
  const r = await api('PATCH', '/api/config/sentiment_prompt', { value: DEFAULT_PROMPT });
  if (r.ok) { toast('✅ デフォルトに戻しました', 'ok'); S.config = null; await fetchConfig(); render(); }
  else toast(`❌ ${r.error}`, 'err');
}

async function saveCfg(key) {
  const val = document.getElementById(`c-${key}`)?.value;
  if (val === undefined) return;
  try {
    const r = await api('PATCH', `/api/config/${key}`, { value: val });
    if (r.ok) toast('✅ 保存しました', 'ok');
    else toast(`❌ ${r.error}`, 'err');
  } catch(e) { toast(`❌ ${e.message}`, 'err'); }
}

/* ════════════════════════════════════════
   Formatters
════════════════════════════════════════ */
function fmtT(isoUtc) {
  if (!isoUtc) return '—';
  const jst = new Date(new Date(isoUtc).getTime() + 9 * 3600000);
  return `${String(jst.getUTCHours()).padStart(2,'0')}:${String(jst.getUTCMinutes()).padStart(2,'0')}`;
}
function fmtP(ratio) {
  if (ratio === null || ratio === undefined) return '—';
  const p = Math.round((ratio - 1) * 100);
  return p >= 0 ? `+${p}%` : `${p}%`;
}

api('GET', '/api/me').then(r => {
  if (!r.role) return;
  S.role        = r.role || 'viewer';
  S.email       = r.email || '';
  S.displayName = r.displayName || '';
  ['members','groups','settings','users'].forEach(v => {
    const el = document.getElementById(`nv-${v}`);
    if (el) el.style.display = S.role === 'admin' ? '' : 'none';
  });
  const label = S.displayName || S.email || '–';
  const userEl = document.getElementById('sb-user');
  if (userEl) userEl.textContent = label;
  const avatarEl = document.getElementById('sb-avatar');
  if (avatarEl) avatarEl.textContent = label.charAt(0).toUpperCase();
});

fetchDash();
setInterval(() => {
  if (S.view === 'overview') {
    if (S.sub === 'week') fetchWeekly();
    else fetchDash();
  }
}, 60000);
