<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日報チェッカー</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --sw: 228px;
  /* Green primary */
  --c-pri:    #16a34a;
  --c-pri-h:  #15803d;
  --c-pri-lt: #f0fdf4;
  --c-pri-s:  #dcfce7;
  --c-pri-m:  #bbf7d0;
  /* Sidebar */
  --c-sb:     #0b1a0e;
  --c-sb2:    #162b1a;
  --c-sb3:    #1e3d24;
  --c-sbT:    #86efac;
  --c-sbT2:   #4ade80;
  /* Layout */
  --c-bg:     #f0fdf4;
  --c-sur:    #ffffff;
  --c-bdr:    #e5e7eb;
  --c-bdr2:   #d1fae5;
  /* Text */
  --c-t1:     #111827;
  --c-t2:     #374151;
  --c-t3:     #6b7280;
  --c-t4:     #9ca3af;
  /* Status */
  --c-red:    #ef4444; --c-redB:  #fef2f2; --c-redBr: #fca5a5; --c-redS: #fee2e2;
  --c-amb:    #f59e0b; --c-ambB:  #fffbeb; --c-ambBr: #fcd34d; --c-ambS: #fef3c7;
  --c-grn:    #22c55e; --c-grnB:  #f0fdf4; --c-grnBr: #86efac;
  --c-blu:    #3b82f6; --c-bluB:  #eff6ff;
  /* Shadows */
  --sh0: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  --sh1: 0 4px 16px rgba(0,0,0,.08), 0 1px 4px rgba(0,0,0,.04);
  --sh-g: 0 4px 20px rgba(22,163,74,.18);
  --r: 12px; --r2: 8px; --r3: 6px;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
               "Hiragino Sans","Hiragino Kaku Gothic ProN","Yu Gothic UI",Meiryo,sans-serif;
  font-size: 14px; line-height: 1.5; color: var(--c-t1);
}

/* ── Layout ── */
.layout { display: flex; height: 100vh; overflow: hidden; }

/* ── Sidebar ── */
.sb {
  width: var(--sw);
  background: linear-gradient(180deg, var(--c-sb) 0%, #0d1f11 100%);
  display: flex; flex-direction: column; flex-shrink: 0;
  position: relative;
}
.sb::after {
  content: '';
  position: absolute; right: 0; top: 0; bottom: 0; width: 1px;
  background: linear-gradient(180deg, transparent, rgba(34,197,94,.15), transparent);
}

.sb-logo {
  display: flex; align-items: center; gap: 10px;
  padding: 22px 18px 18px;
  border-bottom: 1px solid rgba(255,255,255,.06);
}
.sb-logo-ico {
  font-size: 22px;
  width: 36px; height: 36px; border-radius: 10px;
  background: linear-gradient(135deg, #22c55e, #16a34a);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  box-shadow: 0 2px 8px rgba(34,197,94,.4);
}
.sb-logo-wrap {}
.sb-logo-txt { color: #fff; font-weight: 800; font-size: 14px; letter-spacing: -.02em; }
.sb-logo-sub { color: var(--c-sbT); font-size: 10px; opacity: .7; }

.sb-nav { padding: 12px 8px; flex: 1; }
.nv {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 12px; border-radius: 8px;
  margin-bottom: 2px; color: var(--c-sbT); font-size: 13px; font-weight: 500;
  cursor: pointer; user-select: none;
  transition: background .12s, color .12s;
}
.nv:hover  { background: var(--c-sb2); color: #d1fae5; }
.nv.active {
  background: linear-gradient(135deg, rgba(34,197,94,.2), rgba(22,163,74,.15));
  color: #fff;
  border: 1px solid rgba(34,197,94,.25);
}
.nv-ico { font-size: 15px; width: 20px; text-align: center; flex-shrink: 0; }
.nv-badge {
  margin-left: auto; display: inline-flex; align-items: center; justify-content: center;
  min-width: 20px; height: 20px; padding: 0 5px;
  background: var(--c-red); color: #fff; font-size: 11px; font-weight: 700; border-radius: 100px;
}

.sb-foot {
  padding: 14px 12px;
  border-top: 1px solid rgba(255,255,255,.06);
}
.sb-user-card {
  background: rgba(255,255,255,.05);
  border: 1px solid rgba(255,255,255,.08);
  border-radius: 10px; padding: 10px 12px;
  display: flex; align-items: center; gap: 10px;
}
.sb-avatar {
  width: 32px; height: 32px; border-radius: 50%;
  background: linear-gradient(135deg, #22c55e, #0d9488);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 800; color: #fff; flex-shrink: 0;
}
.sb-user-info { flex: 1; min-width: 0; }
.sb-user-name { color: #e2e8f0; font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sb-user-cron { color: var(--c-sbT); font-size: 10.5px; margin-top: 1px; opacity: .7; }
.sb-logout {
  color: var(--c-sbT); font-size: 13px; text-decoration: none; flex-shrink: 0;
  transition: color .12s; line-height: 1;
}
.sb-logout:hover { color: #fff; }

/* ── Main ── */
.main { flex: 1; overflow-y: auto; background: var(--c-bg); }
.page { padding: 28px; max-width: 1200px; }

/* ── Topbar ── */
.topbar {
  display: flex; align-items: flex-start; justify-content: space-between;
  margin-bottom: 24px; gap: 14px;
}
.tb-left { min-width: 0; }
.tb-title { font-size: 20px; font-weight: 800; display: flex; align-items: center; gap: 12px; letter-spacing: -.02em; color: var(--c-t1); }
.tb-sub   { font-size: 12.5px; color: var(--c-t3); margin-top: 4px; display: flex; align-items: center; gap: 6px; }
.tb-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--c-grn); display: inline-block; animation: pulse 2s infinite; }
@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(34,197,94,.4); }
  50% { box-shadow: 0 0 0 4px rgba(34,197,94,0); }
}

/* ── View tabs ── */
.view-tabs {
  display: inline-flex; gap: 2px;
  background: rgba(0,0,0,.04); border-radius: 10px; padding: 3px;
}
.vtab {
  padding: 5px 16px; font-size: 13px; font-weight: 600; border-radius: 7px;
  cursor: pointer; color: var(--c-t3); transition: background .12s, color .12s;
}
.vtab.active { background: #fff; color: var(--c-pri); box-shadow: var(--sh0); }

/* ── Buttons ── */
.btn {
  padding: 8px 16px; border-radius: var(--r2); font-size: 13px; font-weight: 600;
  border: none; cursor: pointer; transition: opacity .15s, transform .1s;
  white-space: nowrap; font-family: inherit;
}
.btn:hover:not(:disabled) { opacity: .88; transform: translateY(-1px); }
.btn:active { transform: translateY(0); }
.btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }
.btn-pri {
  background: linear-gradient(135deg, #22c55e, #16a34a);
  color: #fff; box-shadow: var(--sh-g);
}
.btn-sec {
  background: var(--c-sur); color: var(--c-t2);
  border: 1.5px solid var(--c-bdr);
  box-shadow: var(--sh0);
}
.btn-sm  { padding: 5px 11px; font-size: 12px; }

/* ── Inputs ── */
.inp {
  padding: 7px 12px; border: 1.5px solid var(--c-bdr2);
  border-radius: var(--r2); font-size: 13px; color: var(--c-t1);
  background: #fafffe; outline: none; transition: border-color .15s, box-shadow .15s;
  font-family: inherit;
}
.inp:focus { border-color: var(--c-grn); box-shadow: 0 0 0 3px rgba(34,197,94,.12); }
select.inp { cursor: pointer; }

/* ── Stats bar (compact) ── */
.stats { display:flex; align-items:center; flex-wrap:wrap; background:var(--c-sur); border:1.5px solid var(--c-bdr); border-radius:var(--r); padding:8px 4px; margin-bottom:14px; box-shadow:var(--sh0); }
.sc { display:flex; align-items:center; gap:6px; padding:5px 16px; border-right:1px solid var(--c-bdr2); }
.sc:last-child { border-right:none; }
.sc-ico { font-size:15px; line-height:1; }
.sc-val { font-size:18px; font-weight:800; color:var(--c-t1); line-height:1; }
.sc.s-g .sc-val { color: var(--c-pri); }
.sc.s-a .sc-val { color: var(--c-amb); }
.sc.s-r .sc-val { color: var(--c-red); }
.sc-lbl { font-size:11px; color:var(--c-t3); font-weight:600; }

/* ── Section ── */
.sec { margin-bottom: 28px; }
.sec-ttl { font-size: 14px; font-weight: 800; display: flex; align-items: center; gap: 8px; margin-bottom: 12px; color: var(--c-t1); letter-spacing: -.01em; }
.cnt-badge { display: inline-flex; align-items: center; justify-content: center; background: var(--c-red); color: #fff; font-size: 11px; font-weight: 700; border-radius: 100px; padding: 2px 7px; min-width: 22px; }

/* ── Alert cards ── */
.ac {
  background: var(--c-sur); border: 1.5px solid var(--c-redBr);
  border-left: 4px solid var(--c-red);
  border-radius: var(--r); padding: 16px 20px; margin-bottom: 10px; box-shadow: var(--sh0);
}
.ac.warn { border-color: var(--c-ambBr); border-left-color: var(--c-amb); }
.ac-hd { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.ac-who { display: flex; align-items: center; gap: 10px; }
.ac-name { font-size: 15px; font-weight: 800; }
.ac-grp  { font-size: 12px; color: var(--c-t3); margin-top: 2px; }
.ac-chips { display: flex; gap: 6px; flex-wrap: wrap; }
.ac-dets { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
.det-box {
  background: var(--c-bg); border: 1.5px solid var(--c-bdr2);
  border-radius: var(--r2); padding: 10px 14px; flex: 1; min-width: 110px;
}
.det-lbl { font-size: 10.5px; color: var(--c-t4); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 4px; font-weight: 700; }
.det-val { font-size: 16px; font-weight: 800; }

/* ── Chips ── */
.chip { display: inline-flex; align-items: center; gap: 3px; padding: 3px 9px; border-radius: 100px; font-size: 11.5px; font-weight: 700; white-space: nowrap; }
.c-r { background: var(--c-redS);  color: var(--c-red); }
.c-a { background: var(--c-ambS);  color: #92400e; }
.c-g { background: var(--c-pri-s); color: var(--c-pri); }
.c-b { background: var(--c-bluB);  color: var(--c-blu); }
.c-x { background: #f1f5f9; color: var(--c-t3); border: 1px solid var(--c-bdr); }
.c-p { background: #f5f3ff; color: #7c3aed; }

/* ── Dot ── */
.dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.d-g { background: var(--c-grn); box-shadow: 0 0 0 3px rgba(34,197,94,.2); }
.d-a { background: var(--c-amb); box-shadow: 0 0 0 3px rgba(245,158,11,.2); }
.d-r { background: var(--c-red); box-shadow: 0 0 0 3px rgba(239,68,68,.2); }
.d-n { background: transparent; border: 2px solid var(--c-t4); }

/* ── Monitor toggle ── */
.mon-btn {
  padding: 3px 10px; border-radius: 100px; font-size: 11px; font-weight: 700;
  border: 1.5px solid; cursor: pointer; transition: all .12s; background: none;
  font-family: inherit; white-space: nowrap;
}
.mon-on  { background: var(--c-pri-s); color: var(--c-pri); border-color: var(--c-pri-m); }
.mon-off { background: #f1f5f9; color: var(--c-t3); border-color: var(--c-bdr); }

/* ── Dept block ── */
.db {
  background: var(--c-sur); border: 1.5px solid var(--c-bdr);
  border-radius: var(--r); margin-bottom: 14px; overflow: hidden; box-shadow: var(--sh0);
}
.db-hd {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 18px; background: #fafffe; border-bottom: 1.5px solid var(--c-bdr2);
}
.db-hd-name { font-weight: 800; font-size: 13.5px; color: var(--c-t1); }
.db-hd-stat { font-size: 12px; color: var(--c-t3); }
.tm-hd {
  display: flex; align-items: center; justify-content: space-between;
  padding: 7px 18px 7px 30px; background: #f7fef9; border-bottom: 1px solid var(--c-bdr2);
}
.tm-hd-name { font-weight: 700; font-size: 12.5px; color: var(--c-pri); }
.tm-hd-stat { font-size: 11.5px; color: var(--c-t4); }

/* ── Member rows ── */
.mr {
  display: grid; grid-template-columns: 20px 1fr 100px 88px 180px 78px 68px;
  align-items: start; gap: 10px; padding: 11px 18px;
  border-bottom: 1px solid #f3faf5; transition: background .1s;
}
.mr:last-child { border-bottom: none; }
.mr:hover { background: #fafff9; }
.mr.rf { background: #fffdf0; }
.mr.rf:hover { background: #fef9e0; }
.mr.rc { background: #fff5f5; }
.mr.rc:hover { background: #fef2f2; }
.mr.rm { background: #fff8f8; border-left: 3px solid var(--c-red); }
.mr.rm:hover { background: #fff2f2; }

/* Signal pill */
.sig-pill { display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:100px;font-size:11px;font-weight:700; }
.sig-r { background:var(--c-redS); color:var(--c-red); }
.sig-y { background:var(--c-ambS); color:#92400e; }
.sig-g { background:var(--c-pri-s); color:var(--c-pri); }

/* Summary text */
.mr-summary { font-size:11px;color:var(--c-t3);margin-top:2px;font-style:italic; }
.ac-summary { font-size:12.5px;color:var(--c-t2);font-style:italic;background:var(--c-bg);border-radius:8px;padding:8px 12px;margin-bottom:10px;border-left:3px solid var(--c-pri-m); }

/* Missing grid */
.missing-grid { display:flex;flex-wrap:wrap;gap:8px; }
.missing-card { background:#fff5f5;border:1.5px solid var(--c-redBr);border-radius:10px;padding:10px 16px;min-width:110px; }
.missing-card-name { font-weight:700;font-size:13px;color:var(--c-t1); }
.missing-card-grp  { font-size:11px;color:var(--c-t3);margin-top:2px; }
.th-row {
  display: grid; grid-template-columns: 20px 1fr 100px 88px 180px 78px 68px;
  align-items: center; gap: 10px; padding: 8px 18px;
  background: #f0fdf4; border-bottom: 1.5px solid var(--c-bdr2);
}
.th { font-size: 10.5px; font-weight: 800; color: var(--c-pri); text-transform: uppercase; letter-spacing: .07em; }
.th-r { text-align: right; }
.mr-name  { font-weight: 700; font-size: 13.5px; }
.mr-meta  { font-size: 11px; color: var(--c-t4); margin-top: 1px; }
.mr-time  { font-size: 13px; font-variant-numeric: tabular-nums; }
.mr-sent  { font-size: 13px; }
.mr-vol   { font-size: 13px; font-variant-numeric: tabular-nums; }
.mr-flags { display: flex; gap: 4px; justify-content: flex-end; flex-wrap: wrap; }

/* ── Weekly grid ── */
.wk-nav { display: flex; align-items: center; gap: 10px; }
.wk-range { font-weight: 800; font-size: 15px; min-width: 220px; text-align: center; color: var(--c-t1); }
.wk-arr {
  width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
  border-radius: 8px; background: var(--c-sur); border: 1.5px solid var(--c-bdr);
  cursor: pointer; font-size: 16px; line-height: 1; transition: background .12s, border-color .12s;
  user-select: none; box-shadow: var(--sh0);
}
.wk-arr:hover { background: var(--c-pri-lt); border-color: var(--c-pri-m); }
.wk-stats {
  display: flex; gap: 28px; background: var(--c-sur); border: 1.5px solid var(--c-bdr2);
  border-radius: var(--r); padding: 16px 24px; margin-bottom: 18px; box-shadow: var(--sh0);
}
.ws-item { display: flex; align-items: baseline; gap: 6px; }
.ws-val { font-size: 26px; font-weight: 900; color: var(--c-t1); letter-spacing: -.03em; }
.ws-lbl { font-size: 12px; color: var(--c-t3); }
.wk-wrap { overflow-x: auto; }
.wk-block {
  min-width: 760px; background: var(--c-sur); border: 1.5px solid var(--c-bdr);
  border-radius: var(--r); overflow: hidden; box-shadow: var(--sh0); margin-bottom: 14px;
}
.wk-dept-hd {
  display: flex; align-items: center; justify-content: space-between;
  padding: 11px 16px; background: #fafffe; border-bottom: 1.5px solid var(--c-bdr2);
}
.wk-dept-nm { font-weight: 800; font-size: 13.5px; color: var(--c-t1); }
.wk-tm-hd { padding: 7px 16px 7px 26px; background: #f7fef9; border-bottom: 1px solid var(--c-bdr2); font-weight: 700; font-size: 12.5px; color: var(--c-pri); }

/* Week grid row */
.wg-row { display: grid; grid-template-columns: 180px repeat(5, 1fr) 110px 68px; border-bottom: 1px solid #f3faf5; align-items: stretch; }
.wg-row:last-child { border-bottom: none; }
.wg-row:hover .wg-name { background: #fafff9; }
.wg-hd-row { display: grid; grid-template-columns: 180px repeat(5, 1fr) 110px 68px; border-bottom: 2px solid var(--c-bdr2); background: #f0fdf4; }
.wg-hd-cell { padding: 8px 4px; text-align: center; font-size: 11.5px; font-weight: 800; color: var(--c-pri); border-left: 1px solid var(--c-bdr2); }
.wg-hd-cell:first-child { border-left: none; }
.wg-hd-cell.today { color: #fff; background: var(--c-pri); }
.wg-weekly-cell { border-left: 2px solid var(--c-bdr2); padding: 6px 6px; display: flex; align-items: center; justify-content: center; background: #f7fef9; }
.wg-weekly-hd { border-left: 2px solid var(--c-pri-m) !important; background: #dcfce7 !important; color: var(--c-pri) !important; font-size: 11px !important; }
.wg-name { display: flex; align-items: center; gap: 8px; padding: 9px 14px; font-size: 13px; font-weight: 700; min-width: 0; }
.wg-name-txt { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
.wg-cell { border-left: 1px solid var(--c-bdr2); padding: 5px 4px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
.wg-cell:hover .cell-pill { filter: brightness(.96); }
.wg-cell.wkend { background: #fafafa; cursor: default; }
.wg-cell.future { cursor: default; }
.cell-pill { display: flex; flex-direction: column; align-items: center; padding: 4px 6px; border-radius: 8px; min-width: 54px; max-width: 80px; font-size: 11.5px; font-weight: 700; line-height: 1.35; text-align: center; transition: filter .1s; }
.cp-g { background: var(--c-pri-s); color: var(--c-pri); }
.cp-a { background: var(--c-ambS); color: #92400e; }
.cp-r { background: var(--c-redS); color: var(--c-red); }
.cp-none { background: #f1f5f9; color: var(--c-t4); border: 1.5px dashed var(--c-bdr); }
.cp-fut { background: repeating-linear-gradient(45deg,#f8fafc 0,#f8fafc 3px,#f0f7f1 3px,#f0f7f1 6px); min-width: 54px; height: 34px; border-radius: 8px; }
.cp-wk  { opacity: .4; pointer-events: none; }
.cell-time { font-size: 12px; font-weight: 800; }
.cell-flag { font-size: 10px; opacity: .85; margin-top: 1px; }
.wg-toggle { border-left: 1px solid var(--c-bdr2); display: flex; align-items: center; justify-content: center; padding: 6px 4px; }

/* ── Org score card ── */
.org-card { background:var(--c-sur); border:1.5px solid var(--c-bdr); border-radius:var(--r); padding:16px 20px; margin-bottom:16px; box-shadow:var(--sh0); }
.org-card-top { display:flex; align-items:center; gap:14px; margin-bottom:10px; }
.org-card-sig { display:flex; align-items:center; gap:8px; }
.org-card-label { font-size:11px; font-weight:700; color:var(--c-t3); text-transform:uppercase; letter-spacing:.05em; }
.org-card-vals { display:flex; align-items:baseline; gap:16px; flex:1; }
.org-score-big { font-size:26px; font-weight:800; }
.org-rate-txt { font-size:14px; font-weight:700; color:var(--c-t2); }
.org-summary-line { font-size:12.5px; color:var(--c-t2); padding-top:10px; border-top:1px solid var(--c-bdr2); font-style:italic; }
/* Group mini-cards */
.org-grp-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:10px; margin-bottom:16px; }
.org-grp-card { background:var(--c-sur); border:1.5px solid var(--c-bdr); border-radius:10px; padding:12px 14px; box-shadow:var(--sh0); }
.org-grp-child { border-style:dashed; background:#fafff9; }
.org-grp-hd { display:flex; align-items:center; gap:7px; margin-bottom:8px; }
.org-grp-name { font-size:12px; font-weight:700; color:var(--c-t1); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.org-grp-body { display:flex; align-items:baseline; gap:10px; margin-bottom:4px; }
.org-grp-score { font-size:22px; font-weight:800; }
.org-grp-rate { font-size:12px; color:var(--c-t3); font-weight:600; }
.org-grp-sig { font-size:11px; color:var(--c-t3); }
/* Weekly org row */
.wg-org-row { display:grid; grid-template-columns:180px repeat(5,1fr) 110px 68px; border-bottom:1px solid var(--c-bdr2); background:#f0fdf4; }
.wg-org-row.grp { background:#fafff9; }
.wg-org-name { display:flex; align-items:center; gap:8px; padding:9px 14px; font-size:11.5px; font-weight:800; color:var(--c-pri); }

/* ── Card ── */
.card {
  background: var(--c-sur); border: 1.5px solid var(--c-bdr);
  border-radius: var(--r); overflow: hidden; box-shadow: var(--sh0); margin-bottom: 16px;
}
.cr {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 20px; border-bottom: 1px solid #f0fdf4; gap: 14px;
}
.cr:last-child { border-bottom: none; }
.cr:hover { background: #fafff9; }
.cr-lbl { font-weight: 700; font-size: 13.5px; margin-bottom: 3px; color: var(--c-t1); }
.cr-desc { font-size: 12px; color: var(--c-t3); }
.cr-ctrl { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

/* ── Colors ── */
.t-r { color: var(--c-red); }
.t-a { color: var(--c-amb); }
.t-g { color: var(--c-pri); }
.t-3 { color: var(--c-t3); }
.t-b { color: var(--c-blu); }

/* ── Toast ── */
.toast {
  position: fixed; bottom: 24px; right: 24px;
  background: var(--c-t1); color: #fff;
  padding: 12px 18px; border-radius: var(--r); font-size: 13px; font-weight: 600;
  box-shadow: 0 8px 24px rgba(0,0,0,.18); z-index: 9999; pointer-events: none;
  opacity: 0; transform: translateY(8px); transition: opacity .2s, transform .2s;
}
.toast.on { opacity: 1; transform: none; }
.to-ok  { background: var(--c-pri); }
.to-err { background: var(--c-red); }

/* ── Spinner ── */
.spin-wrap { display: flex; align-items: center; justify-content: center; padding: 80px; }
@keyframes sp { to { transform: rotate(360deg); } }
.spinner { width: 32px; height: 32px; border-radius: 50%; border: 3px solid var(--c-pri-m); border-top-color: var(--c-pri); animation: sp .7s linear infinite; }

/* ── Empty ── */
.empty { text-align: center; padding: 56px 20px; color: var(--c-t3); }
.empty-ico { font-size: 44px; margin-bottom: 14px; }
.empty-ttl { font-size: 16px; font-weight: 800; color: var(--c-t2); margin-bottom: 6px; }

/* ── 勝ち負けBoard ── */
.wl-hero {
  display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px;
}
.wl-hero-card {
  flex: 1; min-width: 140px;
  border-radius: var(--r); padding: 16px 20px; text-align: center;
}
.wl-hero-card.wins  { background: #eff6ff; border: 2px solid #93c5fd; }
.wl-hero-card.losses{ background: #faf5ff; border: 2px solid #c4b5fd; }
.wl-hero-card.dual  { background: var(--c-pri-s); border: 2px solid var(--c-pri-m); }
.wl-hero-card.refl  { background: #fff7ed; border: 2px solid #fed7aa; }
.wl-hero-num { font-size: 36px; font-weight: 900; letter-spacing: -.03em; line-height: 1; }
.wl-hero-lbl { font-size: 11.5px; font-weight: 700; margin-top: 4px; }
.wl-hero-card.wins  .wl-hero-num { color: #1d4ed8; }
.wl-hero-card.losses.wl-hero-num { color: #7c3aed; }
.wl-hero-card.dual  .wl-hero-num { color: var(--c-pri); }
.wl-hero-card.refl  .wl-hero-num { color: #c2410c; }
.wl-hero-card.wins  .wl-hero-lbl { color: #1d4ed8; }
.wl-hero-card.losses .wl-hero-lbl{ color: #7c3aed; }
.wl-hero-card.dual  .wl-hero-lbl { color: var(--c-pri); }
.wl-hero-card.refl  .wl-hero-lbl { color: #c2410c; }
/* メンバーカード */
.wl-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 14px;
  margin-bottom: 24px;
}
.wl-card {
  background: #fff; border: 1.5px solid var(--c-bdr);
  border-radius: var(--r); overflow: hidden; box-shadow: var(--sh0);
}
.wl-card.sig-red    { border-top: 3px solid var(--c-red); }
.wl-card.sig-yellow { border-top: 3px solid var(--c-amb); }
.wl-card.sig-green  { border-top: 3px solid var(--c-grn); }
.wl-card.sig-none   { border-top: 3px solid var(--c-bdr); opacity: .55; }
.wl-card-hd {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 14px; background: #fafffe; border-bottom: 1px solid var(--c-bdr2);
}
.wl-card-name { font-weight: 800; font-size: 13.5px; color: var(--c-t1); }
.wl-card-meta { font-size: 11px; color: var(--c-t3); margin-top: 1px; }
.wl-card-body { padding: 10px 14px; display: flex; flex-direction: column; gap: 8px; }
.wl-wins-box {
  background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 8px; padding: 8px 10px;
}
.wl-losses-box {
  background: #faf5ff; border: 1px solid #ddd6fe; border-radius: 8px; padding: 8px 10px;
}
.wl-box-lbl {
  font-size: 9.5px; font-weight: 900; letter-spacing: .06em; margin-bottom: 4px;
}
.wl-wins-box   .wl-box-lbl { color: #1d4ed8; }
.wl-losses-box .wl-box-lbl { color: #7c3aed; }
.wl-box-txt { font-size: 12px; line-height: 1.55; }
.wl-wins-box   .wl-box-txt { color: #1e3a8a; }
.wl-losses-box .wl-box-txt { color: #4c1d95; }
.wl-no-data {
  background: #f8fafc; border: 1.5px dashed var(--c-bdr); border-radius: 8px;
  padding: 8px 10px; font-size: 12px; color: var(--c-t4); text-align: center;
}
.wl-refl-bar {
  display: flex; align-items: center; gap: 6px; margin-top: 2px;
}
.wl-refl-track {
  flex: 1; height: 5px; background: var(--c-bdr); border-radius: 3px; overflow: hidden;
}
.wl-refl-fill {
  height: 100%; border-radius: 3px;
  background: linear-gradient(90deg, #f59e0b, #22c55e);
}
.wl-dept-ttl {
  font-size: 13px; font-weight: 800; color: var(--c-t1);
  display: flex; align-items: center; gap: 8px;
  padding-bottom: 10px; margin-bottom: 12px;
  border-bottom: 2px solid var(--c-bdr2);
}
.wl-no-post {
  background: #fff5f5; border: 1.5px solid var(--c-redBr); border-radius: 8px;
  padding: 6px 12px; font-size: 11.5px; color: var(--c-red); font-weight: 600;
}
/* 期間タブ */
.wl-period-tabs {
  display: flex; gap: 3px;
  background: rgba(0,0,0,.06); padding: 3px; border-radius: 8px;
}
.wl-period-tab {
  padding: 5px 14px; border-radius: 6px; font-size: 12.5px; font-weight: 600;

}
.wl-period-tab.active {
  background: #fff; color: var(--c-t1);

}
/* 週/月ナビゲーション */
.wl-period-nav { display: flex; align-items: center; gap: 6px; }
.wl-period-range {
  font-size: 12px; font-weight: 700; color: var(--c-t2);
  min-width: 154px; text-align: center;
}
.wl-nav-btn {
  width: 28px; height: 28px; border: 1.5px solid var(--c-bdr);
  border-radius: 6px; background: #fff; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; color: var(--c-t2); line-height: 1;
}
.wl-nav-btn:hover { background: var(--c-bg); }
/* 週次タイムライン */
.wl-week-day {
  display: grid; grid-template-columns: 44px 10px 1fr;
  gap: 8px; align-items: start;
  padding: 7px 14px; border-top: 1px solid var(--c-bdr2);
}
.wl-week-day:first-child { border-top: none; }
.wl-day-lbl { font-size: 10.5px; font-weight: 700; color: var(--c-t3); padding-top: 1px; }
.wl-day-dot {
  width: 8px; height: 8px; border-radius: 50%; margin-top: 3px; flex-shrink: 0;
  background: var(--c-bdr);
}
.wl-day-dot.red    { background: var(--c-red); }
.wl-day-dot.yellow { background: var(--c-amb); }

.wl-day-content { min-width: 0; font-size: 11.5px; line-height: 1.5; }
.wl-day-w { color: #1d4ed8; }
.wl-day-l { color: #7c3aed; margin-top: 2px; }

/* 月次リスト */

.buddy-avatar {

  background: linear-gradient(135deg,#16a34a,#4ade80);
  display: flex; align-items: center; justify-content: center;

.buddy-hd-info { flex: 1; min-width: 0; }

.buddy-hd-desc { font-size: 10.5px; color: var(--c-t3); }

.buddy-msg.user .buddy-msg-ico { background: var(--c-bdr2); color: var(--c-t3); }
.buddy-bubble {

}
.buddy-msg.assistant .buddy-bubble {
  background: #f0fdf4; border: 1px solid var(--c-bdr2); color: var(--c-t1);
  border-radius: 4px 14px 14px 14px;
}
.buddy-msg.user .buddy-bubble {
  background: var(--c-pri); color: #fff;
  border-radius: 14px 4px 14px 14px;
}
.buddy-typing { display: flex; gap: 5px; padding: 12px 16px; background: #f0fdf4; border: 1px solid var(--c-bdr2); border-radius: 4px 14px 14px 14px; width: fit-content; }
.buddy-typing span { width: 8px; height: 8px; border-radius: 50%; background: var(--c-pri); animation: bdot 1.2s infinite; }
.buddy-typing span:nth-child(2) { animation-delay: .2s; }
.buddy-typing span:nth-child(3) { animation-delay: .4s; }
@keyframes bdot { 0%,80%,100%{opacity:.2;transform:scale(.8)} 40%{opacity:1;transform:scale(1)} }
.buddy-input-area {

}

.buddy-send {

}

.buddy-send:disabled { background: var(--c-bdr2); cursor: not-allowed; }
</style>
</head>

<script>
/* ════════════════════════════════════════
   State
════════════════════════════════════════ */
const S = {
  view:     'overview',
  sub:      'day',
  date:     today(),
  weekDate: today(),
  dash:      null,
  weekly:    null,
  members:   null,
  groups:    null,
  config:    null,
  dashUsers:   null,
  invitations: null,
  loading:   false,
  role:      'viewer',
  email:     '',
  displayName: '',
  winsPeriod: 'daily',
  winsRange:  {},
};

function today() {
  return new Date(Date.now() + 9 * 3600000).toISOString().slice(0, 10);
}
function addDays(d, n) {
  return new Date(new Date(d + 'T00:00:00Z').getTime() + n * 86400000).toISOString().slice(0, 10);
}
function weekStart(d) {
  const dt = new Date(d + 'T00:00:00Z');
  const off = dt.getUTCDay() === 0 ? 6 : dt.getUTCDay() - 1;
  return addDays(d, -off);
}
function fmtWeekLabel(d) {
  const dt = new Date(d + 'T00:00:00Z');
  return `${dt.getUTCMonth()+1}月${dt.getUTCDate()}日`;
}
function fmtDayHd(d) {
  const dt  = new Date(d + 'T00:00:00Z');
  const day = ['日','月','火','水','木','金','土'][dt.getUTCDay()];
  return `${day}\n${dt.getUTCMonth()+1}/${dt.getUTCDate()}`;
}
function isWkend(d) { const w = new Date(d + 'T00:00:00Z').getUTCDay(); return w===0||w===6; }

/* ════════════════════════════════════════
   Navigation
════════════════════════════════════════ */
function nav(view) {
  S.view = view;
  document.querySelectorAll('.nv').forEach(el => el.classList.toggle('active', el.dataset.view === view));
  render();
}

function switchSub(sub) {
  S.sub = sub;
  if (sub === 'week' && !S.weekly) fetchWeekly();
  else render();
}

function navWeek(dir) {
  S.weekDate = addDays(S.weekDate, dir * 7);
  S.weekly = null;
  fetchWeekly();
}

/* ════════════════════════════════════════
   API
════════════════════════════════════════ */
async function api(method, url, body) {
  const res = await fetch(url, {
    method,
    headers: body ? {'Content-Type':'application/json'} : {},
    body: body ? JSON.stringify(body) : undefined,
  });
  if (res.status === 401) { window.location.href = '/login.html'; return {}; }
  return res.json();
}

/* ════════════════════════════════════════
   Toast
════════════════════════════════════════ */
let _tt;
function toast(msg, type='') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast on ${type==='ok'?'to-ok':type==='err'?'to-err':''}`;
  clearTimeout(_tt);
  _tt = setTimeout(() => el.classList.remove('on'), 3000);
}

/* ════════════════════════════════════════
   Fetch
════════════════════════════════════════ */
async function fetchDash() {
  S.loading = true; render();
  try {
    S.dash = await api('GET', `/api/dashboard?date=${S.date}`);
    updateSB(S.dash);
  } catch(e) { console.error(e); }
  S.loading = false; render();
}
async function fetchWeekly() {
  S.loading = true; render();
  try { S.weekly = await api('GET', `/api/weekly?date=${S.weekDate}`); }
  catch(e) { console.error(e); }
  S.loading = false; render();
}
async function fetchMembers() { const [m,g] = await Promise.all([api('GET','/api/members'), api('GET','/api/groups')]); S.members=m; S.groups=g; }
async function fetchDashUsers() {
  const [users, invs] = await Promise.all([api('GET', '/api/users'), api('GET', '/api/invitations')]);
  S.dashUsers   = users;
  S.invitations = invs;
}
async function fetchGroups()  { S.groups  = await api('GET', '/api/groups'); }
async function fetchConfig()  { S.config  = await api('GET', '/api/config'); }

function updateSB(d) {
  const b = document.getElementById('nb');
  const n = d.stats?.flagged ?? 0;
  if (b) { b.textContent = n; b.style.display = n > 0 ? 'inline-flex' : 'none'; }
  const ce = document.getElementById('sb-cron');
  if (ce && d.config?.summary_cron) ce.textContent = `自動: ${d.config.summary_cron}`;
}

/* ════════════════════════════════════════
   Render
════════════════════════════════════════ */
function render() {
  const page = document.getElementById('page');
  if (S.loading) { page.innerHTML = `<div class="spin-wrap"><div class="spinner"></div></div>`; return; }
  switch (S.view) {
    case 'overview': page.innerHTML = renderOverview(); break;
    case 'wins':     page.innerHTML = renderWinsV();    break;
    case 'members':  page.innerHTML = renderMembersV(); break;
    case 'groups':   page.innerHTML = renderGroupsV();  break;
    case 'settings': page.innerHTML = renderSettingsV(); break;
    case 'users':    page.innerHTML = renderUsersV(); break;
  }
  bindEvt();
}

/* ════════════════════════════════════════
   Overview
════════════════════════════════════════ */
function renderOverview() {
  const tabs = `<div class="view-tabs">
    <div class="vtab ${S.sub==='day'?'active':''}" onclick="switchSub('day')">日次</div>
    <div class="vtab ${S.sub==='week'?'active':''}" onclick="switchSub('week')">週次</div>
  </div>`;
  return S.sub === 'week' ? renderWeekly(tabs) : renderDaily(tabs);
}

/* ════════════════════════════════════════
   Daily view
════════════════════════════════════════ */
function renderDaily(tabs) {
  const bar = `<div class="topbar">
    <div class="tb-left">
      <div class="tb-title">${tabs} コンディション</div>
      <div class="tb-sub"><span class="live-dot"></span>${S.dash ? `最終更新 ${new Date().toLocaleTimeString('ja-JP')} — ${S.date}` : ''}</div>
    </div>
    <div class="tb-right">
      <input class="inp" type="date" id="d-inp" value="${S.date}" max="${today()}" style="width:148px">
      <button class="btn btn-sec" onclick="fetchDash()">↺ 更新</button>
      ${S.role === 'admin' ? `<button class="btn btn-pri" id="run-btn" onclick="runCheck()">▶ チェック実行</button>` : ''}
    </div>
  </div>`;

  if (!S.dash) return bar + `<div class="empty"><div class="empty-ico">📭</div><div class="empty-ttl">データなし</div><p>「チェック実行」を押してください。</p></div>`;

  const { stats, config: cfg, group_tree, ungrouped, members } = S.dash;
  const org_stats = calcOrgStatsFromDailyMs(members);

  // 未投稿
  const missing = members.filter(m => !m.check || !m.check.posted);
  // 要注意（赤→黄 順）
  const alerts = members
    .filter(m => m.check?.posted && (m.check?.signal === 'red' || m.check?.signal === 'yellow'))
    .sort((a,b) => {
      // 赤→黄の順、同一信号内は感情スコア昇順
      const sigRank = s => s === 'red' ? 0 : 1;
      const d = sigRank(a.check?.signal) - sigRank(b.check?.signal);
      if (d !== 0) return d;
      return (a.check?.sentiment_score ?? 0.5) - (b.check?.sentiment_score ?? 0.5);
    });

  const missingSection = missing.length ? `<div class="sec">
    <div class="sec-ttl">📭 未投稿 <span class="cnt-badge" style="background:var(--c-t3)">${missing.length}名</span></div>
    <div class="missing-grid">
      ${missing.map(m => {
        const name = m.user.display_name || m.user.real_name || m.user.user_id;
        const grp  = m.user.group ? (m.user.group.parent ? `${m.user.group.parent.name} › ${m.user.group.name}` : m.user.group.name) : '';
        return `<div class="missing-card">
          <div class="missing-card-name">${name}</div>
          ${grp ? `<div class="missing-card-grp">${grp}</div>` : ''}
        </div>`;
      }).join('')}
    </div>
  </div>` : '';

  const alertSection = alerts.length ? `<div class="sec">
    <div class="sec-ttl">⚠️ 要注意メンバー <span class="cnt-badge">${alerts.length}</span></div>
    ${alerts.map(m => renderAC(m, cfg)).join('')}
  </div>` : '';

  return bar + renderOrgCard(org_stats) + renderGroupOrgSection(group_tree) + renderStats(stats, members) + missingSection + alertSection + renderDeptTree(group_tree, ungrouped, cfg);
}

function renderStats(s, members) {
  const pct = s.total > 0 ? Math.round(s.posted / s.total * 100) : 0;
  // 二回投稿済み数をmembersから計算
  const dualPosted = members ? members.filter(m => m.check?.morning_posted && m.check?.evening_posted).length : null;
  const dualPct = dualPosted !== null && s.total > 0 ? Math.round(dualPosted / s.total * 100) : null;
  return `<div class="stats">
    <div class="sc"><span class="sc-ico">👥</span><span class="sc-val">${s.total}</span><span class="sc-lbl">監視対象</span></div>
    <div class="sc s-g"><span class="sc-ico">✅</span><span class="sc-val">${s.posted}</span><span class="sc-lbl">投稿済 ${pct}%</span></div>
    ${dualPosted !== null ? `<div class="sc s-g"><span class="sc-ico">☀️🌙</span><span class="sc-val">${dualPosted}</span><span class="sc-lbl">2回投稿 ${dualPct}%</span></div>` : ''}
    <div class="sc ${s.missing>0?'s-r':''}"><span class="sc-ico">📭</span><span class="sc-val">${s.missing}</span><span class="sc-lbl">未投稿</span></div>
    <div class="sc ${(s.redCount||0)>0?'s-r':''}"><span class="sc-ico">🔴</span><span class="sc-val">${s.redCount||0}</span><span class="sc-lbl">赤</span></div>
    <div class="sc ${(s.yellowCount||0)>0?'s-a':''}"><span class="sc-ico">🟡</span><span class="sc-val">${s.yellowCount||0}</span><span class="sc-lbl">黄</span></div>
    <div class="sc s-g"><span class="sc-ico">🟢</span><span class="sc-val">${s.greenCount||0}</span><span class="sc-lbl">青</span></div>
  </div>`;
}

// ── 組織スコア計算ヘルパー ──
// 投稿時刻スコア: 1.0=通常 / 0.5=22時台 or 遅延投稿 / 0.0=深夜(23〜翌5時)
function memberTimeScore(lnf, lpf) {
  if (lnf >= 2) return 0.0;
  if (lnf === 1 || lpf) return 0.5;
  return 1.0;
}
function scoreToSig(s) {
  if (s == null) return null;
  return s <= 0.35 ? 'red' : s < 0.60 ? 'yellow' : 'green';
}
function sigIcon(sig) { return sig === 'red' ? '🔴' : sig === 'yellow' ? '🟡' : sig === 'green' ? '🟢' : '—'; }
function sigText(sig) { return sig === 'red' ? '要警戒' : sig === 'yellow' ? '要注意' : '良好'; }
function sigCl(sig)   { return sig === 'red' ? 't-r'   : sig === 'yellow' ? 't-a'   : 't-g'; }
// 投稿率: <50%=赤危険, 50〜79%=黄注意, ≥80%=緑順調
function rateSig(rate) {
  const pct = Math.round((rate || 0) * 100);
  if (pct < 50) return { cl: 't-r', icon: '🚨' };
  if (pct < 80) return { cl: 't-a', icon: '⚠️' };
  return { cl: 't-g', icon: '✅' };
}

// 日次: enriched members ({check}) から統計計算
function calcOrgStatsFromDailyMs(ms) {
  const posted = ms.filter(m => m.check?.posted);
  // 感情スコア
  const sentRaw  = posted.map(m => m.check?.sentiment_score).filter(s => s != null);
  const sentScore = sentRaw.length ? sentRaw.reduce((a, b) => a + b, 0) / sentRaw.length : null;
  const sentSig   = scoreToSig(sentScore);
  // 投稿時刻スコア
  const timeRaw  = posted.map(m => memberTimeScore(m.check?.late_night_flag ?? 0, m.check?.late_post_flag ?? 0));
  const timeScore = timeRaw.length ? timeRaw.reduce((a, b) => a + b, 0) / timeRaw.length : null;
  const timeSig   = scoreToSig(timeScore);
  // 投稿率
  const rate = ms.length ? posted.length / ms.length : 0;
  // 二回投稿率
  const dualPosted = ms.filter(m => m.check?.morning_posted && m.check?.evening_posted);
  const dualRate   = ms.length ? dualPosted.length / ms.length : 0;
  const pct  = Math.round(rate * 100);
  const dpct = Math.round(dualRate * 100);
  const summary = `投稿率${pct}%・2回投稿率${dpct}%・感情${sentScore != null ? sentScore.toFixed(2) + '（' + sigText(sentSig) + '）' : '—'}`;
  return { sentScore, sentSig, timeScore, timeSig, posting_rate: rate, dual_post_rate: dualRate, summary };
}

// 週次: weekly members ({days}) から1日分の統計計算
function calcDayStatsFromWkMs(members, day, td) {
  if (day > td) return null;
  const posted = members.filter(m => m.days[day]?.posted);
  const sentRaw  = posted.map(m => m.days[day]?.sentiment_score).filter(s => s != null);
  const sentScore = sentRaw.length ? sentRaw.reduce((a, b) => a + b, 0) / sentRaw.length : null;
  const sentSig   = scoreToSig(sentScore);
  const timeRaw  = posted.map(m => memberTimeScore(m.days[day]?.late_night_flag ?? 0, m.days[day]?.late_post_flag ?? 0));
  const timeScore = timeRaw.length ? timeRaw.reduce((a, b) => a + b, 0) / timeRaw.length : null;
  const timeSig   = scoreToSig(timeScore);
  const rate = members.length ? posted.length / members.length : 0;
  return { sentScore, sentSig, timeScore, timeSig, posting_rate: rate };
}

// ── 描画関数 ──
function renderOrgSigBlock(label, score, sig) {
  const pill = sig ? `<span class="sig-pill ${sig === 'red' ? 'sig-r' : sig === 'yellow' ? 'sig-y' : 'sig-g'}" style="font-size:11px;padding:2px 8px">${sigIcon(sig)} ${sigText(sig)}</span>` : '<span style="color:var(--c-t4)">—</span>';
  const scoreStr = score != null ? `<span class="${sigCl(sig)}" style="font-size:20px;font-weight:800;margin-left:8px">${score.toFixed(2)}</span>` : '';
  return `<div style="flex:1;min-width:120px">
    <div style="font-size:10px;color:var(--c-t4);margin-bottom:5px">${label}</div>
    <div style="display:flex;align-items:center;gap:4px;flex-wrap:wrap">${pill}${scoreStr}</div>
  </div>`;
}

    <div class="org-card-label" style="margin-bottom:12px">${title}</div>
    <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:flex-start;margin-bottom:12px">
      ${renderOrgSigBlock('😊 感情スコア', os.sentScore, os.sentSig)}
      <div style="width:1px;background:var(--c-bdr2);align-self:stretch;margin:0 4px"></div>
      ${renderOrgSigBlock('🕐 投稿時刻スコア', os.timeScore, os.timeSig)}
      <div style="width:1px;background:var(--c-bdr2);align-self:stretch;margin:0 4px"></div>
      <div style="flex:0 0 auto">
        <div style="font-size:10px;color:var(--c-t4);margin-bottom:5px">📋 投稿率</div>
        <div style="font-size:22px;font-weight:800" class="${rCl}">${rIco} ${pct}%</div>
      </div>
      <div style="width:1px;background:var(--c-bdr2);align-self:stretch;margin:0 4px"></div>
      <div style="flex:0 0 auto">

      </div>

function renderOrgMiniCard(name, os, isChild) {
  const pct = Math.round((os.posting_rate || 0) * 100);
  const { cl: rCl, icon: rIco } = rateSig(os.posting_rate);
  const sentStr = os.sentScore != null ? os.sentScore.toFixed(2) : '—';
  const timeStr = os.timeScore != null ? os.timeScore.toFixed(2) : '—';
  return `<div class="org-grp-card${isChild ? ' org-grp-child' : ''}">
    <div class="org-grp-hd"><div class="org-grp-name">${name}</div></div>
    <div style="display:flex;gap:8px;margin-bottom:6px;flex-wrap:wrap">
      <div style="font-size:11px">
        <div style="font-size:9px;color:var(--c-t4)">感情</div>
        <span style="font-weight:800" class="${sigCl(os.sentSig)}">${sigIcon(os.sentSig)} ${sentStr}</span>
      </div>
      <div style="font-size:11px">
        <div style="font-size:9px;color:var(--c-t4)">時刻</div>
        <span style="font-weight:800" class="${sigCl(os.timeSig)}">${sigIcon(os.timeSig)} ${timeStr}</span>
      </div>
    </div>
    <div class="org-grp-rate ${rCl}">${rIco} 投稿率 ${pct}%</div>
  </div>`;
}

function renderGroupOrgSection(groupTree) {
  if (!groupTree?.length) return '';
  const cards = [];
  for (const top of groupTree) {
    const topMs = [
      ...(top.children||[]).flatMap(c => [...(c.members||[]), ...(c.children||[]).flatMap(gc => gc.members||[])]),
      ...(top.direct_members||[])
    ];
    if (!topMs.length) continue;
    cards.push(renderOrgMiniCard(top.name, calcOrgStatsFromDailyMs(topMs), false));
    for (const child of (top.children||[])) {
      const childMs = [...(child.members||[]), ...(child.children||[]).flatMap(gc => gc.members||[])];
      if (!childMs.length) continue;
      cards.push(renderOrgMiniCard(`└ ${child.name}`, calcOrgStatsFromDailyMs(childMs), true));
      for (const gc of (child.children||[])) {
        if (!gc.members?.length) continue;
        cards.push(renderOrgMiniCard(`　└ ${gc.name}`, calcOrgStatsFromDailyMs(gc.members), true));
      }
    }
  }
  return cards.length ? `<div class="org-grp-grid">${cards.join('')}</div>` : '';
}

// 週次グリッドの組織行（全社 or グループ単位）
function renderWkOrgRow(name, days, dayStatsFn, td, isGroup) {
  const weekdays = days.filter(d => !isWkend(d));
  const sigRow = (lbl, sig) =>
    `<div style="display:flex;align-items:center;gap:3px;white-space:nowrap">
      <span style="font-size:8.5px;color:var(--c-t4);min-width:18px">${lbl}</span>
      <span style="font-size:13px;line-height:1">${sigIcon(sig)}</span>
    </div>`;
  const cells = weekdays.map(d => {
    const os = dayStatsFn(d);
    if (!os || d > td) return `<div class="wg-cell future"><div class="cell-pill cp-fut"></div></div>`;
    const pct = Math.round((os.posting_rate || 0) * 100);
    const { cl: rCl, icon: rIco } = rateSig(os.posting_rate);
    return `<div class="wg-cell">
      <div style="padding:4px 6px;display:flex;flex-direction:column;gap:2px;align-items:flex-start">
        ${sigRow('感情', os.sentSig)}
        ${sigRow('時刻', os.timeSig)}
        <div style="font-size:8.5px;margin-top:1px;padding-left:21px" class="${rCl}">${rIco} ${pct}%</div>
      </div>
    </div>`;
  }).join('');
  // 週合計: 感情・時刻それぞれ週平均
  const validDays = weekdays.filter(d => d <= td);
  const wkSentScores = validDays.map(d => dayStatsFn(d)?.sentScore).filter(s => s != null);
  const wkSentScore  = wkSentScores.length ? wkSentScores.reduce((a,b)=>a+b,0)/wkSentScores.length : null;
  const wkTimeScores = validDays.map(d => dayStatsFn(d)?.timeScore).filter(s => s != null);
  const wkTimeScore  = wkTimeScores.length ? wkTimeScores.reduce((a,b)=>a+b,0)/wkTimeScores.length : null;
  const wkRates = validDays.map(d => dayStatsFn(d)?.posting_rate).filter(r => r != null);
  const avgRate = wkRates.length ? Math.round(wkRates.reduce((a,b)=>a+b,0)/wkRates.length*100) : null;
  const avgRateRatio = avgRate != null ? avgRate / 100 : null;
  const { cl: wkRCl, icon: wkRIco } = avgRateRatio != null ? rateSig(avgRateRatio) : { cl: '', icon: '' };
  const wkCell = `<div class="wg-weekly-cell">
    <div style="padding:4px 6px;display:flex;flex-direction:column;gap:2px;align-items:flex-start">
      ${sigRow('感情', scoreToSig(wkSentScore))}
      ${sigRow('時刻', scoreToSig(wkTimeScore))}
      ${avgRate != null ? `<div style="font-size:8.5px;margin-top:1px;padding-left:21px" class="${wkRCl}">${wkRIco} ${avgRate}%</div>` : ''}
    </div>
  </div>`;
  const rowCl   = isGroup ? 'wg-org-row grp' : 'wg-org-row';
  const namePad = isGroup ? 'padding-left:24px;font-size:11px;font-weight:600' : '';
  return `<div class="${rowCl}">
    <div class="wg-org-name" style="${namePad}"><div>${name}</div></div>
    ${cells}${wkCell}
    <div class="wg-toggle"></div>
  </div>`;
}

function renderAC(m, cfg) {
  const { user, check, report } = m;
  const name   = user.real_name || user.display_name || user.user_id;
  const grp    = user.group ? (user.group.parent?.parent ? `${user.group.parent.parent.name} › ${user.group.parent.name} › ${user.group.name}` : user.group.parent ? `${user.group.parent.name} › ${user.group.name}` : user.group.name) : '未分類';
  const signal = check.signal || 'yellow';
  const chips = [
    check.late_night_flag ? `<span class="chip c-b">🌙 深夜</span>` : '',
    check.sentiment_flag  ? `<span class="chip c-r">😟 ネガティブ</span>` : '',
    check.volume_flag     ? `<span class="chip c-a">${check.volume_ratio<1?'📉':'📈'} 文量変化</span>` : '',
    check.dual_post_flag  ? `<span class="chip c-a">☀️🌙 片方のみ</span>` : '',
  ].filter(Boolean).join('');
  const sigBadge = signal === 'red'
    ? `<span class="sig-pill sig-r">🔴 赤信号</span>`
    : `<span class="sig-pill sig-y">🟡 黄信号</span>`;

  // 理由をスコア・フラグから直接構築
  const sc = check.sentiment_score;
  const ref = check.reflection_score;
  const reasonParts = [];
  if (check.late_night_flag) reasonParts.push(`🌙 深夜投稿`);
  if (check.dual_post_flag)  reasonParts.push(`☀️🌙 片方のみ投稿`);
  if (sc !== null && sc !== undefined && sc < 0.60)
    reasonParts.push(`😟 感情 ${sc.toFixed(2)}`);
  if (ref !== null && ref !== undefined && ref < 0.45)
    reasonParts.push(`📝 振返 ${ref.toFixed(2)}`);
  if (check.volume_flag)
    reasonParts.push(`${check.volume_ratio<1?'📉':'📈'} 文量 ${fmtP(check.volume_ratio)}`);
  const reasonStr = reasonParts.join(' ・ ');
  const summaryStr = check.sentiment_summary || '';
  const winsStr   = check.wins_text   || '';
  const lossesStr = check.losses_text || '';

  const oneLiner = [
    reasonStr ? `<span style="font-weight:700;color:var(--c-t1)">${reasonStr}</span>` : '',
    summaryStr ? `<span style="color:var(--c-t2)">${reasonStr ? ' — ' : ''}${summaryStr}</span>` : '',
  ].filter(Boolean).join('');
  const winsLossesHtml = (winsStr || lossesStr) ? `<div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:6px">
    ${winsStr   ? `<div style="flex:1;min-width:120px"><span style="font-size:10px;font-weight:700;color:#0369a1">🏆 勝ち</span><div style="font-size:12px;color:#0c4a6e;margin-top:2px;line-height:1.5">${winsStr}</div></div>` : ''}
    ${lossesStr ? `<div style="flex:1;min-width:120px"><span style="font-size:10px;font-weight:700;color:#7c3aed">💪 負け</span><div style="font-size:12px;color:#4c1d95;margin-top:2px;line-height:1.5">${lossesStr}</div></div>` : ''}
  </div>` : '';

  return `<div class="ac ${signal === 'red' ? '' : 'warn'}">
    <div class="ac-hd">
      <div class="ac-who">
        <div class="dot ${signal==='red'?'d-r':'d-a'}" style="width:12px;height:12px"></div>
        <div><div class="ac-name">${name}</div><div class="ac-grp">${grp}</div></div>
      </div>
      <div class="ac-chips">${sigBadge} ${chips}</div>
    </div>
    ${oneLiner ? `<div class="ac-summary">${oneLiner}</div>` : '<div class="ac-summary" style="color:var(--c-t4);font-size:11.5px">チェック実行でサマリーが生成されます</div>'}
    ${winsLossesHtml}
  </div>`;
}

function renderDeptTree(groupTree, ungrouped, cfg) {
  const items = [
    ...groupTree.map(g => renderDeptBlock(g, cfg)),
    ...(ungrouped?.length ? [renderDeptBlock({name:'未分類',children:[],direct_members:ungrouped}, cfg)] : []),
  ];
  return `<div class="sec"><div class="sec-ttl">📋 全メンバー</div>${items.join('')}</div>`;
}

function renderDeptBlock(dept, cfg) {
  const all = [
    ...(dept.children||[]).flatMap(c => [...(c.members||[]), ...(c.children||[]).flatMap(gc => gc.members||[])]),
    ...(dept.direct_members||[])
  ];
  const post = all.filter(m=>m.check?.posted).length;
  let body = '';
  for (const child of (dept.children||[])) {
    const childAll = [...(child.members||[]), ...(child.children||[]).flatMap(gc => gc.members||[])];
    if (!childAll.length) continue;
    const childCp = childAll.filter(m=>m.check?.posted).length;
    body += `<div><div class="tm-hd"><span class="tm-hd-name">▸ ${child.name}</span><span class="tm-hd-stat">${childCp}/${childAll.length}名</span></div>`;
    if ((child.members||[]).length) {
      const sorted = sortBySignal(child.members);
      body += renderTblHd() + sorted.map(m=>renderMR(m,cfg)).join('');
    }
    for (const gc of (child.children||[])) {
      if (!gc.members?.length) continue;
      const gcSorted = sortBySignal(gc.members);
      const gcp = gcSorted.filter(m=>m.check?.posted).length;
      body += `<div class="tm-hd" style="padding-left:28px"><span class="tm-hd-name">└ ${gc.name}</span><span class="tm-hd-stat">${gcp}/${gcSorted.length}名</span></div>`;
      body += renderTblHd() + gcSorted.map(m=>renderMR(m,cfg)).join('');
    }
    body += `</div>`;
  }
  if ((dept.direct_members||[]).length) {
    const sorted = sortBySignal(dept.direct_members);
    body += renderTblHd() + sorted.map(m=>renderMR(m,cfg)).join('');
  }
  return `<div class="db">
    <div class="db-hd"><span class="db-hd-name">🏢 ${dept.name}</span><span class="db-hd-stat">${post}/${all.length}名投稿</span></div>
    ${body||'<div style="padding:14px 18px;color:var(--c-t4);font-size:13px">メンバーなし</div>'}
  </div>`;
}

function renderTblHd() {
  return `<div class="th-row">
    <div></div>
    <div class="th">名前 / コンディション</div>
    <div class="th">☀️朝 / 🌙夜</div>
    <div class="th">感情 / 振返</div>
    <div class="th">🏆勝ち &nbsp;/&nbsp; 💪負け</div>
    <div class="th th-r">信号</div>
    <div class="th th-r">監視</div>
  </div>`;
}

function signalDot(sig) {
  if (sig === 'red')    return 'd-r';
  if (sig === 'yellow') return 'd-a';
  if (sig === 'green')  return 'd-g';
  return 'd-n';
}
function signalRow(sig) {
  if (sig === 'red')    return 'rc';
  if (sig === 'yellow') return 'rf';
  return '';
}
function sortBySignal(arr) {
  const rank = m => {
    if (!m.check || !m.check.posted) return 0;
    if (m.check.signal === 'red')    return 1;
    if (m.check.signal === 'yellow') return 2;
    return 3;
  };
  return [...arr].sort((a,b) => {
    const d = rank(a) - rank(b);
    if (d !== 0) return d;
    // 同じ信号内は感情スコア昇順（低い=ネガティブ=上位）
    const sa = a.check?.sentiment_score ?? 0.5;
    const sb = b.check?.sentiment_score ?? 0.5;
    return sa - sb;
  });
}

function fmtPostTime(reportObj, lateNightFlag, latePostFlag) {
  if (!reportObj) return '<span style="color:var(--c-t4);font-size:11px">未</span>';
  const t = fmtT(reportObj.posted_at);
  if (lateNightFlag >= 2) return `<span style="font-weight:700;color:var(--c-red)">${t}🌙</span>`;
  if (lateNightFlag === 1) return `<span style="font-weight:700;color:var(--c-amb)">${t}🌆</span>`;
  if (latePostFlag)        return `<span style="font-weight:700;color:var(--c-amb)">${t}⏰</span>`;
  return `<span class="mr-time">${t}</span>`;
}

function renderMR(m, cfg) {
  const { user, check, morning_report, evening_report, report } = m;
  const name   = user.real_name || user.display_name || user.user_id;
  const monBtn = S.role === 'admin' ? `<button class="mon-btn mon-on" onclick="toggleMon('${user.user_id}',0)" title="監視停止">監視中</button>` : '';

  if (!check || !check.posted) {
    return `<div class="mr rm">
      <div class="dot d-n"></div>
      <div><div class="mr-name" style="color:var(--c-red)">${name}</div><div class="mr-summary">未投稿</div></div>
      <div>—</div><div>—</div><div>—</div>
      <div class="mr-flags"><span class="sig-pill sig-r">📭 未投稿</span></div>
      <div style="display:flex;justify-content:flex-end">${monBtn}</div>
    </div>`;
  }

  const sig = check.signal || 'green';

  // 朝/夜 投稿時刻表示
  const morningT = fmtPostTime(morning_report, 0, 0);
  const eveningT = fmtPostTime(evening_report, check.late_night_flag, check.late_post_flag);
  const dualBadge = check.dual_post_flag
    ? `<span class="chip c-a" style="font-size:10px;padding:1px 5px;margin-top:2px">片方のみ</span>`
    : '';
  const timeHtml = `<div style="display:flex;flex-direction:column;gap:2px">
    <div style="display:flex;align-items:center;gap:3px"><span style="font-size:9px;color:var(--c-t4);min-width:14px">☀️</span>${morningT}</div>
    <div style="display:flex;align-items:center;gap:3px"><span style="font-size:9px;color:var(--c-t4);min-width:14px">🌙</span>${eveningT}</div>
    ${dualBadge}
  </div>`;

  // 感情スコア + 振り返りスコア
  let scoreHtml = '—';
  {
    const sc  = check.sentiment_score;
    const ref = check.reflection_score;
    const thr = cfg?.sentiment_threshold ?? 0.35;
    const parts = [];
    if (sc !== null && sc !== undefined) {
      const cl = sc >= 0.65 ? 't-g' : sc < thr ? 't-r' : 't-3';
      const lb = sc >= 0.65 ? '😊' : sc < thr ? '😟' : '😐';
      parts.push(`<div style="font-size:9px;color:var(--c-t4)">感情</div><div class="${cl}" style="font-weight:700">${lb} ${sc.toFixed(2)}</div>`);
    }
    if (ref !== null && ref !== undefined) {
      const rcl = ref >= 0.65 ? 't-g' : ref < 0.45 ? 't-a' : 't-3';
      parts.push(`<div style="font-size:9px;color:var(--c-t4);margin-top:2px">振返</div><div class="${rcl}" style="font-weight:700">📝 ${ref.toFixed(2)}</div>`);
    }
    if (parts.length) scoreHtml = `<div style="font-size:12px">${parts.join('')}</div>`;
  }

  const sigBadge = sig === 'red'
    ? `<span class="sig-pill sig-r">🔴 赤</span>`
    : sig === 'yellow'
    ? `<span class="sig-pill sig-y">🟡 黄</span>`
    : `<span class="sig-pill sig-g">🟢 青</span>`;

  // サマリー (夕方 > 全体)
  const rawText = (evening_report || report)?.text?.replace(/\s+/g, ' ').trim() || '';
  const textPreview = rawText.length > 60 ? rawText.slice(0, 60) + '…' : rawText;
  const summary = check.sentiment_summary || textPreview || null;
  const praisePoints = check.praise_points || null;
  const followPoints = check.follow_points || null;
  const winsText     = check.wins_text     || null;
  const lossesText   = check.losses_text   || null;

  const praiseHtml = praisePoints
    ? `<div style="display:flex;gap:4px;align-items:flex-start;margin-top:3px">
        <span style="font-size:10px;flex-shrink:0;margin-top:1px;color:#16a34a;font-weight:800">👏</span>
        <span style="font-size:11px;color:#15803d;line-height:1.5">${praisePoints}</span>
       </div>` : '';
  const followHtml = followPoints
    ? `<div style="display:flex;gap:4px;align-items:flex-start;margin-top:3px">
        <span style="font-size:10px;flex-shrink:0;margin-top:1px;color:#b45309;font-weight:800">🔍</span>
        <span style="font-size:11px;color:#92400e;line-height:1.5">${followPoints}</span>
       </div>` : '';

  const charCount = (evening_report || morning_report || report)?.char_count;
  const volumeFlag = check.volume_flag;
  const volBadge = volumeFlag
    ? `<span class="chip c-a" style="font-size:10px;padding:1px 5px">${(check.volume_ratio||0)<1?'📉':'📈'}</span>` : '';

  // 勝ち/負け専用列
  const wlHtml = (() => {
    if (!winsText && !lossesText) return `<div style="color:var(--c-t4);font-size:11px;padding-top:2px">—</div>`;
    const wPart = winsText
      ? `<div style="background:#eff6ff;border:1px solid #bfdbfe;border-radius:6px;padding:4px 7px">
           <div style="font-size:9px;font-weight:800;color:#1d4ed8;letter-spacing:.04em;margin-bottom:2px">🏆 WINS</div>
           <div style="font-size:11px;color:#1e3a8a;line-height:1.45;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden">${winsText}</div>
         </div>` : '';
    const lPart = lossesText
      ? `<div style="background:#faf5ff;border:1px solid #ddd6fe;border-radius:6px;padding:4px 7px;${winsText ? 'margin-top:4px' : ''}">
           <div style="font-size:9px;font-weight:800;color:#7c3aed;letter-spacing:.04em;margin-bottom:2px">💪 LOSSES</div>
           <div style="font-size:11px;color:#4c1d95;line-height:1.45;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden">${lossesText}</div>
         </div>` : '';
    return `<div style="display:flex;flex-direction:column">${wPart}${lPart}</div>`;
  })();

  return `<div class="mr ${signalRow(sig)}">
    <div class="dot ${signalDot(sig)}" style="margin-top:3px"></div>
    <div style="min-width:0">
      <div class="mr-name">${name}</div>
      ${summary ? `<div class="mr-summary">${summary}</div>` : ''}
      ${praiseHtml}${followHtml}
      <div class="mr-meta">${charCount ? charCount + '字' : ''}${volBadge ? ' ' + volBadge : ''}</div>
    </div>
    <div style="padding-top:2px">${timeHtml}</div>
    <div style="padding-top:2px">${scoreHtml}</div>
    <div>${wlHtml}</div>
    <div class="mr-flags" style="padding-top:2px">${sigBadge}</div>
    <div style="display:flex;justify-content:flex-end;padding-top:2px">${monBtn}</div>
  </div>`;
}

/* ════════════════════════════════════════
   Weekly view
════════════════════════════════════════ */
function renderWeekly(tabs) {
  if (!S.weekly) { fetchWeekly(); return `<div class="spin-wrap"><div class="spinner"></div></div>`; }
  const { week_start, week_end, days, today: td, group_tree, ungrouped, weekly_stats: ws, day_org_stats } = S.weekly;

  const bar = `<div class="topbar">
    <div class="tb-left">
      <div class="tb-title">${tabs}
        <div class="wk-nav">
          <div class="wk-arr" onclick="navWeek(-1)">‹</div>
          <div class="wk-range">${fmtWeekLabel(week_start)} — ${fmtWeekLabel(week_end)}</div>
          <div class="wk-arr" onclick="navWeek(1)">›</div>
        </div>
      </div>
      <div class="tb-sub"><span class="live-dot"></span>週次コンディション</div>
    </div>
    <div class="tb-right">
      <button class="btn btn-sec" onclick="fetchWeekly()">↺ 更新</button>
    </div>
  </div>`;

  const pct = ws.total_expected > 0 ? Math.round(ws.total_posted / ws.total_expected * 100) : 0;
  const statsBar = `<div class="wk-stats">
    <div class="ws-item"><div class="ws-val">${ws.total_posted}<span style="font-size:14px;font-weight:500;color:var(--c-t3)">/${ws.total_expected}</span></div><div class="ws-lbl">投稿件数</div></div>
    <div class="ws-item"><div class="ws-val">${pct}<span style="font-size:16px;font-weight:500">%</span></div><div class="ws-lbl">投稿率</div></div>
    <div class="ws-item"><div class="ws-val ${ws.total_flagged>0?'t-a':''}">${ws.total_flagged}</div><div class="ws-lbl">フラグ件数</div></div>
    <div class="ws-item"><div class="ws-val t-3">${ws.total_expected - ws.total_posted}</div><div class="ws-lbl">未投稿件数</div></div>
  </div>`;

  const allItems = [
    ...group_tree.map(g => renderWkDeptBlock(g, days, td)),
    ...(ungrouped?.length ? [renderWkDeptBlock({name:'未分類',children:[],direct_members:ungrouped}, days, td)] : []),
  ];

  // 週次組織ブロック: 全社行 + グループ別行
  const grpRows = group_tree.map(top => {
    const topMs = [
      ...(top.children||[]).flatMap(c => [...(c.members||[]), ...(c.children||[]).flatMap(gc => gc.members||[])]),
      ...(top.direct_members||[])
    ];
    if (!topMs.length) return '';
    let rows = renderWkOrgRow(top.name, days, d => calcDayStatsFromWkMs(topMs, d, td), td, true);
    for (const child of (top.children||[])) {
      const childMs = [...(child.members||[]), ...(child.children||[]).flatMap(gc => gc.members||[])];
      if (!childMs.length) continue;
      rows += renderWkOrgRow(`└ ${child.name}`, days, d => calcDayStatsFromWkMs(childMs, d, td), td, true);
      for (const gc of (child.children||[])) {
        if (!gc.members?.length) continue;
        rows += renderWkOrgRow(`　└ ${gc.name}`, days, d => calcDayStatsFromWkMs(gc.members, d, td), td, true);
      }
    }
    return rows;
  }).join('');
  const orgBlock = `<div class="wk-block">
    <div class="wk-dept-hd"><span class="wk-dept-nm">📊 組織コンディション</span></div>
    ${renderWkHdRow(days, td)}
    ${day_org_stats ? renderWkOrgRow('全社', days, d => day_org_stats[d], td, false) : ''}
    ${grpRows}
  </div>`;

  return bar + statsBar + `<div class="wk-wrap">${orgBlock}${allItems.join('')}</div>`;
}

function renderWkDeptBlock(dept, days, td) {
  let body = `${renderWkHdRow(days, td)}`;
  for (const child of (dept.children||[])) {
    const childAll = [...(child.members||[]), ...(child.children||[]).flatMap(gc => gc.members||[])];
    if (!childAll.length) continue;
    body += `<div class="wk-tm-hd">▸ ${child.name}</div>`;
    body += (child.members||[]).map(m => renderWkMemberRow(m, days, td)).join('');
    for (const gc of (child.children||[])) {
      if (!gc.members?.length) continue;
      body += `<div class="wk-tm-hd" style="padding-left:28px">└ ${gc.name}</div>`;
      body += gc.members.map(m => renderWkMemberRow(m, days, td)).join('');
    }
  }
  for (const m of (dept.direct_members||[])) {
    body += renderWkMemberRow(m, days, td);
  }
  const allM = [
    ...(dept.children||[]).flatMap(c => [...(c.members||[]), ...(c.children||[]).flatMap(gc => gc.members||[])]),
    ...(dept.direct_members||[])
  ];
  return `<div class="wk-block">
    <div class="wk-dept-hd">
      <span class="wk-dept-nm">🏢 ${dept.name}</span>
      <span style="font-size:12px;color:var(--c-t3)">${allM.length}名</span>
    </div>
    ${body}
  </div>`;
}

// 日次データから信号を動的計算（フロント版、dual-post対応）
function calcDaySig(dd) {
  if (!dd?.posted) return null;
  if (dd.late_night_flag >= 2) return 'red';
  const s = dd.sentiment_score;
  if (s !== null && s !== undefined) {
    if (s <= 0.35) return 'red';
  }
  if (dd.late_night_flag === 1) return 'yellow';
  if (s !== null && s !== undefined) {
    if (s < 0.60) return 'yellow';
  }
  if (dd.reflection_score !== null && dd.reflection_score !== undefined) {
    if (dd.reflection_score < 0.45) return 'yellow';
  }
  if (dd.dual_post_flag)  return 'yellow';
  if (dd.late_post_flag)  return 'yellow';
  if (dd.volume_flag)     return 'yellow';
  return 'green';
}
function sigPillClass(sig) {
  return sig === 'red' ? 'cp-r' : sig === 'yellow' ? 'cp-a' : 'cp-g';
}
function sigEmoji(sig) {
  return sig === 'red' ? '🔴' : sig === 'yellow' ? '🟡' : '🟢';
}

function renderWkHdRow(days, td) {
  const weekdays = days.filter(d => !isWkend(d));
  const cells = weekdays.map(d => {
    const lines = fmtDayHd(d).split('\n');
    const cls   = d === td ? 'today' : '';
    return `<div class="wg-hd-cell ${cls}">${lines[0]}<br><span style="font-size:13px;font-weight:800">${lines[1]}</span></div>`;
  }).join('');
  return `<div class="wg-hd-row">
    <div class="wg-hd-cell" style="border-left:none;text-align:left;padding-left:14px">名前</div>
    ${cells}
    <div class="wg-hd-cell wg-weekly-hd">週合計</div>
    <div class="wg-hd-cell">監視</div>
  </div>`;
}

function renderWkMemberRow(m, days, td) {
  const { user, days: dayData } = m;
  const name = user.real_name || user.display_name || user.user_id;
  const weekdays = days.filter(d => !isWkend(d));

  // 日次セル（平日のみ・信号表示 + 朝夜ステータス）
  const cells = weekdays.map(d => {
    const dd = dayData[d];
    if (!dd || dd.is_future) return `<div class="wg-cell future"><div class="cell-pill cp-fut"></div></div>`;
    if (!dd.posted) return `<div class="wg-cell" onclick="gotoDay('${d}')" title="${d} 未投稿" style="cursor:pointer">
      <div class="cell-pill cp-none" style="font-size:10px;padding:6px 4px">📭<br>未投稿</div>
    </div>`;
    const sig  = calcDaySig(dd);
    const pcls = sigPillClass(sig);
    const ico  = sigEmoji(sig);
    // 朝・夜の投稿状況インジケーター
    const mIcon = dd.morning_posted ? '☀️' : '<span style="opacity:.3">☀️</span>';
    const eIcon = dd.evening_posted ? '🌙' : '<span style="opacity:.3">🌙</span>';
    const title = `${d} — ${sig === 'red' ? '赤信号' : sig === 'yellow' ? '黄信号' : '青信号'} (☀️${dd.morning_posted?'✓':'—'} 🌙${dd.evening_posted?'✓':'—'})`;
    return `<div class="wg-cell" onclick="gotoDay('${d}')" title="${title}" style="cursor:pointer">
      <div class="cell-pill ${pcls}" style="padding:4px 4px;display:flex;flex-direction:column;align-items:center;gap:1px">
        <div style="font-size:14px">${ico}</div>
        <div style="font-size:9px;display:flex;gap:2px">${mIcon}${eIcon}</div>
      </div>
    </div>`;
  }).join('');

  // 週合計計算
  let redCnt = 0, yellCnt = 0, grnCnt = 0, unpostedCnt = 0;
  for (const d of weekdays) {
    const dd = dayData[d];
    if (!dd || dd.is_future) continue;
    if (!dd.posted) { unpostedCnt++; continue; }
    const sig = calcDaySig(dd);
    if (sig === 'red') redCnt++;
    else if (sig === 'yellow') yellCnt++;
    else grnCnt++;
  }
  const worstSig = redCnt > 0 ? 'red' : yellCnt > 0 ? 'yellow' : grnCnt > 0 ? 'green' : null;
  const breakdown = [
    redCnt    ? `🔴${redCnt}` : '',
    yellCnt   ? `🟡${yellCnt}` : '',
    grnCnt    ? `🟢${grnCnt}` : '',
    unpostedCnt ? `📭${unpostedCnt}` : '',
  ].filter(Boolean).join(' ');

  const weeklyCell = worstSig
    ? `<div class="wg-weekly-cell"><div style="text-align:center">
        <div class="cell-pill ${sigPillClass(worstSig)}" style="font-size:15px;padding:5px 4px;margin:0 auto 4px">${sigEmoji(worstSig)}</div>
        <div style="font-size:9.5px;color:var(--c-t3);white-space:nowrap;line-height:1.4">${breakdown}</div>
       </div></div>`
    : `<div class="wg-weekly-cell"><div class="cell-pill cp-none" style="font-size:10px">—</div></div>`;

  const monBtn = S.role === 'admin' ? `<button class="mon-btn mon-on" onclick="toggleMon('${user.user_id}',0)">監視中</button>` : '';

  return `<div class="wg-row">
    <div class="wg-name">
      <div class="dot ${worstSig ? signalDot(worstSig) : 'd-n'}"></div>
      <div class="wg-name-txt">${name}</div>
    </div>
    ${cells}
    ${weeklyCell}
    <div class="wg-toggle">${monBtn}</div>
  </div>`;
}

/* ════════════════════════════════════════
   Members view
════════════════════════════════════════ */
function renderMembersV() {
  if (!S.members) { fetchMembers().then(render); return `<div class="spin-wrap"><div class="spinner"></div></div>`; }

  const gOptItems = [`<option value="">（未分類）</option>`];
  const topGs = S.groups.filter(g => !g.parent_id);
  const topIds = new Set(topGs.map(g => g.id));
  const l2Gs  = S.groups.filter(g => g.parent_id && topIds.has(g.parent_id));
  const l2Ids = new Set(l2Gs.map(g => g.id));
  const l3Gs  = S.groups.filter(g => g.parent_id && l2Ids.has(g.parent_id));
  for (const top of topGs) {
    gOptItems.push(`<option value="${top.id}">${top.name}</option>`);
    for (const l2 of l2Gs.filter(c => c.parent_id === top.id)) {
      gOptItems.push(`<option value="${l2.id}">　└ ${l2.name}</option>`);
      for (const l3 of l3Gs.filter(c => c.parent_id === l2.id)) {
        gOptItems.push(`<option value="${l3.id}">　　└ ${l3.name}</option>`);
      }
    }
  }
  const gOpts = gOptItems.join('');

  const rows = S.members.map(m => {
    const name = m.real_name || m.display_name || m.user_id;
    const sel  = gOpts.replace(`value="${m.group_id??''}"`, `value="${m.group_id??''}" selected`);
    return `<div class="cr">
      <div style="flex:1;min-width:0">
        <div class="cr-lbl" style="${m.is_active?'':'color:var(--c-t3)'}">${name}
          ${m.is_active?'':'<span class="chip c-x" style="font-size:11px;margin-left:6px">停止中</span>'}
        </div>
        <div class="cr-desc">${m.user_id}</div>
      </div>
      <div class="cr-ctrl">

/* ─── 日付ヘルパー ─── */
function wlWeekRange(dateStr) {
  const d = new Date(dateStr + 'T12:00:00+09:00');
  const day = d.getDay();
  const diffToMon = day === 0 ? -6 : 1 - day;
  const mon = new Date(d); mon.setDate(d.getDate() + diffToMon);
  const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
  return { from: mon.toISOString().slice(0, 10), to: sun.toISOString().slice(0, 10) };
}

function wlMonthRange(dateStr) {
  const [y, m] = dateStr.split('-').map(Number);
  const from = `${y}-${String(m).padStart(2,'0')}-01`;
  const lastDay = new Date(y, m, 0).getDate();
  return { from, to: `${y}-${String(m).padStart(2,'0')}-${lastDay}` };
}

function wlShiftDate(dateStr, period, dir) {
  const d = new Date(dateStr + 'T12:00:00+09:00');
  if (period === 'weekly')       d.setDate(d.getDate() + dir * 7);
  else if (period === 'monthly') d.setMonth(d.getMonth() + dir);
  return d.toISOString().slice(0, 10);
}

async function fetchWinsRange(from, to) {
  const key = `${from}_${to}`;
  if (S.winsRange[key]) return S.winsRange[key];
  const r = await api('GET', `/api/wins-range?from=${from}&to=${to}`);
  S.winsRange[key] = r;
  return r;
}

/* ─── エントリーポイント ─── */
function renderWinsV() {
  const period = S.winsPeriod || 'daily';

  if (period === 'daily') {
    if (!S.dash || S.dash.date !== S.date) {
      fetchDash().then(render);
      return `<div class="spin-wrap"><div class="spinner"></div></div>`;
    }
    return wlBar(period) + wlHeroDaily(S.dash) + wlBodyDaily(S.dash);
  }

  const range = period === 'weekly' ? wlWeekRange(S.date) : wlMonthRange(S.date);
  const key   = `${range.from}_${range.to}`;
  if (!S.winsRange[key]) {
    fetchWinsRange(range.from, range.to).then(render);
    return `<div class="spin-wrap"><div class="spinner"></div></div>`;
  }
  const data = S.winsRange[key];
  return wlBar(period, range) + (period === 'weekly' ? wlBodyWeekly(data) : wlBodyMonthly(data));
}

/* ─── トップバー ─── */
function wlBar(period, range) {
  const tabs = ['daily','weekly','monthly'].map(p => {
    const lbl = p === 'daily' ? '日次' : p === 'weekly' ? '週次' : '月次';
    return `<button class="wl-period-tab${p === period ? ' active' : ''}" onclick="S.winsPeriod='${p}';render()">${lbl}</button>`;
  }).join('');

  let nav = '';
  if (period === 'daily') {
    nav = `<input class="inp" type="date" id="w-inp" value="${S.date}" max="${today()}" style="width:148px">`;
  } else {
    const prev = wlShiftDate(S.date, period, -1);
    const next  = wlShiftDate(S.date, period, +1);
    const isFuture = next > today();
    let label = '';
    if (period === 'weekly' && range) {
      const f = range.from.slice(5).replace('-','/'), t = range.to.slice(5).replace('-','/');
      label = `${range.from.slice(0,7)} &nbsp;${f}〜${t}`;
    } else if (period === 'monthly' && range) {
      const [y,m] = range.from.split('-');
      label = `${y}年${parseInt(m)}月`;
    }
    nav = `<div class="wl-period-nav">
      <button class="wl-nav-btn" onclick="S.date='${prev}';S.winsRange={};render()">◀</button>
      <div class="wl-period-range">${label}</div>
      <button class="wl-nav-btn" onclick="S.date='${next}';S.winsRange={};render()" ${isFuture ? 'disabled style="opacity:.4"' : ''}>▶</button>
    </div>`;
  }

  const subLabel = period === 'daily' ? S.date + ' — 今日の勝ち・負け'
    : period === 'weekly' ? '週次集計 — 曜日ごとの勝ち・負け'
    : '月次集計 — 月間の勝ち・負け一覧';

  return `<div class="topbar">
    <div class="tb-left">
      <div class="tb-title">🏆 勝ち負けBoard</div>
      <div class="tb-sub"><span class="live-dot"></span>${subLabel}</div>
    </div>
    <div class="tb-right" style="gap:8px;flex-wrap:wrap;justify-content:flex-end">
      <div class="wl-period-tabs">${tabs}</div>
      ${nav}
      <button class="btn btn-sec" onclick="${period === 'daily' ? 'fetchDash().then(render)' : 'S.winsRange={};render()'}">↺ 更新</button>
    </div>
  </div>`;
}

/* ─── 日次ヒーロー ─── */

function wlDeptBlock(dept, direct, cardFn) {
  const all = [
    ...(dept.children||[]).flatMap(c => [...(c.members||[]), ...(c.children||[]).flatMap(gc => gc.members||[])]),
    ...(direct||[])
  ];
  if (!all.length) return '';
  const sorted = [...all].sort((a,b) => {
    const r = m => m.check?.signal==='red'?0:m.check?.signal==='yellow'?1:m.check?.signal==='green'?2:3;
    return r(a) - r(b);
  });
  const pc = all.filter(m => m.check?.posted).length;
  const wc = all.filter(m => m.check?.wins_text).length;
  const lc = all.filter(m => m.check?.losses_text).length;
  return `<div class="sec">
    <div class="wl-dept-ttl">🏢 ${dept.name}
      <span style="font-size:12px;font-weight:600;color:var(--c-t3)">${pc}/${all.length}名投稿</span>

}

function renderUsersV() {
  if (!S.dashUsers) { fetchDashUsers().then(render); return `<div class="spin-wrap"><div class="spinner"></div></div>`; }

  const users = Array.isArray(S.dashUsers) ? S.dashUsers : [];
  const invs  = Array.isArray(S.invitations) ? S.invitations : [];

  const userRows = users.map(u => {
    const isMe = u.email === S.email;
    const name = u.display_name || u.email;
    const roleChip = u.role === 'admin'
      ? `<span class="chip c-g">管理者</span>`
      : `<span class="chip c-x">閲覧者</span>`;
    const toggleRole = u.role === 'admin'
      ? `<button class="btn btn-sec btn-sm" onclick="changeRole(${u.id},'viewer')" ${isMe?'disabled':''}>閲覧者に変更</button>`
      : `<button class="btn btn-sec btn-sm" onclick="changeRole(${u.id},'admin')">管理者に変更</button>`;
    return `<div class="cr">
      <div style="flex:1;min-width:0">
        <div class="cr-lbl">${name} ${isMe?'<span class="chip c-p" style="font-size:10px;padding:2px 7px;margin-left:4px">あなた</span>':''}</div>
        <div class="cr-desc">${u.email} &nbsp;·&nbsp; 登録日: ${u.created_at?.slice(0,10)}</div>
      </div>
      <div class="cr-ctrl">
        ${roleChip}
        ${toggleRole}
        <button class="btn btn-sec btn-sm" onclick="resetPw(${u.id},'${u.email}')">PW変更</button>
        <button class="btn btn-sec btn-sm t-r" onclick="delUser(${u.id},'${u.email}')" ${isMe?'disabled':''}>削除</button>
      </div>
    </div>`;
  }).join('');

  const now = new Date();
  const invRows = invs.map(iv => {
    const expired = new Date(iv.expires_at) < now;
    return `<div class="cr">
      <div style="flex:1;min-width:0">
        <div class="cr-lbl">${iv.email}</div>
        <div class="cr-desc">
          ${iv.role === 'admin' ? '管理者' : '閲覧者'} &nbsp;·&nbsp;
          ${expired ? '<span style="color:var(--c-red)">期限切れ</span>' : `有効期限: ${new Date(iv.expires_at).toLocaleString('ja-JP',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'})}`}
          ${iv.invited_by ? ` &nbsp;·&nbsp; 招待者: ${iv.invited_by}` : ''}
        </div>
      </div>
      <div class="cr-ctrl">
        <span class="chip ${expired?'c-x':'c-a'}">${expired?'期限切れ':'承認待ち'}</span>
        <button class="btn btn-sec btn-sm t-r" onclick="cancelInv(${iv.id},'${iv.email}')">取消</button>
      </div>
    </div>`;
  }).join('');

  return `<div class="topbar">
    <div class="tb-left"><div class="tb-title">ユーザー管理</div><div class="tb-sub">ダッシュボードのアクセス権限管理</div></div>
  </div>
  <div class="sec"><div class="sec-ttl">ユーザー一覧</div>
    <div class="card">${userRows || '<div style="padding:18px;color:var(--c-t4)">ユーザーなし</div>'}</div>
  </div>
  ${invs.length ? `<div class="sec"><div class="sec-ttl">招待中 <span class="cnt-badge">${invs.length}</span></div>
    <div class="card">${invRows}</div>

    <div class="card">
      <div class="cr">
        <div><div class="cr-lbl">メールアドレス &amp; 権限</div><div class="cr-desc">招待URLが発行されます（24時間有効）</div></div>
        <div class="cr-ctrl" style="gap:6px">
          <input class="inp" id="inv-email" placeholder="user@example.com" type="email" style="width:200px">

            <option value="viewer">閲覧者</option>
            <option value="admin">管理者</option>
