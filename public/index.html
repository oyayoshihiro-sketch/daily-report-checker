<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日報コンディション</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --sw: 220px;
  --c-sb:    #0f172a;
  --c-sb2:   #1e293b;
  --c-sbT:   #94a3b8;
  --c-acc:   #3b82f6;
  --c-bg:    #f1f5f9;
  --c-sur:   #ffffff;
  --c-bdr:   #e2e8f0;
  --c-t1:    #0f172a;
  --c-t2:    #334155;
  --c-t3:    #64748b;
  --c-t4:    #94a3b8;
  --c-red:   #dc2626; --c-redB:  #fef2f2; --c-redBr: #fca5a5; --c-redS: #fee2e2;
  --c-amb:   #d97706; --c-ambB:  #fffbeb; --c-ambBr: #fcd34d; --c-ambS: #fef3c7;
  --c-grn:   #059669; --c-grnB:  #ecfdf5; --c-grnBr: #6ee7b7;
  --c-blu:   #2563eb; --c-bluB:  #eff6ff;
  --sh0: 0 1px 2px rgba(0,0,0,.05);
  --sh1: 0 1px 3px rgba(0,0,0,.10),0 1px 2px rgba(0,0,0,.06);
  --r:  10px; --r2: 6px;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
               "Hiragino Sans","Hiragino Kaku Gothic ProN","Yu Gothic UI",Meiryo,sans-serif;
  font-size: 14px; line-height: 1.5; color: var(--c-t1);
}

/* ── Layout ── */
.layout { display: flex; height: 100vh; overflow: hidden; }

/* ── Sidebar ── */
.sb { width: var(--sw); background: var(--c-sb); display: flex; flex-direction: column; flex-shrink: 0; }
.sb-logo { display: flex; align-items: center; gap: 10px; padding: 20px 18px 18px;
           border-bottom: 1px solid var(--c-sb2); }
.sb-logo-ico { font-size: 18px; }
.sb-logo-txt { color: #fff; font-weight: 700; font-size: 14px; }
.sb-nav { padding: 10px 8px; flex: 1; }
.nv { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 7px;
      margin-bottom: 2px; color: var(--c-sbT); font-size: 13.5px; font-weight: 500;
      cursor: pointer; user-select: none; transition: background .12s, color .12s; }
.nv:hover  { background: var(--c-sb2); color: #e2e8f0; }
.nv.active { background: var(--c-sb2); color: #fff; }
.nv-ico { font-size: 14px; width: 20px; text-align: center; flex-shrink: 0; }
.nv-badge { margin-left: auto; display: inline-flex; align-items: center; justify-content: center;
            min-width: 20px; height: 20px; padding: 0 5px;
            background: var(--c-red); color: #fff; font-size: 11px; font-weight: 700; border-radius: 10px; }
.sb-foot { padding: 12px 18px; border-top: 1px solid var(--c-sb2);
           font-size: 11.5px; color: var(--c-sbT); }

/* ── Main ── */
.main { flex: 1; overflow-y: auto; background: var(--c-bg); }
.page { padding: 26px; max-width: 1200px; }

/* ── Topbar ── */
.topbar { display: flex; align-items: flex-start; justify-content: space-between;
          margin-bottom: 22px; gap: 14px; }
.tb-left { min-width: 0; }
.tb-title { font-size: 20px; font-weight: 700; display: flex; align-items: center; gap: 12px; }
.tb-sub   { font-size: 12.5px; color: var(--c-t3); margin-top: 4px; }
.tb-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--c-grn);
            display: inline-block; margin-right: 4px; }

/* ── View tabs ── */
.view-tabs { display: inline-flex; gap: 1px; background: var(--c-bdr);
             border-radius: var(--r2); padding: 2px; }
.vtab { padding: 5px 14px; font-size: 13px; font-weight: 500; border-radius: 4px;
        cursor: pointer; color: var(--c-t3); transition: background .12s, color .12s; }
.vtab.active { background: var(--c-sur); color: var(--c-t1); box-shadow: var(--sh0); }

/* ── Buttons ── */
.btn { padding: 8px 14px; border-radius: var(--r2); font-size: 13px; font-weight: 500;
       border: none; cursor: pointer; transition: opacity .15s; white-space: nowrap;
       font-family: inherit; }
.btn:hover:not(:disabled) { opacity: .85; }
.btn:disabled { opacity: .5; cursor: not-allowed; }
.btn-pri { background: var(--c-blu); color: #fff; }
.btn-sec { background: var(--c-sur); color: var(--c-t2); border: 1px solid var(--c-bdr); }
.btn-sm  { padding: 5px 10px; font-size: 12px; }

/* ── Inputs ── */
.inp { padding: 7px 11px; border: 1px solid var(--c-bdr); border-radius: var(--r2);
       font-size: 13px; color: var(--c-t1); background: var(--c-sur); outline: none;
       transition: border-color .15s; font-family: inherit; }
.inp:focus { border-color: var(--c-acc); }
select.inp { cursor: pointer; }

/* ── Stats ── */
.stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 14px; margin-bottom: 22px; }
.sc { background: var(--c-sur); border: 1px solid var(--c-bdr); border-radius: var(--r);
      padding: 18px 20px; box-shadow: var(--sh0); position: relative; overflow: hidden; }
.sc::after { content:''; position:absolute; top:0;left:0;right:0; height:3px;
             background: var(--c-bdr); }
.sc.s-g::after { background: var(--c-grn); }
.sc.s-a::after { background: var(--c-amb); }
.sc.s-r::after { background: var(--c-red); }
.sc-ico { font-size: 20px; margin-bottom: 10px; }
.sc-val { font-size: 34px; font-weight: 800; line-height: 1; }
.sc.s-g .sc-val { color: var(--c-grn); }
.sc.s-a .sc-val { color: var(--c-amb); }
.sc.s-r .sc-val { color: var(--c-red); }
.sc-lbl { font-size: 11px; font-weight: 700; color: var(--c-t3);
          text-transform: uppercase; letter-spacing: .07em; margin-top: 6px; }

/* ── Section ── */
.sec { margin-bottom: 26px; }
.sec-ttl { font-size: 14.5px; font-weight: 600; display: flex; align-items: center;
           gap: 8px; margin-bottom: 12px; }
.cnt-badge { display: inline-flex; align-items: center; justify-content: center;
             background: var(--c-red); color: #fff; font-size: 11px; font-weight: 700;
             border-radius: 10px; padding: 2px 7px; min-width: 22px; }

/* ── Alert cards ── */
.ac { background: var(--c-sur); border: 1px solid var(--c-redBr); border-left: 4px solid var(--c-red);
      border-radius: var(--r); padding: 16px 20px; margin-bottom: 10px; box-shadow: var(--sh0); }
.ac.warn { border-color: var(--c-ambBr); border-left-color: var(--c-amb); }
.ac-hd { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.ac-who { display: flex; align-items: center; gap: 10px; }
.ac-name { font-size: 16px; font-weight: 700; }
.ac-grp  { font-size: 12px; color: var(--c-t3); margin-top: 2px; }
.ac-chips { display: flex; gap: 6px; flex-wrap: wrap; }
.ac-dets { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
.det-box { background: var(--c-bg); border: 1px solid var(--c-bdr); border-radius: var(--r2);
           padding: 9px 12px; flex: 1; min-width: 110px; }
.det-lbl { font-size: 10.5px; color: var(--c-t4); text-transform: uppercase;
           letter-spacing: .06em; margin-bottom: 3px; }
.det-val { font-size: 15px; font-weight: 700; }

/* ── Chips ── */
.chip { display: inline-flex; align-items: center; gap: 3px; padding: 3px 9px;
        border-radius: 100px; font-size: 11.5px; font-weight: 600; white-space: nowrap; }
.c-r { background: var(--c-redS);  color: var(--c-red); }
.c-a { background: var(--c-ambS);  color: var(--c-amb); }
.c-g { background: var(--c-grnB);  color: var(--c-grn); }
.c-b { background: var(--c-bluB);  color: var(--c-blu); }
.c-x { background: #f1f5f9; color: var(--c-t3); border: 1px solid var(--c-bdr); }

/* ── Dot ── */
.dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.d-g { background: var(--c-grn); }
.d-a { background: var(--c-amb); }
.d-r { background: var(--c-red); }
.d-n { background: transparent; border: 2px solid var(--c-t4); }

/* ── Monitor toggle ── */
.mon-btn { padding: 3px 8px; border-radius: 100px; font-size: 11px; font-weight: 600;
           border: 1px solid; cursor: pointer; transition: all .12s; background: none;
           font-family: inherit; white-space: nowrap; }
.mon-on  { background: var(--c-grnB); color: var(--c-grn); border-color: var(--c-grnBr); }
.mon-off { background: #f1f5f9; color: var(--c-t3); border-color: var(--c-bdr); }

/* ── Dept block (daily) ── */
.db { background: var(--c-sur); border: 1px solid var(--c-bdr); border-radius: var(--r);
      margin-bottom: 14px; overflow: hidden; box-shadow: var(--sh0); }
.db-hd { display: flex; align-items: center; justify-content: space-between;
         padding: 11px 16px; background: #f8fafc; border-bottom: 1px solid var(--c-bdr); }
.db-hd-name { font-weight: 700; font-size: 13.5px; }
.db-hd-stat { font-size: 12px; color: var(--c-t3); }
.tm-hd { display: flex; align-items: center; justify-content: space-between;
         padding: 7px 16px 7px 28px; background: #fafafa;
         border-bottom: 1px solid var(--c-bdr); }
.tm-hd-name { font-weight: 600; font-size: 12.5px; color: var(--c-t2); }
.tm-hd-stat { font-size: 11.5px; color: var(--c-t4); }

/* ── Member rows (daily) ── */
.mr { display: grid; grid-template-columns: 20px 1fr 86px 118px 86px 78px 62px;
      align-items: center; gap: 10px; padding: 10px 16px;
      border-bottom: 1px solid var(--c-bdr); transition: background .1s; }
.mr:last-child { border-bottom: none; }
.mr:hover { background: #f9fafb; }
.mr.rf { background: var(--c-ambB); }
.mr.rf:hover { background: #fef3c7; }
.mr.rc { background: var(--c-redB); }
.mr.rc:hover { background: var(--c-redS); }
.mr.rm { background: #f9fafb; opacity: .75; }
.th-row { display: grid; grid-template-columns: 20px 1fr 86px 118px 86px 78px 62px;
          align-items: center; gap: 10px; padding: 7px 16px; background: #f8fafc;
          border-bottom: 1px solid var(--c-bdr); }
.th { font-size: 10.5px; font-weight: 700; color: var(--c-t4);
      text-transform: uppercase; letter-spacing: .07em; }
.th-r { text-align: right; }
.mr-name  { font-weight: 600; font-size: 13.5px; }
.mr-meta  { font-size: 11px; color: var(--c-t4); margin-top: 1px; }
.mr-time  { font-size: 13px; font-variant-numeric: tabular-nums; }
.mr-sent  { font-size: 13px; }
.mr-vol   { font-size: 13px; font-variant-numeric: tabular-nums; }
.mr-flags { display: flex; gap: 4px; justify-content: flex-end; flex-wrap: wrap; }

/* ── Weekly grid ── */
.wk-nav { display: flex; align-items: center; gap: 10px; }
.wk-range { font-weight: 700; font-size: 15px; min-width: 220px; text-align: center; }
.wk-arr { width: 30px; height: 30px; display: flex; align-items: center; justify-content: center;
          border-radius: 6px; background: var(--c-sur); border: 1px solid var(--c-bdr);
          cursor: pointer; font-size: 16px; line-height: 1; transition: background .12s;
          user-select: none; }
.wk-arr:hover { background: var(--c-bg); }
.wk-stats { display: flex; gap: 28px; background: var(--c-sur); border: 1px solid var(--c-bdr);
            border-radius: var(--r); padding: 14px 22px; margin-bottom: 18px; box-shadow: var(--sh0); }
.ws-item { display: flex; align-items: baseline; gap: 6px; }
.ws-val { font-size: 24px; font-weight: 800; }
.ws-lbl { font-size: 12px; color: var(--c-t3); }
.wk-wrap { overflow-x: auto; }
.wk-block { min-width: 760px; background: var(--c-sur); border: 1px solid var(--c-bdr);
            border-radius: var(--r); overflow: hidden; box-shadow: var(--sh0); margin-bottom: 14px; }
.wk-dept-hd { display: flex; align-items: center; justify-content: space-between;
              padding: 10px 14px; background: #f8fafc; border-bottom: 1px solid var(--c-bdr); }
.wk-dept-nm { font-weight: 700; font-size: 13.5px; }
.wk-tm-hd   { padding: 7px 14px 7px 26px; background: #fafafa; border-bottom: 1px solid var(--c-bdr);
              font-weight: 600; font-size: 12.5px; color: var(--c-t2); }

/* Week grid row */
.wg-row { display: grid; grid-template-columns: 180px repeat(7, 1fr) 68px;
          border-bottom: 1px solid var(--c-bdr); align-items: stretch; }
.wg-row:last-child { border-bottom: none; }
.wg-row:hover .wg-name { background: #f9fafb; }

.wg-hd-row { display: grid; grid-template-columns: 180px repeat(7, 1fr) 68px;
             border-bottom: 2px solid var(--c-bdr); background: #f8fafc; }
.wg-hd-cell { padding: 8px 4px; text-align: center; font-size: 11.5px; font-weight: 700;
              color: var(--c-t3); border-left: 1px solid var(--c-bdr); }
.wg-hd-cell:first-child { border-left: none; }
.wg-hd-cell.today  { color: var(--c-blu); background: var(--c-bluB); }
.wg-hd-cell.wkend  { color: var(--c-t4); background: #fafafa; }

.wg-name { display: flex; align-items: center; gap: 8px; padding: 9px 12px;
           font-size: 13px; font-weight: 600; min-width: 0; }
.wg-name-txt { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }

.wg-cell { border-left: 1px solid var(--c-bdr); padding: 5px 4px;
           display: flex; align-items: center; justify-content: center; cursor: pointer; }
.wg-cell:hover .cell-pill { filter: brightness(.95); }
.wg-cell.wkend { background: #fafafa; cursor: default; }
.wg-cell.future { cursor: default; }

.cell-pill { display: flex; flex-direction: column; align-items: center;
             padding: 4px 6px; border-radius: 6px; min-width: 54px; max-width: 80px;
             font-size: 11.5px; font-weight: 600; line-height: 1.35; text-align: center;
             transition: filter .1s; }
.cp-g { background: var(--c-grnB); color: var(--c-grn); }
.cp-a { background: var(--c-ambB); color: var(--c-amb); }
.cp-r { background: var(--c-redB); color: var(--c-red); }
.cp-none { background: #f1f5f9; color: var(--c-t4); border: 1px dashed var(--c-bdr); }
.cp-fut { background: repeating-linear-gradient(45deg,#f8fafc 0,#f8fafc 3px,#eef2f7 3px,#eef2f7 6px);
          min-width: 54px; height: 34px; border-radius: 6px; }
.cp-wk  { opacity: .4; pointer-events: none; }
.cell-time { font-size: 12px; font-weight: 700; }
.cell-flag { font-size: 10px; opacity: .85; margin-top: 1px; }

.wg-toggle { border-left: 1px solid var(--c-bdr); display: flex; align-items: center;
             justify-content: center; padding: 6px 4px; }

/* ── Card (settings/members) ── */
.card { background: var(--c-sur); border: 1px solid var(--c-bdr); border-radius: var(--r);
        overflow: hidden; box-shadow: var(--sh0); margin-bottom: 16px; }
.cr { display: flex; align-items: center; justify-content: space-between;
      padding: 13px 18px; border-bottom: 1px solid var(--c-bdr); gap: 14px; }
.cr:last-child { border-bottom: none; }
.cr:hover { background: #fafafa; }
.cr-lbl { font-weight: 600; font-size: 13.5px; margin-bottom: 3px; }
.cr-desc { font-size: 12px; color: var(--c-t3); }
.cr-ctrl { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

/* Colors */
.t-r { color: var(--c-red); }
.t-a { color: var(--c-amb); }
.t-g { color: var(--c-grn); }
.t-3 { color: var(--c-t3); }
.t-b { color: var(--c-blu); }

/* ── Toast ── */
.toast { position: fixed; bottom: 22px; right: 22px; background: var(--c-t1); color: #fff;
         padding: 10px 16px; border-radius: var(--r); font-size: 13px; font-weight: 500;
         box-shadow: 0 4px 14px rgba(0,0,0,.18); z-index: 9999; pointer-events: none;
         opacity: 0; transform: translateY(6px); transition: opacity .2s, transform .2s; }
.toast.on { opacity: 1; transform: none; }
.to-ok  { background: var(--c-grn); }
.to-err { background: var(--c-red); }

/* ── Spinner ── */
.spin-wrap { display: flex; align-items: center; justify-content: center; padding: 80px; }
@keyframes sp { to { transform: rotate(360deg); } }
.spinner { width: 30px; height: 30px; border-radius: 50%;
           border: 3px solid var(--c-bdr); border-top-color: var(--c-acc);
           animation: sp .7s linear infinite; }

/* ── Empty ── */
.empty { text-align: center; padding: 56px 20px; color: var(--c-t3); }
.empty-ico { font-size: 42px; margin-bottom: 12px; }
.empty-ttl { font-size: 16px; font-weight: 600; color: var(--c-t2); margin-bottom: 6px; }
</style>
</head>
<body>
<div class="layout">
  <aside class="sb">
    <div class="sb-logo">
      <span class="sb-logo-ico">📊</span>
      <span class="sb-logo-txt">日報チェッカー</span>
    </div>
    <nav class="sb-nav">
      <div class="nv active" data-view="overview" onclick="nav('overview')">
        <span class="nv-ico">⊞</span><span>ダッシュボード</span>
        <span id="nb" class="nv-badge" style="display:none">0</span>
      </div>
      <div class="nv" data-view="members" onclick="nav('members')" id="nv-members">
        <span class="nv-ico">⊛</span><span>メンバー</span>
      </div>
      <div class="nv" data-view="groups" onclick="nav('groups')" id="nv-groups">
        <span class="nv-ico">⊡</span><span>グループ</span>
      </div>
      <div class="nv" data-view="settings" onclick="nav('settings')" id="nv-settings">
        <span class="nv-ico">⊕</span><span>設定</span>
      </div>
      <div class="nv" data-view="users" onclick="nav('users')" id="nv-users">
        <span class="nv-ico">⊙</span><span>ユーザー管理</span>
      </div>
    </nav>
    <div class="sb-foot">
      <div id="sb-user" style="margin-bottom:4px;color:#e2e8f0;font-size:12px"></div>
      <div id="sb-cron"></div>
      <div id="sb-ch" style="margin-top:4px"></div>
      <a href="/auth/logout" style="display:inline-block;margin-top:8px;font-size:11.5px;color:#64748b;text-decoration:none;transition:color .12s" onmouseover="this.style.color='#e2e8f0'" onmouseout="this.style.color='#64748b'">ログアウト</a>
    </div>
  </aside>

  <main class="main">
    <div id="page" class="page"></div>
  </main>
</div>
<div id="toast" class="toast"></div>

<script>
/* ════════════════════════════════════════
   State
════════════════════════════════════════ */
const S = {
  view:     'overview',
  sub:      'day',        // 'day' | 'week'
  date:     today(),
  weekDate: today(),
  dash:      null,
  weekly:    null,
  members:   null,
  groups:    null,
  config:    null,
  dashUsers:   null,
  invitations: null,
  loading:     false,
  role:        'viewer',    // 'admin' | 'viewer' (初期値はviewerで安全側に)
  email:       '',
  displayName: '',
};

function today() {
  return new Date(Date.now() + 9 * 3600000).toISOString().slice(0, 10);
}
function addDays(d, n) {
  return new Date(new Date(d + 'T00:00:00Z').getTime() + n * 86400000).toISOString().slice(0, 10);
}
function weekStart(d) {
  const dt = new Date(d + 'T00:00:00Z');
  const off = dt.getUTCDay() === 0 ? 6 : dt.getUTCDay() - 1;
  return addDays(d, -off);
}
function fmtWeekLabel(d) {
  const dt = new Date(d + 'T00:00:00Z');
  return `${dt.getUTCMonth()+1}月${dt.getUTCDate()}日`;
}
function fmtDayHd(d) {
  const dt  = new Date(d + 'T00:00:00Z');
  const day = ['日','月','火','水','木','金','土'][dt.getUTCDay()];
  return `${day}\n${dt.getUTCMonth()+1}/${dt.getUTCDate()}`;
}
function isWkend(d) { const w = new Date(d + 'T00:00:00Z').getUTCDay(); return w===0||w===6; }

/* ════════════════════════════════════════
   Navigation
════════════════════════════════════════ */
function nav(view) {
  S.view = view;
  document.querySelectorAll('.nv').forEach(el => el.classList.toggle('active', el.dataset.view === view));
  render();
}

function switchSub(sub) {
  S.sub = sub;
  if (sub === 'week' && !S.weekly) fetchWeekly();
  else render();
}

function navWeek(dir) {
  S.weekDate = addDays(S.weekDate, dir * 7);
  S.weekly = null;
  fetchWeekly();
}

/* ════════════════════════════════════════
   API
════════════════════════════════════════ */
async function api(method, url, body) {
  const res = await fetch(url, {
    method,
    headers: body ? {'Content-Type':'application/json'} : {},
    body: body ? JSON.stringify(body) : undefined,
  });
  if (res.status === 401) { window.location.href = '/login.html'; return {}; }
  return res.json();
}

/* ════════════════════════════════════════
   Toast
════════════════════════════════════════ */
let _tt;
function toast(msg, type='') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast on ${type==='ok'?'to-ok':type==='err'?'to-err':''}`;
  clearTimeout(_tt);
  _tt = setTimeout(() => el.classList.remove('on'), 3000);
}

/* ════════════════════════════════════════
   Fetch
════════════════════════════════════════ */
async function fetchDash() {
  S.loading = true; render();
  try {
    S.dash = await api('GET', `/api/dashboard?date=${S.date}`);
    updateSB(S.dash);
  } catch(e) { console.error(e); }
  S.loading = false; render();
}
async function fetchWeekly() {
  S.loading = true; render();
  try { S.weekly = await api('GET', `/api/weekly?date=${S.weekDate}`); }
  catch(e) { console.error(e); }
  S.loading = false; render();
}
async function fetchMembers() { const [m,g] = await Promise.all([api('GET','/api/members'), api('GET','/api/groups')]); S.members=m; S.groups=g; }
async function fetchDashUsers() {
  const [users, invs] = await Promise.all([api('GET', '/api/users'), api('GET', '/api/invitations')]);
  S.dashUsers   = users;
  S.invitations = invs;
}
async function fetchGroups()  { S.groups  = await api('GET', '/api/groups'); }
async function fetchConfig()  { S.config  = await api('GET', '/api/config'); }

function updateSB(d) {
  const b = document.getElementById('nb');
  const n = d.stats?.flagged ?? 0;
  if (b) { b.textContent = n; b.style.display = n > 0 ? 'inline-flex' : 'none'; }
  const ce = document.getElementById('sb-cron');
  if (ce && d.config?.summary_cron) ce.textContent = `自動: ${d.config.summary_cron}`;
  const ch = document.getElementById('sb-ch');
  if (ch && d.config?.report_channel_id) ch.textContent = `CH: ${d.config.report_channel_id}`;
}

/* ════════════════════════════════════════
   Render
════════════════════════════════════════ */
function render() {
  const page = document.getElementById('page');
  if (S.loading) { page.innerHTML = `<div class="spin-wrap"><div class="spinner"></div></div>`; return; }
  switch (S.view) {
    case 'overview': page.innerHTML = renderOverview(); break;
    case 'members':  page.innerHTML = renderMembersV(); break;
    case 'groups':   page.innerHTML = renderGroupsV();  break;
    case 'settings': page.innerHTML = renderSettingsV(); break;
    case 'users':    page.innerHTML = renderUsersV(); break;
  }
  bindEvt();
}

/* ════════════════════════════════════════
   Overview: tab + daily/weekly switch
════════════════════════════════════════ */
function renderOverview() {
  const tabs = `<div class="view-tabs">
    <div class="vtab ${S.sub==='day'?'active':''}" onclick="switchSub('day')">日次</div>
    <div class="vtab ${S.sub==='week'?'active':''}" onclick="switchSub('week')">週次</div>
  </div>`;
  return S.sub === 'week' ? renderWeekly(tabs) : renderDaily(tabs);
}

/* ════════════════════════════════════════
   Daily view
════════════════════════════════════════ */
function renderDaily(tabs) {
  const bar = `<div class="topbar">
    <div class="tb-left">
      <div class="tb-title">${tabs} コンディション</div>
      <div class="tb-sub"><span class="live-dot"></span>${S.dash ? `最終更新 ${new Date().toLocaleTimeString('ja-JP')} — ${S.date}` : ''}</div>
    </div>
    <div class="tb-right">
      <input class="inp" type="date" id="d-inp" value="${S.date}" max="${today()}" style="width:148px">
      <button class="btn btn-sec" onclick="fetchDash()">↺ 更新</button>
      ${S.role === 'admin' ? `<button class="btn btn-pri" id="run-btn" onclick="runCheck()">▶ チェック実行</button>` : ''}
    </div>
  </div>`;

  if (!S.dash) return bar + `<div class="empty"><div class="empty-ico">📭</div><div class="empty-ttl">データなし</div><p>「チェック実行」を押してください。</p></div>`;

  const { stats, config: cfg, group_tree, ungrouped, members } = S.dash;
  const flagged = [...members].filter(m => (m.check?.flag_count??0) > 0)
                               .sort((a,b) => (b.check?.flag_count??0) - (a.check?.flag_count??0));

  return bar + renderStats(stats) +
    (flagged.length ? `<div class="sec">
      <div class="sec-ttl">⚠️ 要注意メンバー <span class="cnt-badge">${flagged.length}</span></div>
      ${flagged.map(m => renderAC(m, cfg)).join('')}
    </div>` : '') +
    renderDeptTree(group_tree, ungrouped, cfg);
}

function renderStats(s) {
  return `<div class="stats">
    <div class="sc"><div class="sc-ico">👥</div><div class="sc-val">${s.total}</div><div class="sc-lbl">監視対象</div></div>
    <div class="sc s-g"><div class="sc-ico">✅</div><div class="sc-val">${s.posted}</div><div class="sc-lbl">投稿済み</div></div>
    <div class="sc ${s.missing>0?'s-a':''}"><div class="sc-ico">⏳</div><div class="sc-val">${s.missing}</div><div class="sc-lbl">未投稿</div></div>
    <div class="sc ${s.critical>0?'s-r':s.flagged>0?'s-a':''}">
      <div class="sc-ico">${s.critical>0?'🔴':s.flagged>0?'🟡':'🟢'}</div>
      <div class="sc-val">${s.flagged}</div>
      <div class="sc-lbl">要注意 <span style="font-size:10px;font-weight:400">(重篤${s.critical})</span></div>
    </div>
  </div>`;
}

function renderAC(m, cfg) {
  const { user, check, report } = m;
  const name  = user.display_name || user.real_name || user.user_id;
  const grp   = user.group ? (user.group.parent ? `${user.group.parent.name} › ${user.group.name}` : user.group.name) : '未分類';
  const crit  = (check.flag_count??0) >= 3;
  const chips = [
    check.late_night_flag ? `<span class="chip c-b">🌙 深夜</span>` : '',
    check.sentiment_flag  ? `<span class="chip c-r">😟 ネガティブ</span>` : '',
    check.volume_flag     ? `<span class="chip c-a">${check.volume_ratio<1?'📉':'📈'} 文量変化</span>` : '',
  ].filter(Boolean).join('');
  const dets = [];
  if (check.late_night_flag) dets.push(`<div class="det-box"><div class="det-lbl">🌙 投稿時刻</div><div class="det-val t-b">${fmtT(check.posted_at)}</div></div>`);
  if (check.sentiment_flag)  dets.push(`<div class="det-box"><div class="det-lbl">😟 感情スコア</div><div class="det-val t-r">${(check.sentiment_score??0).toFixed(2)}<span style="font-size:11px;color:var(--c-t3)"> / 閾値${cfg.sentiment_threshold}</span></div></div>`);
  if (check.volume_flag)     dets.push(`<div class="det-box"><div class="det-lbl">${check.volume_ratio<1?'📉':'📈'} 文量</div><div class="det-val t-a">${fmtP(check.volume_ratio)}<span style="font-size:11px;color:var(--c-t3)"> (${report?.char_count??'?'}字)</span></div></div>`);
  return `<div class="ac ${crit?'':'warn'}">
    <div class="ac-hd">
      <div class="ac-who">
        <div class="dot ${crit?'d-r':'d-a'}" style="width:12px;height:12px"></div>
        <div><div class="ac-name">${name}</div><div class="ac-grp">${grp}</div></div>
      </div>
      <div class="ac-chips">${chips}</div>
    </div>
    ${dets.length ? `<div class="ac-dets">${dets.join('')}</div>` : ''}
  </div>`;
}

function renderDeptTree(groupTree, ungrouped, cfg) {
  const items = [
    ...groupTree.map(g => renderDeptBlock(g, cfg)),
    ...(ungrouped?.length ? [renderDeptBlock({name:'未分類',children:[],direct_members:ungrouped}, cfg)] : []),
  ];
  return `<div class="sec"><div class="sec-ttl">📋 全メンバー</div>${items.join('')}</div>`;
}

function renderDeptBlock(dept, cfg) {
  const all  = [...dept.children.flatMap(c=>c.members||[]), ...(dept.direct_members||[])];
  const post = all.filter(m=>m.check?.posted).length;
  let body = '';
  for (const child of (dept.children||[])) {
    if (!child.members?.length) continue;
    const cp = child.members.filter(m=>m.check?.posted).length;
    body += `<div>
      <div class="tm-hd"><span class="tm-hd-name">▸ ${child.name}</span><span class="tm-hd-stat">${cp}/${child.members.length}名</span></div>
      ${renderTblHd()}${child.members.map(m=>renderMR(m,cfg)).join('')}
    </div>`;
  }
  if ((dept.direct_members||[]).length) body += renderTblHd() + dept.direct_members.map(m=>renderMR(m,cfg)).join('');
  return `<div class="db">
    <div class="db-hd"><span class="db-hd-name">🏢 ${dept.name}</span><span class="db-hd-stat">${post}/${all.length}名投稿</span></div>
    ${body||'<div style="padding:14px 16px;color:var(--c-t4);font-size:13px">メンバーなし</div>'}
  </div>`;
}

function renderTblHd() {
  return `<div class="th-row">
    <div></div><div class="th">名前</div><div class="th">投稿時刻</div>
    <div class="th">感情スコア</div><div class="th">文量変化</div>
    <div class="th th-r">状態</div><div class="th th-r">監視</div>
  </div>`;
}

function renderMR(m, cfg) {
  const { user, check, report } = m;
  const name = user.display_name || user.real_name || user.user_id;
  const monBtn = S.role === 'admin' ? `<button class="mon-btn mon-on" onclick="toggleMon('${user.user_id}',0)" title="監視停止">監視中</button>` : '';

  if (!check || !check.posted) {
    return `<div class="mr rm">
      <div class="dot d-n"></div>
      <div><div class="mr-name t-3">${name}</div></div>
      <div><span class="chip c-x">未投稿</span></div>
      <div>—</div><div>—</div><div>—</div>
      <div style="display:flex;justify-content:flex-end">${monBtn}</div>
    </div>`;
  }

  const fl  = check.flag_count ?? 0;
  const row = fl >= 3 ? 'rc' : fl > 0 ? 'rf' : '';
  const dot = fl >= 3 ? 'd-r' : fl > 0 ? 'd-a' : 'd-g';
  const tHtml = check.late_night_flag
    ? `<span class="t-b" style="font-weight:600">${fmtT(check.posted_at)} <span style="font-size:11px">🌙</span></span>`
    : `<span class="mr-time">${fmtT(check.posted_at)}</span>`;
  let sHtml = '—';
  if (check.sentiment_score !== null && check.sentiment_score !== undefined) {
    const sc = check.sentiment_score, thr = cfg?.sentiment_threshold ?? 0.35;
    const cl = sc >= 0.65 ? 't-g' : sc < thr ? 't-r' : 't-3';
    const lb = sc >= 0.65 ? 'ポジ' : sc < thr ? 'ネガ' : '中立';
    sHtml = `<span class="${cl}">${sc.toFixed(2)} <span style="font-size:11px">${lb}</span></span>`;
  }
  let vHtml = '—';
  if (check.volume_ratio !== null && check.volume_ratio !== undefined) {
    const p = fmtP(check.volume_ratio);
    const cl = check.volume_flag ? 't-a' : 't-3';
    const ic = check.volume_ratio < 0.95 ? '📉 ' : check.volume_ratio > 1.05 ? '📈 ' : '';
    vHtml = `<span class="${cl}">${ic}${p}</span>`;
  }
  const fc = [];
  if (check.late_night_flag) fc.push(`<span class="chip c-b" style="font-size:10px;padding:2px 6px">🌙</span>`);
  if (check.sentiment_flag)  fc.push(`<span class="chip c-r" style="font-size:10px;padding:2px 6px">😟</span>`);
  if (check.volume_flag)     fc.push(`<span class="chip c-a" style="font-size:10px;padding:2px 6px">${check.volume_ratio<1?'📉':'📈'}</span>`);
  if (!fc.length)            fc.push(`<span class="chip c-g" style="font-size:10px;padding:2px 6px">✓</span>`);

  return `<div class="mr ${row}">
    <div class="dot ${dot}"></div>
    <div><div class="mr-name">${name}</div>${report?`<div class="mr-meta">${report.char_count}字</div>`:''}</div>
    <div>${tHtml}</div>
    <div class="mr-sent">${sHtml}</div>
    <div class="mr-vol">${vHtml}</div>
    <div class="mr-flags">${fc.join('')}</div>
    <div style="display:flex;justify-content:flex-end">${monBtn}</div>
  </div>`;
}

/* ════════════════════════════════════════
   Weekly view
════════════════════════════════════════ */
function renderWeekly(tabs) {
  if (!S.weekly) { fetchWeekly(); return `<div class="spin-wrap"><div class="spinner"></div></div>`; }
  const { week_start, week_end, days, today: td, group_tree, ungrouped, weekly_stats: ws } = S.weekly;

  const bar = `<div class="topbar">
    <div class="tb-left">
      <div class="tb-title">${tabs}
        <div class="wk-nav">
          <div class="wk-arr" onclick="navWeek(-1)">‹</div>
          <div class="wk-range">${fmtWeekLabel(week_start)} — ${fmtWeekLabel(week_end)}</div>
          <div class="wk-arr" onclick="navWeek(1)">›</div>
        </div>
      </div>
      <div class="tb-sub"><span class="live-dot"></span>週次コンディション</div>
    </div>
    <div class="tb-right">
      <button class="btn btn-sec" onclick="fetchWeekly()">↺ 更新</button>
    </div>
  </div>`;

  const pct = ws.total_expected > 0 ? Math.round(ws.total_posted / ws.total_expected * 100) : 0;
  const statsBar = `<div class="wk-stats">
    <div class="ws-item"><div class="ws-val">${ws.total_posted}<span style="font-size:14px;font-weight:400;color:var(--c-t3)">/${ws.total_expected}</span></div><div class="ws-lbl">投稿件数</div></div>
    <div class="ws-item"><div class="ws-val">${pct}<span style="font-size:16px;font-weight:400">%</span></div><div class="ws-lbl">投稿率</div></div>
    <div class="ws-item"><div class="ws-val ${ws.total_flagged>0?'t-a':''}">${ws.total_flagged}</div><div class="ws-lbl">フラグ件数</div></div>
    <div class="ws-item"><div class="ws-val t-3">${ws.total_expected - ws.total_posted}</div><div class="ws-lbl">未投稿件数</div></div>
  </div>`;

  const allItems = [
    ...group_tree.map(g => renderWkDeptBlock(g, days, td)),
    ...(ungrouped?.length ? [renderWkDeptBlock({name:'未分類',children:[],direct_members:ungrouped}, days, td)] : []),
  ];

  return bar + statsBar + `<div class="wk-wrap">${allItems.join('')}</div>`;
}

function renderWkDeptBlock(dept, days, td) {
  let body = `${renderWkHdRow(days, td)}`;
  for (const child of (dept.children||[])) {
    if (!child.members?.length) continue;
    body += `<div class="wk-tm-hd">▸ ${child.name}</div>`;
    body += child.members.map(m => renderWkMemberRow(m, days, td)).join('');
  }
  for (const m of (dept.direct_members||[])) {
    body += renderWkMemberRow(m, days, td);
  }
  const allM = [...(dept.children||[]).flatMap(c=>c.members||[]), ...(dept.direct_members||[])];

  return `<div class="wk-block">
    <div class="wk-dept-hd">
      <span class="wk-dept-nm">🏢 ${dept.name}</span>
      <span style="font-size:12px;color:var(--c-t3)">${allM.length}名</span>
    </div>
    ${body}
  </div>`;
}

function renderWkHdRow(days, td) {
  const cells = days.map(d => {
    const lines = fmtDayHd(d).split('\n');
    const cls   = d === td ? 'today' : isWkend(d) ? 'wkend' : '';
    return `<div class="wg-hd-cell ${cls}">${lines[0]}<br><span style="font-size:13px;font-weight:700">${lines[1]}</span></div>`;
  }).join('');
  return `<div class="wg-hd-row">
    <div class="wg-hd-cell" style="border-left:none;text-align:left;padding-left:12px">名前</div>
    ${cells}
    <div class="wg-hd-cell">監視</div>
  </div>`;
}

function renderWkMemberRow(m, days, td) {
  const { user, days: dayData } = m;
  const name = user.display_name || user.real_name || user.user_id;
  const dotCls = 'd-g'; // active members only in weekly view

  const cells = days.map(d => {
    const dd = dayData[d];
    if (!dd) return `<div class="wg-cell"><div class="cell-pill cp-fut"></div></div>`;
    if (isWkend(d)) return `<div class="wg-cell wkend"><div class="cell-pill cp-none cp-wk">休</div></div>`;
    if (dd.is_future)  return `<div class="wg-cell future"><div class="cell-pill cp-fut"></div></div>`;
    if (!dd.posted)    return `<div class="wg-cell" onclick="gotoDay('${d}')" title="${d} 未投稿"><div class="cell-pill cp-none" style="font-size:11px">未投稿</div></div>`;

    const fl    = dd.flag_count ?? 0;
    const pcls  = fl >= 3 ? 'cp-r' : fl > 0 ? 'cp-a' : 'cp-g';
    const time  = fmtT(dd.posted_at);
    const flags = [
      dd.late_night_flag  ? '🌙' : '',
      dd.sentiment_flag   ? '😟' : '',
      dd.volume_flag      ? (dd.volume_ratio < 1 ? '📉' : '📈') : '',
    ].filter(Boolean).join('');
    const fLine = fl > 0 ? `<div class="cell-flag">${flags}</div>` : '';
    const title = `${d} ${time}${fl>0?' ⚠'+fl+'フラグ':''}`;
    return `<div class="wg-cell" onclick="gotoDay('${d}')" title="${title}">
      <div class="cell-pill ${pcls}">
        <div class="cell-time">${time}</div>${fLine}
      </div>
    </div>`;
  }).join('');

  const monBtn = S.role === 'admin' ? `<button class="mon-btn mon-on" onclick="toggleMon('${user.user_id}',0)">監視中</button>` : '';

  return `<div class="wg-row">
    <div class="wg-name">
      <div class="dot ${dotCls}"></div>
      <div class="wg-name-txt">${name}</div>
    </div>
    ${cells}
    <div class="wg-toggle">${monBtn}</div>
  </div>`;
}

/* ════════════════════════════════════════
   Members view
════════════════════════════════════════ */
function renderMembersV() {
  if (!S.members) { fetchMembers().then(render); return `<div class="spin-wrap"><div class="spinner"></div></div>`; }

  const gOpts = `<option value="">（未分類）</option>` +
    S.groups.map(g => `<option value="${g.id}">${g.parent_id?'　└ ':''}${g.name}</option>`).join('');

  const rows = S.members.map(m => {
    const name = m.display_name || m.real_name || m.user_id;
    const sel  = gOpts.replace(`value="${m.group_id??''}"`, `value="${m.group_id??''}" selected`);
    return `<div class="cr">
      <div style="flex:1;min-width:0">
        <div class="cr-lbl" style="${m.is_active?'':'color:var(--c-t3)'}">${name}
          ${m.is_active?'':'<span class="chip c-x" style="font-size:11px;margin-left:6px">停止中</span>'}
        </div>
        <div class="cr-desc">${m.user_id}</div>
      </div>
      <div class="cr-ctrl">
        <select class="inp" style="width:158px" onchange="patchM('${m.user_id}','group_id',this.value||null)">${sel}</select>
        <button class="mon-btn ${m.is_active?'mon-on':'mon-off'}" onclick="toggleMon('${m.user_id}',${m.is_active?0:1})">
          ${m.is_active?'✓ 監視中':'停止中'}
        </button>
      </div>
    </div>`;
  }).join('');

  return `<div class="topbar">
    <div class="tb-left"><div class="tb-title">メンバー管理</div><div class="tb-sub">グループ割り当てと監視オン/オフ</div></div>
    <button class="btn btn-sec" onclick="syncM()">↺ Slackから同期</button>
  </div>
  <div class="card">${rows || '<div style="padding:22px;color:var(--c-t4)">メンバーなし</div>'}</div>`;
}

/* ════════════════════════════════════════
   Groups view
════════════════════════════════════════ */
function renderGroupsV() {
  if (!S.groups) { fetchGroups().then(render); return `<div class="spin-wrap"><div class="spinner"></div></div>`; }
  const tops = S.groups.filter(g => !g.parent_id);
  const kids = S.groups.filter(g =>  g.parent_id);
  const rows = tops.map(top => {
    const ch = kids.filter(c => c.parent_id === top.id);
    return `<div class="cr" style="flex-wrap:wrap">
      <div style="flex:1;min-width:0">
        <div class="cr-lbl">🏢 ${top.name} <span style="font-weight:400;font-size:12px;color:var(--c-t3)">${top.member_count}名</span></div>
        ${ch.map(c => `<div style="margin-top:6px;padding-left:14px;display:flex;align-items:center;gap:10px;font-size:13px">
          <span class="t-3">└</span><span>${c.name}</span>
          <span style="font-size:12px;color:var(--c-t3)">${c.member_count}名</span>
          <button class="btn btn-sec btn-sm" onclick="delG(${c.id},'${c.name}')">削除</button>
        </div>`).join('')}
      </div>
      <button class="btn btn-sec btn-sm" onclick="delG(${top.id},'${top.name}')">削除</button>
    </div>`;
  }).join('');

  const topOpts = tops.map(g => `<option value="${g.id}">${g.name}</option>`).join('');
  return `<div class="topbar"><div class="tb-left"><div class="tb-title">グループ管理</div><div class="tb-sub">部署（第1階層）とチーム（第2階層）</div></div></div>
  <div class="sec"><div class="sec-ttl">グループ一覧</div>
    <div class="card">${rows||'<div style="padding:18px;color:var(--c-t4)">グループなし</div>'}</div>
  </div>
  <div class="sec"><div class="sec-ttl">追加</div>
    <div class="card">
      <div class="cr">
        <div><div class="cr-lbl">部署（第1階層）</div><div class="cr-desc">例: 営業部, 開発部</div></div>
        <div class="cr-ctrl">
          <input class="inp" id="g-d-nm" placeholder="部署名" style="width:138px">
          <button class="btn btn-pri" onclick="addDept()">追加</button>
        </div>
      </div>
      <div class="cr">
        <div><div class="cr-lbl">チーム（第2階層）</div><div class="cr-desc">例: ISM, バックエンド</div></div>
        <div class="cr-ctrl">
          <select class="inp" id="g-t-par" style="width:116px"><option value="">親グループ</option>${topOpts}</select>
          <input class="inp" id="g-t-nm" placeholder="チーム名" style="width:118px">
          <button class="btn btn-pri" onclick="addTeam()">追加</button>
        </div>
      </div>
    </div>
  </div>`;
}

/* ════════════════════════════════════════
   Settings view
════════════════════════════════════════ */
function renderSettingsV() {
  if (!S.config) { fetchConfig().then(render); return `<div class="spin-wrap"><div class="spinner"></div></div>`; }
  const cm = Object.fromEntries(S.config.map(c => [c.key, c]));
  const items = [
    {key:'late_night_hour',      lbl:'深夜フラグ時刻',     desc:'以降を深夜フラグとする（0〜23, JST）',          ph:'22'},
    {key:'sentiment_threshold',  lbl:'ネガティブ閾値',      desc:'感情スコアがこれ未満でフラグ（0.0〜1.0）<br><span style="font-size:11px;line-height:1.8;display:inline-block;margin-top:3px"><span style="color:#dc2626">0.00〜0.25 強ネガ</span>　<span style="color:#d97706">0.25〜0.45 ネガ</span>　<span style="color:#64748b">0.45〜0.65 中立</span>　<span style="color:#059669">0.65〜1.00 ポジ</span></span>',        ph:'0.35'},
    {key:'volume_change_pct',    lbl:'文量変化率（%）',     desc:'過去平均との差がこれ以上でフラグ',                ph:'50'},
    {key:'volume_lookback_days', lbl:'ベースライン日数',    desc:'文量比較に使う過去日数',                          ph:'14'},
    {key:'volume_min_samples',   lbl:'最低データ件数',      desc:'文量チェックに必要な最低データ件数',              ph:'3'},
    {key:'summary_cron',         lbl:'自動チェック時刻',    desc:'cron式 JST（例: 0 23 * * * = 毎日23時）',        ph:'0 23 * * *'},
    {key:'report_channel_id',    lbl:'日報チャンネルID',    desc:'収集対象のSlackチャンネルID',                     ph:'C056L3ZQLKD'},
    {key:'workflow_bot_id',      lbl:'ワークフローBotID',   desc:'空の場合はユーザー直接投稿のみ収集',              ph:'B0XXXXXX（任意）'},
    {key:'user_id_regex',        lbl:'投稿者抽出regex',     desc:'bot_messageからuser_idを抽出する正規表現',        ph:'<@(U[A-Z0-9]+)>'},
  ];
  const rows = items.map(r => `<div class="cr">
    <div><div class="cr-lbl">${r.lbl}</div><div class="cr-desc">${r.desc}</div></div>
    <div class="cr-ctrl">
      <input class="inp" id="c-${r.key}" value="${cm[r.key]?.value??''}" placeholder="${r.ph}" style="width:196px">
      <button class="btn btn-sec btn-sm" onclick="saveCfg('${r.key}')">保存</button>
    </div>
  </div>`).join('');
  return `<div class="topbar"><div class="tb-left"><div class="tb-title">設定</div><div class="tb-sub">チェック条件と収集チャンネルの設定</div></div></div>
  <div class="card">${rows}</div>`;
}

/* ════════════════════════════════════════
   Users view
════════════════════════════════════════ */
function renderUsersV() {
  if (!S.dashUsers) { fetchDashUsers().then(render); return `<div class="spin-wrap"><div class="spinner"></div></div>`; }

  const users = Array.isArray(S.dashUsers) ? S.dashUsers : [];
  const invs  = Array.isArray(S.invitations) ? S.invitations : [];

  const userRows = users.map(u => {
    const isMe = u.email === S.email;
    const name = u.display_name || u.email;
    const roleChip = u.role === 'admin'
      ? `<span class="chip c-b">管理者</span>`
      : `<span class="chip c-x">閲覧者</span>`;
    const toggleRole = u.role === 'admin'
      ? `<button class="btn btn-sec btn-sm" onclick="changeRole(${u.id},'viewer')" ${isMe?'disabled':''}>閲覧者に変更</button>`
      : `<button class="btn btn-sec btn-sm" onclick="changeRole(${u.id},'admin')">管理者に変更</button>`;
    return `<div class="cr">
      <div style="flex:1;min-width:0">
        <div class="cr-lbl">${name} ${isMe?'<span style="font-size:11px;color:var(--c-t3)">(あなた)</span>':''}</div>
        <div class="cr-desc">${u.email} &nbsp;·&nbsp; 登録日: ${u.created_at?.slice(0,10)}</div>
      </div>
      <div class="cr-ctrl">
        ${roleChip}
        ${toggleRole}
        <button class="btn btn-sec btn-sm" onclick="resetPw(${u.id},'${u.email}')">PW変更</button>
        <button class="btn btn-sec btn-sm t-r" onclick="delUser(${u.id},'${u.email}')" ${isMe?'disabled':''}>削除</button>
      </div>
    </div>`;
  }).join('');

  const now = new Date();
  const invRows = invs.map(iv => {
    const expired = new Date(iv.expires_at) < now;
    return `<div class="cr">
      <div style="flex:1;min-width:0">
        <div class="cr-lbl">${iv.email}</div>
        <div class="cr-desc">
          ${iv.role === 'admin' ? '管理者' : '閲覧者'} &nbsp;·&nbsp;
          ${expired ? '<span style="color:var(--c-red)">期限切れ</span>' : `有効期限: ${new Date(iv.expires_at).toLocaleString('ja-JP',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'})}`}
          ${iv.invited_by ? ` &nbsp;·&nbsp; 招待者: ${iv.invited_by}` : ''}
        </div>
      </div>
      <div class="cr-ctrl">
        <span class="chip ${expired?'c-x':'c-a'}">${expired?'期限切れ':'承認待ち'}</span>
        <button class="btn btn-sec btn-sm t-r" onclick="cancelInv(${iv.id},'${iv.email}')">取消</button>
      </div>
    </div>`;
  }).join('');

  return `<div class="topbar">
    <div class="tb-left"><div class="tb-title">ユーザー管理</div><div class="tb-sub">ダッシュボードのアクセス権限管理</div></div>
  </div>
  <div class="sec"><div class="sec-ttl">ユーザー一覧</div>
    <div class="card">${userRows || '<div style="padding:18px;color:var(--c-t4)">ユーザーなし</div>'}</div>
  </div>
  ${invs.length ? `<div class="sec"><div class="sec-ttl">招待中 <span class="cnt-badge">${invs.length}</span></div>
    <div class="card">${invRows}</div>
  </div>` : ''}
  <div class="sec"><div class="sec-ttl">招待を送る</div>
    <div class="card">
      <div class="cr">
        <div><div class="cr-lbl">メールアドレス &amp; 権限</div><div class="cr-desc">招待メールが届きます。24時間有効。</div></div>
        <div class="cr-ctrl" style="gap:6px">
          <input class="inp" id="inv-email" placeholder="user@example.com" type="email" style="width:200px">
          <select class="inp" id="inv-role" style="width:96px">
            <option value="viewer">閲覧者</option>
            <option value="admin">管理者</option>
          </select>
          <button class="btn btn-pri" onclick="sendInv()">招待送信</button>
        </div>
      </div>
    </div>
  </div>`;
}

/* ════════════════════════════════════════
   Event handlers
════════════════════════════════════════ */
function bindEvt() {
  const di = document.getElementById('d-inp');
  if (di) di.onchange = e => { S.date = e.target.value; S.dash = null; fetchDash(); };
}

async function runCheck() {
  const btn = document.getElementById('run-btn');
  if (btn) { btn.disabled = true; btn.textContent = '実行中...'; }
  try {
    const r = await api('POST', '/api/check/run', { date: S.date });
    if (r.ok) { toast(`✅ チェック完了（${r.count}名）`, 'ok'); S.dash = null; await fetchDash(); }
    else toast(`❌ ${r.error}`, 'err');
  } catch(e) { toast(`❌ ${e.message}`, 'err'); }
  if (btn) { btn.disabled = false; btn.textContent = '▶ チェック実行'; }
}

function gotoDay(d) {
  S.sub = 'day'; S.date = d; S.dash = null; fetchDash();
}

async function toggleMon(uid, isActive) {
  try {
    const r = await api('PATCH', `/api/members/${uid}`, { is_active: isActive });
    if (r.ok) {
      toast(isActive ? '✅ 監視再開' : '✅ 監視停止', 'ok');
      S.dash = null; S.weekly = null; S.members = null;
      if (S.view === 'overview') {
        if (S.sub === 'week') fetchWeekly();
        else fetchDash();
      } else if (S.view === 'members') {
        fetchMembers().then(render);
      }
    } else toast(`❌ ${r.error}`, 'err');
  } catch(e) { toast(`❌ ${e.message}`, 'err'); }
}

async function syncM() {
  toast('同期中...');
  try {
    const r = await api('POST', '/api/members/sync');
    if (r.ok) { toast('✅ 同期完了', 'ok'); S.members = null; await fetchMembers(); render(); }
    else toast(`❌ ${r.error}`, 'err');
  } catch(e) { toast(`❌ ${e.message}`, 'err'); }
}

async function patchM(uid, field, val) {
  try {
    const r = await api('PATCH', `/api/members/${uid}`, { [field]: val });
    if (r.ok) { toast('✅ 更新', 'ok'); S.members = null; await fetchMembers(); render(); }
    else toast(`❌ ${r.error}`, 'err');
  } catch(e) { toast(`❌ ${e.message}`, 'err'); }
}

async function addDept() {
  const name = document.getElementById('g-d-nm')?.value.trim();
  if (!name) return;
  const r = await api('POST', '/api/groups', { name });
  if (r.ok) { toast(`✅ "${name}" を追加`, 'ok'); S.groups = null; await fetchGroups(); render(); }
  else toast(`❌ ${r.error}`, 'err');
}

async function addTeam() {
  const name = document.getElementById('g-t-nm')?.value.trim();
  const pid  = parseInt(document.getElementById('g-t-par')?.value);
  if (!name || !pid) { toast('チーム名と親グループを選択してください', 'err'); return; }
  const r = await api('POST', '/api/groups', { name, parent_id: pid });
  if (r.ok) { toast(`✅ "${name}" を追加`, 'ok'); S.groups = null; await fetchGroups(); render(); }
  else toast(`❌ ${r.error}`, 'err');
}

async function delG(id, name) {
  if (!confirm(`"${name}" を削除しますか？\nメンバーは未分類に移動されます。`)) return;
  const r = await api('DELETE', `/api/groups/${id}`);
  if (r.ok) { toast(`✅ "${name}" を削除`, 'ok'); S.groups = null; await fetchGroups(); render(); }
  else toast(`❌ ${r.error}`, 'err');
}

async function sendInv() {
  const email = document.getElementById('inv-email')?.value.trim();
  const role  = document.getElementById('inv-role')?.value;
  if (!email) { toast('メールアドレスを入力してください', 'err'); return; }
  const r = await api('POST', '/api/invitations', { email, role });
  if (r.ok) {
    if (r.warning) {
      toast(`⚠️ ${r.warning}`, '');
      if (r.inviteUrl) prompt('招待URL（コピーして共有してください）:', r.inviteUrl);
    } else {
      toast(`✅ "${email}" に招待を送信しました`, 'ok');
    }
    S.dashUsers = null; await fetchDashUsers(); render();
  } else toast(`❌ ${r.error}`, 'err');
}

async function cancelInv(id, email) {
  if (!confirm(`"${email}" への招待を取り消しますか？`)) return;
  const r = await api('DELETE', `/api/invitations/${id}`);
  if (r.ok) { toast('✅ 招待を取り消しました', 'ok'); S.dashUsers = null; await fetchDashUsers(); render(); }
  else toast(`❌ ${r.error}`, 'err');
}

async function changeRole(id, role) {
  const r = await api('PATCH', `/api/users/${id}`, { role });
  if (r.ok) { toast('✅ 権限を変更しました', 'ok'); S.dashUsers = null; await fetchDashUsers(); render(); }
  else toast(`❌ ${r.error}`, 'err');
}

async function resetPw(id, email) {
  const pw = prompt(`"${email}" の新しいパスワードを入力してください（8文字以上）:`);
  if (!pw) return;
  if (pw.length < 8) { toast('パスワードは8文字以上で設定してください', 'err'); return; }
  const r = await api('PATCH', `/api/users/${id}`, { password: pw });
  if (r.ok) toast('✅ パスワードを変更しました', 'ok');
  else toast(`❌ ${r.error}`, 'err');
}

async function delUser(id, email) {
  if (!confirm(`"${email}" を削除しますか？`)) return;
  const r = await api('DELETE', `/api/users/${id}`);
  if (r.ok) { toast(`✅ "${email}" を削除しました`, 'ok'); S.dashUsers = null; await fetchDashUsers(); render(); }
  else toast(`❌ ${r.error}`, 'err');
}

async function saveCfg(key) {
  const val = document.getElementById(`c-${key}`)?.value;
  if (val === undefined) return;
  try {
    const r = await api('PATCH', `/api/config/${key}`, { value: val });
    if (r.ok) toast('✅ 保存しました', 'ok');
    else toast(`❌ ${r.error}`, 'err');
  } catch(e) { toast(`❌ ${e.message}`, 'err'); }
}

/* ════════════════════════════════════════
   Formatters
════════════════════════════════════════ */
function fmtT(isoUtc) {
  if (!isoUtc) return '—';
  const jst = new Date(new Date(isoUtc).getTime() + 9 * 3600000);
  return `${String(jst.getUTCHours()).padStart(2,'0')}:${String(jst.getUTCMinutes()).padStart(2,'0')}`;
}
function fmtP(ratio) {
  if (ratio === null || ratio === undefined) return '—';
  const p = Math.round((ratio - 1) * 100);
  return p >= 0 ? `+${p}%` : `${p}%`;
}

/* ════════════════════════════════════════
   Init
════════════════════════════════════════ */
// ロール取得 → 管理メニューの表示制御
api('GET', '/api/me').then(r => {
  if (!r.role) return; // 401 → login.htmlへリダイレクト済み
  S.role        = r.role || 'viewer';
  S.email       = r.email || '';
  S.displayName = r.displayName || '';
  ['members','groups','settings','users'].forEach(v => {
    const el = document.getElementById(`nv-${v}`);
    if (el) el.style.display = S.role === 'admin' ? '' : 'none';
  });
  const foot = document.getElementById('sb-user');
  if (foot) foot.textContent = `👤 ${S.displayName || S.email}`;
});

fetchDash();
setInterval(() => {
  if (S.view === 'overview') {
    if (S.sub === 'week') fetchWeekly();
    else fetchDash();
  }
}, 60000);
</script>
