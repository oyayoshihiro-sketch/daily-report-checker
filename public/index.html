/* ════════════════════════════════════════
   Event handlers
════════════════════════════════════════ */
function bindEvt() {
  const di = document.getElementById('d-inp');
  if (di) di.onchange = e => { S.date = e.target.value; S.dash = null; fetchDash(); };
  const wi = document.getElementById('w-inp');
  if (wi) wi.onchange = e => { S.date = e.target.value; S.dash = null; S.winsRange = {}; fetchDash().then(render); };
}

async function runCheck() {
  const btn = document.getElementById('run-btn');
  if (btn) { btn.disabled = true; btn.textContent = '実行中...'; }
  try {
    const r = await api('POST', '/api/check/run', { date: S.date });
    if (r.ok) { toast(`✅ チェック完了（${r.count}名）`, 'ok'); S.dash = null; await fetchDash(); }
    else toast(`❌ ${r.error}`, 'err');
  } catch(e) { toast(`❌ ${e.message}`, 'err'); }
  if (btn) { btn.disabled = false; btn.textContent = '▶ チェック実行'; }
}

function gotoDay(d) {
  S.sub = 'day'; S.date = d; S.dash = null; fetchDash();
}

async function toggleMon(uid, isActive) {
  try {
    const r = await api('PATCH', `/api/members/${uid}`, { is_active: isActive });
    if (r.ok) {
      toast(isActive ? '✅ 監視再開' : '✅ 監視停止', 'ok');
      S.dash = null; S.weekly = null; S.members = null;
      if (S.view === 'overview') {
        if (S.sub === 'week') fetchWeekly();
        else fetchDash();
      } else if (S.view === 'members') {
        fetchMembers().then(render);
      }
    } else toast(`❌ ${r.error}`, 'err');
  } catch(e) { toast(`❌ ${e.message}`, 'err'); }
}

async function syncM() {
  toast('同期中...');
  try {
    const r = await api('POST', '/api/members/sync');
    if (r.ok) { toast('✅ 同期完了', 'ok'); S.members = null; await fetchMembers(); render(); }
    else toast(`❌ ${r.error}`, 'err');
  } catch(e) { toast(`❌ ${e.message}`, 'err'); }
}

async function patchM(uid, field, val) {
  try {
    const r = await api('PATCH', `/api/members/${uid}`, { [field]: val });
    if (r.ok) { toast('✅ 更新', 'ok'); S.members = null; await fetchMembers(); render(); }
    else toast(`❌ ${r.error}`, 'err');
  } catch(e) { toast(`❌ ${e.message}`, 'err'); }
}

async function addDept() {
  const name = document.getElementById('g-d-nm')?.value.trim();
  if (!name) return;
  const r = await api('POST', '/api/groups', { name });
  if (r.ok) { toast(`✅ "${name}" を追加`, 'ok'); S.groups = null; await fetchGroups(); render(); }
  else toast(`❌ ${r.error}`, 'err');
}

async function addTeam() {
  const name = document.getElementById('g-t-nm')?.value.trim();
  const pid  = parseInt(document.getElementById('g-t-par')?.value);
  if (!name || !pid) { toast('部署名と親グループを選択してください', 'err'); return; }
  const r = await api('POST', '/api/groups', { name, parent_id: pid });
  if (r.ok) { toast(`✅ "${name}" を追加`, 'ok'); S.groups = null; await fetchGroups(); render(); }
  else toast(`❌ ${r.error}`, 'err');
}

async function addSubTeam() {
  const name = document.getElementById('g-s-nm')?.value.trim();
  const pid  = parseInt(document.getElementById('g-s-par')?.value);
  if (!name || !pid) { toast('チーム名と親部署を選択してください', 'err'); return; }
  const r = await api('POST', '/api/groups', { name, parent_id: pid });
  if (r.ok) { toast(`✅ "${name}" を追加`, 'ok'); S.groups = null; await fetchGroups(); render(); }
  else toast(`❌ ${r.error}`, 'err');
}

async function delG(id, name) {
  if (!confirm(`"${name}" を削除しますか？`)) return;
  const r = await api('DELETE', `/api/groups/${id}`);
  if (r.ok) { toast(`✅ "${name}" を削除`, 'ok'); S.groups = null; await fetchGroups(); render(); }
  else toast(`❌ ${r.error}`, 'err');
}

async function sendInv() {
  const email = document.getElementById('inv-email')?.value.trim();
  const role  = document.getElementById('inv-role')?.value;
  if (!email) { toast('メールアドレスを入力してください', 'err'); return; }
  const r = await api('POST', '/api/invitations', { email, role });
  if (r.ok) {
    if (r.warning) {
      toast(`招待URLを発行しました`, 'ok');
      if (r.inviteUrl) prompt('招待URL（コピーして共有してください）:', r.inviteUrl);
    } else {
      toast(`✅ "${email}" に招待を送信しました`, 'ok');
    }
    S.dashUsers = null; await fetchDashUsers(); render();
  } else toast(`❌ ${r.error}`, 'err');
}

async function cancelInv(id, email) {
  if (!confirm(`"${email}" への招待を取り消しますか？`)) return;
  const r = await api('DELETE', `/api/invitations/${id}`);
  if (r.ok) { toast('✅ 招待を取り消しました', 'ok'); S.dashUsers = null; await fetchDashUsers(); render(); }
  else toast(`❌ ${r.error}`, 'err');
}

async function changeRole(id, role) {
  const r = await api('PATCH', `/api/users/${id}`, { role });
  if (r.ok) { toast('✅ 権限を変更しました', 'ok'); S.dashUsers = null; await fetchDashUsers(); render(); }
  else toast(`❌ ${r.error}`, 'err');
}

async function resetPw(id, email) {
  const pw = prompt(`"${email}" の新しいパスワード（8文字以上）:`);
  if (!pw) return;
  if (pw.length < 8) { toast('パスワードは8文字以上で設定してください', 'err'); return; }
  const r = await api('PATCH', `/api/users/${id}`, { password: pw });
  if (r.ok) toast('✅ パスワードを変更しました', 'ok');
  else toast(`❌ ${r.error}`, 'err');
}

async function delUser(id, email) {
  if (!confirm(`"${email}" を削除しますか？`)) return;
  const r = await api('DELETE', `/api/users/${id}`);
  if (r.ok) { toast(`✅ "${email}" を削除しました`, 'ok'); S.dashUsers = null; await fetchDashUsers(); render(); }
  else toast(`❌ ${r.error}`, 'err');
}

const DEFAULT_PROMPT = `## ロール
あなたは日本の職場における感情分析の専門家です。
日報テキストを読み、メンバーのコンディションスコアを算出してください。

---

## スコアの定義

コンディションスコアは 0.00〜1.00 の連続値です。

  1.00 = 強いポジティブ（エネルギーに満ち、充実している）
  0.00 = 強いネガティブ（疲弊・消耗・危機的状態）

スコアは必ず以下の5段階のいずれかの帯域に収まるよう算出してください。

  0.80〜1.00  GREEN    良好
  0.60〜0.79  YELLOW   やや注意
  0.40〜0.59  ORANGE   要観察
  0.20〜0.39  RED      要対応
  0.00〜0.19  CRITICAL 緊急対応

---

## スコア帯域のアンカー定義（必ず参照すること）

以下は各帯域の「典型的な日報の特徴」です。
採点前にここを読み、日報がどの帯域に近いかを先に判断してから数値を決めてください。

【GREEN 0.80〜1.00】
- 成果・進捗が具体的な数値・固有名詞つきで記述されている
- 感謝・協力者への言及が自然に含まれている
- 明日の計画が具体的かつ能動的
- 文章にエネルギーと手応えが感じられる
- 課題があっても「こう解決する」という能動的記述がある
- 例）「田中さんと一緒に提案を詰められ、先方の反応も良かった。明日は資料を仕上げてFBをもらう予定。」

【YELLOW 0.60〜0.79】
- 成果はあるが記述がやや淡白・形式的
- 「一応」「ひとまず」等の薄い達成感が1〜2個混在
- 課題の記述はあるが、解決策が「調整します」程度
- 文章量は普通だが、感情の起伏が感じられない
- 例）「商談3件対応しました。資料も一通り完成しています。明日は続きをやります。」

【ORANGE 0.40〜0.59】
- 「なんとか」「ひとまず」「一応」が複数回登場
- 先送り・持ち越しの記述が含まれる
- 「問題ありません」「大丈夫です」の過剰使用（強がりサイン）
- 明日の予定が「引き続き対応」「検討中」等の曖昧表現
- 文章が短くなり始め、具体性が薄れている
- 例）「なんとか商談3件こなしました。資料も一応完成。少し悩んでいることがあります。引き続き頑張ります。」

【RED 0.20〜0.39】
- 失敗・遅延の報告がある
- 「問題ありません」「大丈夫です」の後に内容が続かない（空洞の強がり）
- 「…」「持ち越し」「来週以降」が複数登場
- 明日の予定が「頑張ります」のみ
- 体調・疲労への言及がある
- 人物名・感謝表現が消えている
- 例）「商談はうまくいきませんでした。資料は来週以降になります。問題ありません。頑張ります。」

【CRITICAL 0.00〜0.19】
- 文章が極端に短い（3〜5行以下）
- 謝罪・自己否定が含まれる
- 体調不良・疲弊の直接言及
- 将来への言及がほぼ「やっていきます」のみ
- 業務の具体的記述がほぼ消失
- 例）「商談しました。資料、間に合いませんでした。申し訳ありません。体が重いです。やっていきます。」

---

## 採点手順（必ずこの順番で実行すること）

### STEP 1: 帯域判定
上記アンカーを参照し、この日報はどの帯域（GREEN/YELLOW/ORANGE/RED/CRITICAL）に最も近いかを先に決める。

### STEP 2: 7軸サブスコア算出
各軸を 0.00〜1.00 で採点する（高い＝ポジティブ）。

  軸1 直接的ポジティブ表現    (重み 15%)
      - ポジティブ感情語・達成感の表現が豊富なら高い
      - ネガティブ感情語・失敗報告が多いなら低い

  軸2 自然な達成感・充実感    (重み 20%)  ★最重要★
      - 「なんとか」「一応」「ひとまず」「とりあえず」の使用回数が多いほど低くなる
      - 「問題ありません」「大丈夫です」の過剰使用は強がりサインで低くなる
      - 「できました！」「うまくいきました」等の素直な達成感は高くなる
      - 受動態多用（〜させられた、〜になってしまった）は低くなる

  軸3 文末・語尾の活力        (重み 15%)
      - 「…」「〜」の多用で低くなる
      - 文章量が普段より極端に少ない場合は低くなる
      - 具体的で能動的な文末表現は高くなる

  軸4 業務記述の具体性        (重み 20%)  ★最重要★
      - 固有名詞（人名・社名・サービス名）が豊富なら高い
      - 数値（件数・金額・時間）が含まれるなら高い
      - 「対応しました」「やりました」だけの抽象表現は低くなる
      - 「持ち越し」「来週以降」「調整中」の登場回数が多いほど低くなる

  軸5 対人関係の豊かさ        (重み 10%)
      - 感謝・協力者への言及があれば高い
      - 人物名が全く登場しない場合は低くなる
      - 「認識の齟齬」「調整が発生」等の摩擦表現で低くなる

  軸6 体調・エネルギー        (重み 10%)
      - 体調不良・疲弊への言及があれば大きく低くなる
      - 「集中できなかった」「頭が回らない」も低くなる
      - 言及がなければ中間（0.50）をベースに他要素で調整

  軸7 将来への意欲            (重み 10%)
      - 明日の予定が具体的で能動的なら高い
      - 「頑張ります」「やっていきます」のみなら低い
      - 「未定」「調整中」が多い場合は低くなる

### STEP 3: 重み付き平均でスコア算出
score = 軸1×0.15 + 軸2×0.20 + 軸3×0.15 + 軸4×0.20 + 軸5×0.10 + 軸6×0.10 + 軸7×0.10

### STEP 4: 帯域との整合チェック
STEP1で判定した帯域とSTEP3のスコアが一致しているか確認する。
ズレている場合は、どちらが正しいかを再判断してスコアを調整する。
※ LLMは中間値（0.45〜0.55）に寄りがちなので、GREENまたはCRITICALの特徴が明確なら
  迷わず端の帯域を選ぶこと。

---

## キャリブレーション注意事項

1. 「真ん中に逃げない」
   特徴が明確な日報に 0.45〜0.55 を付けるのは誤り。
   CRITICALの特徴があれば 0.10〜0.15、GREENの特徴があれば 0.85〜0.95 を付ける。

2. 「ポジティブ偽装を見抜く」
   「問題ありません！大丈夫です！頑張ります！」
   → これはGREENではなくREDまたはCRITICALのサイン。

3. 「不在も検出する」
   人物名・感謝・具体的数値が消えていること自体がネガティブシグナル。

4. 「矮小化表現に敏感になる」
   「少し」「ちょっと」は日本語では「かなり」の意味を持つことが多い。
   「少し悩んでいます」→ 実際は深刻に悩んでいる可能性が高い。

5. 「文章量の絶対値より変化を重視する」
   普段長い人が急に短くなった場合にスコアを下げる。
   （前回スコアが提供されている場合は必ず参照すること）

async function resetPrompt() {
  const el = document.getElementById('c-sentiment_prompt');
  if (el) el.value = DEFAULT_PROMPT;
  const r = await api('PATCH', '/api/config/sentiment_prompt', { value: DEFAULT_PROMPT });
  if (r.ok) { toast('✅ デフォルトに戻しました', 'ok'); S.config = null; await fetchConfig(); render(); }
  else toast(`❌ ${r.error}`, 'err');
}

async function saveCfg(key) {
  const val = document.getElementById(`c-${key}`)?.value;
  if (val === undefined) return;
  try {
    const r = await api('PATCH', `/api/config/${key}`, { value: val });
    if (r.ok) toast('✅ 保存しました', 'ok');
    else toast(`❌ ${r.error}`, 'err');
  } catch(e) { toast(`❌ ${e.message}`, 'err'); }
}

async function detectWorkflowBot() {
  const btn = document.getElementById('btn-detect-bot');
  if (btn) { btn.disabled = true; btn.textContent = '検出中…'; }
  try {
    const r = await api('GET', `/api/check/detect-workflow-bot?date=${S.date || today()}`);
    if (btn) { btn.disabled = false; btn.textContent = '🔍 Bot検出'; }
    if (!r.ok) { toast(`❌ ${r.error}`, 'err'); return; }
    if (!r.bots || r.bots.length === 0) {
      toast(`⚠️ ${r.date} のbot_messageが見つかりませんでした（合計${r.total}件）`, 'warn');
      return;
    }
    // 候補を表示してクリックで入力欄にセット
    const list = r.bots.map(b =>
      `<div style="padding:8px 12px;border-bottom:1px solid var(--c-bdr);cursor:pointer;hover:background:var(--c-bg)"
        onclick="document.getElementById('c-workflow_bot_id').value='${b.bot_id}';document.getElementById('bot-detect-modal').remove();toast('✅ ${b.bot_id} をセットしました。保存してください。','ok')"
       >
        <div style="font-weight:600;font-size:13px">${b.bot_name || '（名前なし）'}</div>
        <div style="font-size:11.5px;color:var(--c-t3);margin-top:2px">ID: <code>${b.bot_id}</code> ・ ${b.count}件</div>
        <div style="font-size:11px;color:var(--c-t4);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${b.sample}</div>
      </div>`
    ).join('');
    const modal = document.createElement('div');
    modal.id = 'bot-detect-modal';
    modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:9999;display:flex;align-items:center;justify-content:center';
    modal.innerHTML = `<div style="background:#fff;border-radius:14px;width:440px;max-height:80vh;overflow:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)">
      <div style="padding:16px 20px;border-bottom:1px solid var(--c-bdr);font-weight:700;font-size:15px;display:flex;justify-content:space-between;align-items:center">
        🤖 検出されたワークフローBot
        <button onclick="document.getElementById('bot-detect-modal').remove()" style="background:none;border:none;font-size:18px;cursor:pointer;color:var(--c-t3)">×</button>
      </div>
      <div style="padding:8px 0;font-size:12px;color:var(--c-t3);padding:8px 16px">クリックして入力欄にセット → 保存してください</div>
      ${list}
    </div>`;
    document.body.appendChild(modal);
    modal.addEventListener('click', e => { if (e.target === modal) modal.remove(); });
  } catch(e) {
    if (btn) { btn.disabled = false; btn.textContent = '🔍 Bot検出'; }
    toast(`❌ ${e.message}`, 'err');
  }
}

function fmtT(isoUtc) {
  if (!isoUtc) return '—';
  const jst = new Date(new Date(isoUtc).getTime() + 9 * 3600000);
  return `${String(jst.getUTCHours()).padStart(2,'0')}:${String(jst.getUTCMinutes()).padStart(2,'0')}`;
}
function fmtP(ratio) {
  if (ratio === null || ratio === undefined) return '—';
  const p = Math.round((ratio - 1) * 100);
  return p >= 0 ? `+${p}%` : `${p}%`;
}

const BS = { open: false, loading: false, history: [] };

function toggleBuddy() {
  BS.open = !BS.open;
  document.getElementById('buddy-panel').classList.toggle('open', BS.open);
  document.getElementById('buddy-toggle-btn').style.display = BS.open ? 'none' : '';
  if (BS.open) setTimeout(() => document.getElementById('buddy-inp')?.focus(), 300);
}

function buddyKeydown(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); buddySend(); }
}

function buddySuggest(text) {
  const inp = document.getElementById('buddy-inp');
  if (inp) { inp.value = text; inp.style.height = 'auto'; inp.style.height = inp.scrollHeight + 'px'; }
  buddySend();
}

async function buddySend() {
  if (BS.loading) return;
  const inp = document.getElementById('buddy-inp');
  const msg = inp?.value.trim();
  if (!msg) return;

  inp.value = '';
  inp.style.height = 'auto';
  buddyAppendMsg('user', msg);
  BS.history.push({ role: 'user', content: msg });

  BS.loading = true;
  document.getElementById('buddy-send').disabled = true;
  const typingId = buddyShowTyping();

  try {
    const date = S.date || today();
    const r = await api('POST', '/api/buddy/chat', { message: msg, history: BS.history.slice(-10), date });
    buddyRemoveTyping(typingId);
    if (r.ok) {
      buddyAppendMsg('assistant', r.reply);
      BS.history.push({ role: 'assistant', content: r.reply });
    } else {
      buddyAppendMsg('assistant', `エラー: ${r.error || '回答できませんでした'}`);
    }
  } catch (e) {
    buddyRemoveTyping(typingId);
    buddyAppendMsg('assistant', `通信エラーが発生しました`);
  } finally {
    BS.loading = false;
    document.getElementById('buddy-send').disabled = false;
  }
}

function buddyAppendMsg(role, text) {
  const msgs = document.getElementById('buddy-msgs');
  if (!msgs) return;
  const ico = role === 'assistant' ? '🤖' : '👤';
  const div = document.createElement('div');
  div.className = `buddy-msg ${role}`;
  div.innerHTML = `<div class="buddy-msg-ico">${ico}</div><div class="buddy-bubble">${escHtml(text)}</div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function buddyShowTyping() {
  const msgs = document.getElementById('buddy-msgs');
  if (!msgs) return null;
  const id = 'bt-' + Date.now();
  const div = document.createElement('div');
  div.className = 'buddy-msg assistant';
  div.id = id;
  div.innerHTML = `<div class="buddy-msg-ico">🤖</div><div class="buddy-typing"><span></span><span></span><span></span></div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return id;
}

function buddyRemoveTyping(id) {
  if (id) document.getElementById(id)?.remove();
}
