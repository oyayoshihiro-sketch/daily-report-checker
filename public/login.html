<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ログイン — 日報チェッカー</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
               "Hiragino Sans", "Yu Gothic UI", Meiryo, sans-serif;
  background: #f0fdf4;
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  position: relative; overflow: hidden;
}
/* 背景の装飾 */
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 800px 600px at 20% 30%, rgba(34,197,94,.12) 0%, transparent 70%),
    radial-gradient(ellipse 600px 400px at 80% 70%, rgba(16,185,129,.08) 0%, transparent 70%);
  pointer-events: none;
}
.wrap {
  width: 100%; max-width: 420px; padding: 24px;
  position: relative; z-index: 1;
}
.card {
  background: #fff;
  border-radius: 20px;
  box-shadow: 0 8px 40px rgba(22,163,74,.10), 0 2px 8px rgba(0,0,0,.06);
  overflow: hidden;
}
.card-top {
  background: linear-gradient(135deg, #16a34a 0%, #0d9488 100%);
  padding: 32px 32px 28px;
  text-align: center;
  position: relative;
}
.card-top::after {
  content: '';
  position: absolute; bottom: -1px; left: 0; right: 0; height: 20px;
  background: #fff;
  border-radius: 20px 20px 0 0;
}
.logo-icon {
  font-size: 36px;
  display: inline-block;
  filter: drop-shadow(0 2px 8px rgba(0,0,0,.2));
  margin-bottom: 10px;
}
.logo-text {
  color: rgba(255,255,255,.95);
  font-size: 20px; font-weight: 800;
  letter-spacing: -.02em;
}
.logo-sub {
  color: rgba(255,255,255,.7);
  font-size: 12.5px; margin-top: 4px;
}
.card-body { padding: 8px 32px 32px; }
h1 {
  font-size: 16px; font-weight: 700; color: #111827;
  margin-bottom: 22px; text-align: center;
}
.field { margin-bottom: 16px; }
label {
  display: block; font-size: 12px; font-weight: 700;
  color: #374151; margin-bottom: 6px; letter-spacing: .04em;
  text-transform: uppercase;
}
input {
  width: 100%; padding: 11px 14px;
  border: 1.5px solid #d1fae5; border-radius: 10px;
  font-size: 14px; color: #111827; background: #f9fffe;
  outline: none; transition: border-color .15s, box-shadow .15s;
  font-family: inherit;
}
input:focus {
  border-color: #22c55e;
  box-shadow: 0 0 0 3px rgba(34,197,94,.15);
  background: #fff;
}
input::placeholder { color: #9ca3af; }
.btn {
  width: 100%; padding: 13px;
  background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
  color: #fff; border: none; border-radius: 10px;
  font-size: 15px; font-weight: 700; cursor: pointer;
  transition: opacity .15s, transform .1s;
  font-family: inherit; margin-top: 6px;
  box-shadow: 0 4px 14px rgba(22,163,74,.35);
}
.btn:hover:not(:disabled) { opacity: .9; transform: translateY(-1px); }
.btn:active { transform: translateY(0); }
.btn:disabled { opacity: .6; cursor: not-allowed; transform: none; }
.err {
  background: #fef2f2; border: 1.5px solid #fca5a5; border-radius: 10px;
  color: #dc2626; font-size: 13px; padding: 10px 14px; margin-bottom: 16px;
  display: none;
}
.err.on { display: block; }
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="card-top">
      <div class="logo-icon">🌱</div>
      <div class="logo-text">日報チェッカー</div>
      <div class="logo-sub">Daily Report Checker</div>
    </div>
    <div class="card-body">
      <h1>ログイン</h1>
      <div id="err" class="err"></div>
      <form id="form" onsubmit="doLogin(event)">
        <div class="field">
          <label for="email">メールアドレス</label>
          <input id="email" type="email" placeholder="you@example.com" autocomplete="email" required>
        </div>
        <div class="field">
          <label for="pass">パスワード</label>
          <input id="pass" type="password" placeholder="••••••••" autocomplete="current-password" required>
        </div>
        <button class="btn" id="btn" type="submit">ログイン →</button>
      </form>
    </div>
  </div>
</div>
<script>
async function doLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('btn');
  const err = document.getElementById('err');
  err.classList.remove('on');
  btn.disabled = true; btn.textContent = 'ログイン中...';
  try {
    const res  = await fetch('/auth/login', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: document.getElementById('email').value, password: document.getElementById('pass').value }),
    });
    const data = await res.json();
    if (data.ok) { window.location.href = '/'; }
    else { err.textContent = data.error || 'ログインに失敗しました'; err.classList.add('on'); }
  } catch { err.textContent = 'サーバーに接続できませんでした'; err.classList.add('on'); }
  btn.disabled = false; btn.textContent = 'ログイン →';
}
</script>
</body>
</html>
