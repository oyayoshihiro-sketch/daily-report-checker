<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>招待の承認 — 日報チェッカー</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
               "Hiragino Sans", "Yu Gothic UI", Meiryo, sans-serif;
  font-size: 14px; line-height: 1.5;
  background: #f1f5f9; color: #0f172a;
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
}
.card {
  background: #fff; border-radius: 12px;
  box-shadow: 0 4px 24px rgba(0,0,0,.10), 0 1px 4px rgba(0,0,0,.06);
  width: 100%; max-width: 420px; padding: 40px 36px;
}
.logo { display: flex; align-items: center; gap: 10px; margin-bottom: 30px; justify-content: center; }
.logo-ico { font-size: 28px; }
.logo-txt { font-size: 20px; font-weight: 700; color: #0f172a; }
.invite-info {
  background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 8px;
  padding: 14px 16px; margin-bottom: 24px; text-align: center;
}
.invite-email { font-size: 16px; font-weight: 700; color: #1d4ed8; margin-top: 4px; }
.invite-role  { font-size: 12.5px; color: #3b82f6; margin-top: 4px; }
h1 { font-size: 17px; font-weight: 600; color: #334155; margin-bottom: 20px; text-align: center; }
.field { margin-bottom: 16px; }
label { display: block; font-size: 12.5px; font-weight: 600; color: #475569;
        margin-bottom: 6px; letter-spacing: .02em; }
input {
  width: 100%; padding: 10px 13px; border: 1px solid #e2e8f0; border-radius: 7px;
  font-size: 14px; color: #0f172a; background: #fff; outline: none;
  transition: border-color .15s; font-family: inherit;
}
input:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,.12); }
input::placeholder { color: #94a3b8; }
.hint { font-size: 11.5px; color: #94a3b8; margin-top: 5px; }
.btn {
  width: 100%; padding: 11px; background: #3b82f6; color: #fff; border: none;
  border-radius: 7px; font-size: 14.5px; font-weight: 600; cursor: pointer;
  transition: background .15s; font-family: inherit; margin-top: 8px;
}
.btn:hover:not(:disabled) { background: #2563eb; }
.btn:disabled { opacity: .6; cursor: not-allowed; }
.err {
  background: #fef2f2; border: 1px solid #fca5a5; border-radius: 7px;
  color: #dc2626; font-size: 13px; padding: 10px 13px; margin-bottom: 16px;
  display: none;
}
.err.on { display: block; }
.ok-state { text-align: center; display: none; }
.ok-state.on { display: block; }
.ok-ico { font-size: 48px; margin-bottom: 16px; }
.ok-ttl { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
.ok-sub { font-size: 13px; color: #64748b; margin-bottom: 24px; }
#loading { text-align: center; padding: 20px; color: #64748b; }
#main-form { display: none; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <span class="logo-ico">📊</span>
    <span class="logo-txt">日報チェッカー</span>
  </div>

  <div id="loading">招待を確認中...</div>

  <div id="main-form">
    <h1>パスワードを設定してください</h1>
    <div id="invite-info" class="invite-info">
      <div style="font-size:12.5px;color:#475569">招待されたアカウント</div>
      <div id="inv-email" class="invite-email"></div>
      <div id="inv-role"  class="invite-role"></div>
    </div>
    <div id="err" class="err"></div>
    <form id="form" onsubmit="doAccept(event)">
      <div class="field">
        <label for="pass">パスワード</label>
        <input id="pass" type="password" placeholder="8文字以上" autocomplete="new-password" required minlength="8">
        <div class="hint">8文字以上で設定してください</div>
      </div>
      <div class="field">
        <label for="pass2">パスワード（確認）</label>
        <input id="pass2" type="password" placeholder="もう一度入力" autocomplete="new-password" required minlength="8">
      </div>
      <button class="btn" id="btn" type="submit">設定してログイン</button>
    </form>
  </div>

  <div id="ok-state" class="ok-state">
    <div class="ok-ico">✅</div>
    <div class="ok-ttl">設定完了！</div>
    <div class="ok-sub">ダッシュボードへ移動します...</div>
  </div>

  <div id="ng-state" class="ok-state">
    <div class="ok-ico">❌</div>
    <div id="ng-msg" class="ok-ttl" style="color:#dc2626;font-size:15px"></div>
    <div class="ok-sub" style="margin-top:8px">
      <a href="/login.html" style="color:#3b82f6">ログインページへ戻る</a>
    </div>
  </div>
</div>
<script>
const params = new URLSearchParams(location.search);
const token  = params.get('token');

async function init() {
  if (!token) return showError('招待トークンが見つかりません');
  try {
    const res  = await fetch(`/api/invitations/verify?token=${encodeURIComponent(token)}`);
    const data = await res.json();
    if (!data.ok) return showError(data.error);
    document.getElementById('inv-email').textContent = data.email;
    document.getElementById('inv-role').textContent  = data.role === 'admin' ? '管理者' : '閲覧者';
    document.getElementById('loading').style.display = 'none';
    document.getElementById('main-form').style.display = 'block';
  } catch {
    showError('サーバーに接続できませんでした');
  }
}

function showError(msg) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('ng-msg').textContent = msg;
  document.getElementById('ng-state').classList.add('on');
}

async function doAccept(e) {
  e.preventDefault();
  const btn  = document.getElementById('btn');
  const err  = document.getElementById('err');
  const pass  = document.getElementById('pass').value;
  const pass2 = document.getElementById('pass2').value;
  err.classList.remove('on');
  if (pass !== pass2) {
    err.textContent = 'パスワードが一致しません';
    err.classList.add('on');
    return;
  }
  btn.disabled = true;
  btn.textContent = '設定中...';
  try {
    const res  = await fetch('/api/invitations/accept', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, password: pass }),
    });
    const data = await res.json();
    if (data.ok) {
      document.getElementById('main-form').style.display = 'none';
      document.getElementById('ok-state').classList.add('on');
      setTimeout(() => { window.location.href = '/'; }, 1500);
    } else {
      err.textContent = data.error || '設定に失敗しました';
      err.classList.add('on');
      btn.disabled = false;
      btn.textContent = '設定してログイン';
    }
  } catch {
    err.textContent = 'サーバーに接続できませんでした';
    err.classList.add('on');
    btn.disabled = false;
    btn.textContent = '設定してログイン';
  }
}

init();
</script>
</body>
</html>
